<template>
    <div class="db-card">
        <div class="db-banner">
            <span class="db-dot"></span>
            <h2>Box File Storage</h2>
            <template if:true={folderExists}>
                <button class="db-header-btn" onclick={handleShowNewFolder} title="New Folder">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                </button>
            </template>
            <button class="db-refresh" onclick={handleRefresh} title="Refresh">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </div>

        <!-- New folder input bar -->
        <template if:true={showNewFolder}>
            <div class="new-folder-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#0061D5"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                <input type="text" class="new-folder-input" value={newFolderName} onchange={handleNewFolderNameChange} placeholder="Enter folder name...">
                <button class="btn-fc" onclick={handleCreateCustomFolder} disabled={isCreatingCustomFolder}>
                    <template if:true={isCreatingCustomFolder}>Creating...</template>
                    <template if:false={isCreatingCustomFolder}>Create</template>
                </button>
                <button class="btn-fcancel" onclick={handleCancelNewFolder}>Cancel</button>
            </div>
        </template>

        <template if:true={isLoading}>
            <div class="db-loading">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="db-body">
                <!-- Empty state — no folder -->
                <template if:false={folderExists}>
                    <div class="db-empty">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="#C5DCCC"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                        <p>No folder found for <strong>{folderPath}</strong></p>
                        <button class="db-btn-nhs" onclick={handleCreateFolder} disabled={isCreating}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                            <template if:true={isCreating}>Creating...</template>
                            <template if:false={isCreating}>Create NHS Folder Structure</template>
                        </button>
                        <!-- Progress — Tree View -->
                        <template if:true={showNhsProgress}>
                            <div class="nhs-tree">
                                <template for:each={nhsFolderStatus} for:item="item">
                                    <div class={item.rowClass} key={item.id}>
                                        <div class="tree-left">
                                            <template if:true={item.isChild}>
                                                <span class="tree-line">└─</span>
                                            </template>
                                            <svg class="tree-icon" width="18" height="18" viewBox="0 0 24 24" fill={item.iconColor}><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                                            <span class={item.nameClass}>{item.name}</span>
                                        </div>
                                        <span class={item.statusClass}>{item.statusLabel}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Folder exists -->
                <template if:true={folderExists}>

                    <!-- Property folder header -->
                    <div class="prop-header">
                        <div class="prop-header-left">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="#4A6B5E"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                            <span class="prop-header-name">{folderPath}</span>
                        </div>
                        <button class="db-btn-upload" onclick={handleUploadClick} disabled={isUploading}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <template if:true={isUploading}>Uploading...</template>
                            <template if:false={isUploading}>Upload</template>
                        </button>
                        <input type="file" class="file-upload-input" onchange={handleFileSelected} multiple>
                    </div>

                    <!-- Subfolder tree (when not browsing inside) -->
                    <template if:false={browseMode}>
                        <div class="subfolder-tree">
                            <template for:each={subfolderList} for:item="sf">
                                <div class="subfolder-row" key={sf.name} data-id={sf.id} data-name={sf.name} onclick={handleFolderClick}>
                                    <span class="tree-line">└─</span>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#0061D5"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                                    <span class="subfolder-name">{sf.name}</span>
                                    <span class="subfolder-count">{sf.fileCount} files</span>
                                    <svg class="subfolder-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Upload progress -->
                    <template if:true={showUploadProgress}>
                        <div class="nhs-progress">
                            <template for:each={uploadProgress} for:item="file">
                                <div class="nhs-progress-row" key={file.id}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    <span class="nhs-progress-name">{file.name}</span>
                                    <span class="nhs-progress-size">{file.size}</span>
                                    <span class={file.statusClass}>{file.statusLabel}</span>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Browse mode — inside a subfolder -->
                    <template if:true={browseMode}>
                        <div class="db-breadcrumbs">
                            <template for:each={breadcrumbs} for:item="crumb">
                                <span key={crumb.id} class="db-crumb" data-id={crumb.id} data-name={crumb.name} onclick={handleBreadcrumbClick}>{crumb.name}</span>
                            </template>
                        </div>

                        <template if:true={isBrowsing}>
                            <div class="db-loading"><lightning-spinner alternative-text="Loading" size="small"></lightning-spinner></div>
                        </template>
                        <template if:false={isBrowsing}>
                            <template if:true={hasBrowseItems}>
                                <div class="db-file-list">
                                    <template for:each={browseFolderItems} for:item="item">
                                        <template if:true={item.isFolder}>
                                            <div class="db-file-row db-folder-row" key={item.id} data-id={item.id} data-name={item.name} onclick={handleSubfolderClick}>
                                                <svg class="db-file-icon" width="18" height="18" viewBox="0 0 24 24" fill="#0061D5"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                                                <div class="db-file-info">
                                                    <div class="db-file-name">{item.name}</div>
                                                </div>
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                            </div>
                                        </template>
                                        <template if:true={item.isFile}>
                                            <div class="db-file-row" key={item.id}>
                                                <svg class="db-file-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                                <div class="db-file-info">
                                                    <div class="db-file-name">{item.name}</div>
                                                    <div class="db-file-meta">
                                                        <span class="db-file-size">{item.size}</span>
                                                        <span class="db-file-date">{item.modified}</span>
                                                    </div>
                                                </div>
                                                <button class="db-btn-dl" data-id={item.id} data-name={item.name} onclick={handleDownload} title="Download">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                                </button>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasBrowseItems}>
                                <div class="db-no-files">This folder is empty</div>
                            </template>
                        </template>
                    </template>

                    <!-- (subfolder tree already shown above) -->
                </template>
            </div>
        </template>
    </div>
</template>
