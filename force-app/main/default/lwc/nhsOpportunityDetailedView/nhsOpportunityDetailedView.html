<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <template if:false={isLoading}>
        <!-- PAGE HEADER WITH STAGE TRACKER -->
        <header class="page-header">
            <div class="header-top">
                <div class="header-left">
                    <h1 class="header-address">{formData.propertyAddress}</h1>
                    <p class="header-subtitle">Application: {formData.vendor1Name}</p>
                </div>
                <div class="header-right-group">
                    <span class={statusTagClass}>{statusTagLabel}</span>
                    <lightning-combobox
                        name="nhsProcess"
                        label="Stage"
                        variant="label-hidden"
                        value={formData.nhsProcess}
                        options={nhsProcessOptions}
                        onchange={handleStageChange}
                        class="stage-dropdown">
                    </lightning-combobox>
                    <span class="record-id">{recordId}</span>
                </div>
            </div>
            <div class="stage-header-row">
                <div class="stage-tracker">
                    <template for:each={stages} for:item="stage">
                        <div key={stage.label} class={stage.cssClass}>
                            <div class="stage-dot">
                                <template if:true={stage.isCompleted}>
                                    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2.5 7l3 3 6-6" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                </template>
                                <template if:true={stage.isActive}>
                                    <div class="pulse-ring"></div>
                                    <div class="glow-core"></div>
                                </template>
                            </div>
                            <span class="stage-label">{stage.label}</span>
                        </div>
                    </template>
                </div>
                <div class={archivedClass}>
                    <span class="archived-label">Archived</span>
                </div>
            </div>
        </header>

        <!-- ARCHIVED INFO BANNER -->
        <template if:true={isArchived}>
            <div class="archived-banner">
                <div class="archived-banner-icon">
                    <svg width="20" height="20" fill="none" stroke="#dc2626" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
                </div>
                <div class="archived-banner-content">
                    <div class="archived-banner-title">This application has been archived</div>
                    <div class="archived-banner-details">
                        <template if:true={archivedDateFormatted}>
                            <span class="archived-banner-dt">
                                <svg width="12" height="12" fill="none" stroke="#dc2626" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                {archivedDateFormatted}
                            </span>
                        </template>
                        <template if:true={formData.archiveReason}>
                            <span class="archived-banner-reason">
                                <strong>Reason:</strong> {formData.archiveReason}
                            </span>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- SECTION 1: PROPERTY DETAILS -->
        <template if:true={notFinalChecks}>
        <div class="form-card">
            <div class="section-banner">
                <div class="dot"></div>
                <h2>Property Details</h2>
            </div>

            <table class="form-table">
                <!-- Column widths: label(8%) value(12%) | label(8%) value(12%) | label(8%) value(14%) | label(8%) value(12%) | label(6%) notes(12%) -->
                <colgroup>
                    <col style="width:8%">
                    <col style="width:12%">
                    <col style="width:8%">
                    <col style="width:12%">
                    <col style="width:8%">
                    <col style="width:14%">
                    <col style="width:8%">
                    <col style="width:12%">
                    <col style="width:6%">
                    <col style="width:12%">
                </colgroup>

                <!-- TABLE HEADER -->
                <tr>
                    <td colspan="10" class="cell-label-dark" style="text-align:center; font-size:13px; letter-spacing:0.1em;">PROPERTY DETAILS</td>
                </tr>

                <!-- Row 1: Sub-headers -->
                <tr>
                    <td colspan="2" class="cell-label-header">House Builder</td>
                    <td colspan="2" class="cell-label-header">Property Address</td>
                    <td class="cell-label">Vendor 1</td>
                    <td class="cell-input name-value-cell">
                        <c-custom-lookup-lwc
                            class="name-value-lookup"
                            hide-entity-icon
                            action-icon-name="utility:edit"
                            selected-icon-name="standard:contact"
                            object-label="Contact"
                            object-api-name="Contact"
                            field-api-name="Name"
                            selected-record-id={formData.vendor1}
                            selected-record-name={formData.vendor1Name}
                            data-field="vendor1"
                            onvalueselected={handleLookupChange}>
                        </c-custom-lookup-lwc>
                    </td>
                    <td class="cell-label">Received</td>
                    <td class="cell-input">
                        <input type="date" class="field-input" value={formData.dateReceived} data-field="dateReceived" onchange={handleInputChange}>
                    </td>
                    <td class="cell-label cell-label-vertical" rowspan="4">Notes</td>
                    <td class="cell-input" rowspan="4" style="vertical-align:top;">
                        <div class="notes-wrapper">
                            <textarea class="field-textarea" placeholder="Application notes…" data-field="notes" onchange={handleInputChange}>{formData.notes}</textarea>
                        </div>
                    </td>
                </tr>

                <!-- Row 2: House Builder value + Address + Mobile + Expectations -->
                <tr>
                    <td colspan="2" class="cell-input cell-border-right name-value-cell" style="text-align:center;">
                        <c-custom-lookup-lwc
                            class="name-value-lookup"
                            hide-entity-icon
                            action-icon-name="utility:edit"
                            selected-icon-name="standard:account"
                            object-label="Account"
                            object-api-name="Account"
                            field-api-name="Name"
                            selected-record-id={formData.houseBuilder}
                            selected-record-name={formData.houseBuilderName}
                            data-field="houseBuilder"
                            onvalueselected={handleLookupChange}>
                        </c-custom-lookup-lwc>
                    </td>
                    <td colspan="2" class="cell-input cell-border-right" rowspan="2" style="text-align:center; vertical-align:top;">
                        <div class="notes-wrapper">
                            <textarea class="field-textarea text-center" rows="4" placeholder="Enter full address…" data-field="propertyAddress" onchange={handleInputChange} style="height:80px;">{formData.propertyAddress}</textarea>
                        </div>
                    </td>
                    <td class="cell-label">Mobile</td>
                    <td class="cell-input">
                        <input type="tel" class="field-input" placeholder="+44…" value={formData.mobile} data-field="mobile" onchange={handleInputChange}>
                    </td>
                    <td class="cell-label">Expectations</td>
                    <td class="cell-input">
                        <div class="currency-wrapper-centered">
                            <span class="currency-prefix expectations-prefix">£</span>
                            <input type="text" inputmode="decimal" class="field-input-currency expectations-value" placeholder="0.00" value={formData.expectations} data-field="expectations" onchange={handleInputChange}>
                        </div>
                    </td>
                </tr>

                <!-- Row 3: Development + Phone + ALCD -->
                <tr>
                    <td class="cell-label">Development</td>
                    <td class="cell-input cell-border-right" style="text-align:center;">
                        <input type="text" class="field-input text-center" placeholder="Development name" value={formData.development} data-field="development" onchange={handleInputChange}>
                    </td>
                    <td class="cell-label">Phone</td>
                    <td class="cell-input">
                        <input type="tel" class="field-input" placeholder="+44…" value={formData.landline} data-field="landline" onchange={handleInputChange}>
                    </td>
                    <td class="cell-label">ALCD</td>
                    <td class="cell-input">
                        <input type="month" class="field-input" value={formData.alcd} data-field="alcd" onchange={handleInputChange}>
                    </td>
                </tr>

                <!-- Row 4: Plot + Get Direction + Email + Scheme -->
                <tr>
                    <td class="cell-label">Plot</td>
                    <td class="cell-input cell-border-right" style="text-align:center;">
                        <input type="text" class="field-input text-center" placeholder="Plot #" value={formData.plot} data-field="plot" onchange={handleInputChange}>
                    </td>
                    <td colspan="2" class="cell-label cell-clickable" style="text-align:center; cursor:pointer;" onclick={handleGetDirection}>
                        Get Direction
                    </td>
                    <td class="cell-label">Email</td>
                    <td class="cell-input">
                        <input type="email" class="field-input" placeholder="vendor@email.com" value={formData.email} data-field="email" onchange={handleInputChange}>
                    </td>
                    <td class="cell-label">Scheme</td>
                    <td class="cell-input cell-select-container">
                        <lightning-combobox
                            name="scheme"
                            label="Scheme"
                            variant="label-hidden"
                            value={formData.scheme}
                            placeholder="Select scheme…"
                            options={schemeOptions}
                            onchange={handleInputChange}
                            data-field="scheme"
                            class="custom-combobox">
                        </lightning-combobox>
                        <!-- Debugging: <span style="font-size:8px; display:block; padding: 2px;">Value: {formData.scheme}</span> -->
                    </td>
                    <!-- Block 5 (Spanned) -->
                </tr>
            </table>
        </div>


    <!-- SECTION 2: AGENT DETAILS -->
    <div class="form-card">
        <div class="section-banner">
            <div class="dot"></div>
            <h2>Agent Details / Valuation Figures / Recommendations</h2>
            <button class="banner-btn" onclick={handleOpenAssignAgent} title="Find & Assign Nearest Agents">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                Assign Agent
            </button>
        </div>

        <table class="form-table">
            <tr>
                <td class="cell-empty" style="width:150px;"></td>
                <td class="cell-agent-header" colspan="2">Agent 1</td>
                <td class="cell-agent-header" colspan="2">Agent 2</td>
                <td class="cell-agent-header" colspan="2">Agent 3</td>
            </tr>
            <tr>
                <td class="cell-label">Company Name</td>
                <td class="cell-input agent-name-cell name-value-cell" colspan="2">
                    <div class="agent-lookup-row">
                        <c-custom-lookup-lwc
                            class="name-value-lookup"
                            hide-entity-icon
                            action-icon-name="utility:edit"
                            selected-icon-name="standard:account"
                            object-label="Account"
                            object-api-name="Account"
                            field-api-name="Name"
                            selected-record-id={formData.agent1}
                            selected-record-name={formData.agent1Name}
                            data-field="agent1"
                            onvalueselected={handleLookupChange}>
                        </c-custom-lookup-lwc>
                        <button class="agent-add-btn" data-agent="agent1" onclick={handleOpenQuickAgent} title="Create New Agent">+</button>
                    </div>
                </td>
                <td class="cell-input agent-name-cell name-value-cell" colspan="2">
                    <div class="agent-lookup-row">
                        <c-custom-lookup-lwc
                            class="name-value-lookup"
                            hide-entity-icon
                            action-icon-name="utility:edit"
                            selected-icon-name="standard:account"
                            object-label="Account"
                            object-api-name="Account"
                            field-api-name="Name"
                            selected-record-id={formData.agent2}
                            selected-record-name={formData.agent2Name}
                            data-field="agent2"
                            onvalueselected={handleLookupChange}>
                        </c-custom-lookup-lwc>
                        <button class="agent-add-btn" data-agent="agent2" onclick={handleOpenQuickAgent} title="Create New Agent">+</button>
                    </div>
                </td>
                <td class="cell-input agent-name-cell name-value-cell" colspan="2">
                    <div class="agent-lookup-row">
                        <c-custom-lookup-lwc
                            class="name-value-lookup"
                            hide-entity-icon
                            action-icon-name="utility:edit"
                            selected-icon-name="standard:account"
                            object-label="Account"
                            object-api-name="Account"
                            field-api-name="Name"
                            selected-record-id={formData.agent3}
                            selected-record-name={formData.agent3Name}
                            data-field="agent3"
                            onvalueselected={handleLookupChange}>
                        </c-custom-lookup-lwc>
                        <button class="agent-add-btn" data-agent="agent3" onclick={handleOpenQuickAgent} title="Create New Agent">+</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Telephone</td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="tel" class="field-input" value={formData.agent1Phone} data-field="agent1Phone" onchange={handleInputChange} placeholder="Telephone…">
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="tel" class="field-input" value={formData.agent2Phone} data-field="agent2Phone" onchange={handleInputChange} placeholder="Telephone…">
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="tel" class="field-input" value={formData.agent3Phone} data-field="agent3Phone" onchange={handleInputChange} placeholder="Telephone…">
                </td>
            </tr>
            <tr>
                <td class="cell-label">Email</td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="email" class="field-input" value={formData.agent1Email} data-field="agent1Email" onchange={handleInputChange} placeholder="Email address…">
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="email" class="field-input" value={formData.agent2Email} data-field="agent2Email" onchange={handleInputChange} placeholder="Email address…">
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <input type="email" class="field-input" value={formData.agent3Email} data-field="agent3Email" onchange={handleInputChange} placeholder="Email address…">
                </td>
            </tr>
            <tr>
                <td class="cell-label">Appointment</td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="appt-container">
                        <label class="desktop-val-toggle">
                            <input type="checkbox" checked={formData.agent1DesktopVal} data-agent="agent1" onchange={handleDesktopValToggle}>
                            <span class="dv-label">Desktop Valuation</span>
                        </label>
                        <template if:false={formData.agent1DesktopVal}>
                            <div class="appt-display">
                                <div class="appt-display-text">
                                    <template if:true={agent1HasAppt}>
                                        <span class="appt-date-text">{agent1ApptDisplay}</span>
                                    </template>
                                    <template if:false={agent1HasAppt}>
                                        <span class="appt-empty">No appointment set</span>
                                    </template>
                                </div>
                                <button class="appt-cal-btn" data-agent="agent1" onclick={handleOpenBooking} title="Book Appointment">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                </button>
                            </div>
                        </template>
                        <template if:true={formData.agent1DesktopVal}>
                            <div class="desktop-val-badge">Desktop Valuation — No visit required</div>
                        </template>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="appt-container">
                        <label class="desktop-val-toggle">
                            <input type="checkbox" checked={formData.agent2DesktopVal} data-agent="agent2" onchange={handleDesktopValToggle}>
                            <span class="dv-label">Desktop Valuation</span>
                        </label>
                        <template if:false={formData.agent2DesktopVal}>
                            <div class="appt-display">
                                <div class="appt-display-text">
                                    <template if:true={agent2HasAppt}>
                                        <span class="appt-date-text">{agent2ApptDisplay}</span>
                                    </template>
                                    <template if:false={agent2HasAppt}>
                                        <span class="appt-empty">No appointment set</span>
                                    </template>
                                </div>
                                <button class="appt-cal-btn" data-agent="agent2" onclick={handleOpenBooking} title="Book Appointment">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                </button>
                            </div>
                        </template>
                        <template if:true={formData.agent2DesktopVal}>
                            <div class="desktop-val-badge">Desktop Valuation — No visit required</div>
                        </template>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="appt-container">
                        <label class="desktop-val-toggle">
                            <input type="checkbox" checked={formData.agent3DesktopVal} data-agent="agent3" onchange={handleDesktopValToggle}>
                            <span class="dv-label">Desktop Valuation</span>
                        </label>
                        <template if:false={formData.agent3DesktopVal}>
                            <div class="appt-display">
                                <div class="appt-display-text">
                                    <template if:true={agent3HasAppt}>
                                        <span class="appt-date-text">{agent3ApptDisplay}</span>
                                    </template>
                                    <template if:false={agent3HasAppt}>
                                        <span class="appt-empty">No appointment set</span>
                                    </template>
                                </div>
                                <button class="appt-cal-btn" data-agent="agent3" onclick={handleOpenBooking} title="Book Appointment">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                </button>
                            </div>
                        </template>
                        <template if:true={formData.agent3DesktopVal}>
                            <div class="desktop-val-badge">Desktop Valuation — No visit required</div>
                        </template>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Agent Emailed</td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent1Emailed"
                        label="Agent 1 Emailed"
                        variant="label-hidden"
                        value={formData.agent1Emailed}
                        options={yesNoOptions}
                        data-field="agent1Emailed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent2Emailed"
                        label="Agent 2 Emailed"
                        variant="label-hidden"
                        value={formData.agent2Emailed}
                        options={yesNoOptions}
                        data-field="agent2Emailed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent3Emailed"
                        label="Agent 3 Emailed"
                        variant="label-hidden"
                        value={formData.agent3Emailed}
                        options={yesNoOptions}
                        data-field="agent3Emailed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Verbally Confirmed</td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent1Confirmed"
                        label="Agent 1 Confirmed"
                        variant="label-hidden"
                        value={formData.agent1Confirmed}
                        options={yesNoOptions}
                        data-field="agent1Confirmed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent2Confirmed"
                        label="Agent 2 Confirmed"
                        variant="label-hidden"
                        value={formData.agent2Confirmed}
                        options={yesNoOptions}
                        data-field="agent2Confirmed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
                <td class="cell-input yn-select" colspan="2">
                    <lightning-combobox
                        name="agent3Confirmed"
                        label="Agent 3 Confirmed"
                        variant="label-hidden"
                        value={formData.agent3Confirmed}
                        options={yesNoOptions}
                        data-field="agent3Confirmed"
                        onchange={handleInputChange}
                        class="custom-combobox">
                    </lightning-combobox>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Valuation Figures</td>
                <td class="cell-valuation-header" colspan="2">Agent 1 Valuation Figures</td>
                <td class="cell-valuation-header" colspan="2">Agent 2 Valuation Figures</td>
                <td class="cell-valuation-header" colspan="2">Agent 3 Valuation Figures</td>
            </tr>
            <tr>
                <td class="cell-label">Initial Asking Price</td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent1Initial} data-field="agent1Initial" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent2Initial} data-field="agent2Initial" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent3Initial} data-field="agent3Initial" onchange={handleInputChange}>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Target Sale</td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent1Target} data-field="agent1Target" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent2Target} data-field="agent2Target" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent3Target} data-field="agent3Target" onchange={handleInputChange}>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="cell-label">Bottom Line</td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent1Bottom} data-field="agent1Bottom" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent2Bottom} data-field="agent2Bottom" onchange={handleInputChange}>
                    </div>
                </td>
                <td class="cell-input agent-val" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" placeholder="0.00" value={formData.agent3Bottom} data-field="agent3Bottom" onchange={handleInputChange}>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="cell-label" rowspan="2" style="line-height:1.3;">New Home Solutions<br>Recommended:</td>
                <td class="cell-valuation-header" colspan="2" style="background:var(--nhs-sage-header);color:var(--section-title);">Market</td>
                <td class="cell-valuation-header" colspan="2" style="background:var(--nhs-sage-header);color:var(--section-title);">Target</td>
                <td class="cell-valuation-header" colspan="2" style="background:var(--nhs-sage-header);color:var(--section-title);">Forced</td>
            </tr>
            <tr>
                <td class="cell-currency" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" value={formData.market} data-field="market" onchange={handleInputChange} placeholder="0.00">
                    </div>
                </td>
                <td class="cell-currency" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" value={formData.target} data-field="target" onchange={handleInputChange} placeholder="0.00">
                    </div>
                </td>
                <td class="cell-currency" colspan="2">
                    <div class="currency-wrapper-centered">
                        <span class="currency-prefix">£</span>
                        <input type="text" inputmode="decimal" class="field-input-currency" value={formData.forced} data-field="forced" onchange={handleInputChange} placeholder="0.00">
                    </div>
                </td>
            </tr>
        </table>
    </div>
    </template>

    <!-- SECTION 3: VENDOR AVAILABILITY (shown at Vendor Availability stage) -->
    <template if:true={showVendorAvailability}>
        <c-nhs-vendor-availability
            record-id={recordId}
            vendor-name={formData.vendor1Name}
            vendor-phone={formData.mobile}
            vendor-email={formData.email}>
        </c-nhs-vendor-availability>
    </template>

    <!-- SECTION 4: AGENT BOOKING (shown at Agents Booked stage and beyond) -->
    <template if:true={showAgentBooking}>
        <c-nhs-agent-booking
            record-id={recordId}
            agent1-id={formData.agent1}
            agent1-name={formData.agent1Name}
            agent2-id={formData.agent2}
            agent2-name={formData.agent2Name}
            agent3-id={formData.agent3}
            agent3-name={formData.agent3Name}
            vendor-id={formData.vendor1}
            onagentbooked={handleAgentBookedFromBooking}>
        </c-nhs-agent-booking>
    </template>

    <!-- SECTION: FINAL CHECKS (shown at Final Checks stage) -->
    <template if:true={showFinalChecks}>
        <c-nhs-final-checks-page record-id={recordId}></c-nhs-final-checks-page>
    </template>

    <!-- BOX FILE STORAGE (always last before Vendor Notes) -->
    <template if:true={notFinalChecks}>
    <c-nhs-box-browser property-address={formData.propertyAddress} record-id={recordId}></c-nhs-box-browser>
    </template>

    <!-- VENDOR NOTES (always last) -->
    <template if:true={notFinalChecks}>
    <c-nhs-vendor-notes record-id={recordId}></c-nhs-vendor-notes>
    </template>

    <!-- PDF LIGHTBOX -->
    <template if:true={showPdfModal}>
        <div class="pdf-overlay">
            <div class="pdf-modal">
                <div class="pdf-spinner">
                    <div class="spinner-ring"></div>
                </div>
                <p class="pdf-status">{pdfStatus}</p>
            </div>
        </div>
    </template>

    <!-- COMMUNICATIONS HUB (expands on-demand above action bar) -->
    <template if:true={showCommsHub}>
        <c-nhs-communications-hub record-id={recordId}></c-nhs-communications-hub>
    </template>

    <!-- ACTION BAR -->
    <div class="action-bar">
        <button class="btn btn-secondary btn-comms" onclick={handleToggleCommsHub}>
            <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Comms Hub
        </button>
        <button class="btn btn-secondary" onclick={handleGeneratePdf}>
            <svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14"><path d="M3.5 1v3H1v8.5h12V4h-2.5V1h-7zm1 1h5v2h-5V2zM2 5h10v6.5H2V5zm2 1.5v1h6v-1H4zm0 2v1h4v-1H4z" fill="currentColor"/></svg>
            Generate PDF
        </button>
        <button class="btn btn-secondary" onclick={handleRefreshData}>
            &#8635; Refresh
        </button>
        <div class="action-bar-spacer"></div>
        <button class="btn btn-primary" onclick={handleSave}>Save Application</button>
        <button class="btn btn-ghost" onclick={handleCancel}>Cancel</button>
    </div>

    <!-- Archive Reason Modal -->
    <template if:true={showArchiveModal}>
        <div class="archive-overlay" onclick={handleArchiveOverlayClick}>
            <div class="archive-modal" onclick={handleArchiveModalClick}>
                <div class="archive-modal-icon">
                    <svg width="28" height="28" fill="none" stroke="#dc2626" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
                </div>
                <h3 class="archive-modal-title">Archive Application</h3>
                <p class="archive-modal-desc">Please provide a reason for archiving this application.</p>
                <lightning-textarea
                    label="Archive Reason"
                    variant="label-hidden"
                    placeholder="Enter reason for archiving..."
                    onchange={handleArchiveReasonInput}
                    class="archive-textarea">
                </lightning-textarea>
                <div class="archive-modal-actions">
                    <button class="archive-cancel-btn" onclick={handleArchiveCancel}>Cancel</button>
                    <button class="archive-confirm-btn" onclick={handleArchiveConfirm}>Archive Application</button>
                </div>
            </div>
        </div>
    </template>

    <!-- QUICK AGENT CREATE MODAL -->
    <template if:true={showQuickAgent}>
        <div class="archive-overlay" onclick={handleCloseQuickAgent}>
            <div class="archive-modal quick-agent-modal" onclick={handleArchiveModalClick}>
                <div class="qa-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4A6B5E" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                </div>
                <h3 class="qa-title">{quickAgentTitle}</h3>
                <p class="qa-desc">Create a new Estate Agent account and contact</p>
                <div class="qa-form">
                    <div class="qa-field">
                        <label class="qa-label">Company Name *</label>
                        <input type="text" class="qa-input" data-field="name" value={quickAgent.name} onchange={handleQuickAgentInput} placeholder="Estate agent company name">
                    </div>
                    <div class="qa-row">
                        <div class="qa-field qa-half">
                            <label class="qa-label">First Name</label>
                            <input type="text" class="qa-input" data-field="firstName" value={quickAgent.firstName} onchange={handleQuickAgentInput} placeholder="First name">
                        </div>
                        <div class="qa-field qa-half">
                            <label class="qa-label">Last Name *</label>
                            <input type="text" class="qa-input" data-field="lastName" value={quickAgent.lastName} onchange={handleQuickAgentInput} placeholder="Last name">
                        </div>
                    </div>
                    <div class="qa-field">
                        <label class="qa-label">Email</label>
                        <input type="email" class="qa-input" data-field="email" value={quickAgent.email} onchange={handleQuickAgentInput} placeholder="email@company.com">
                    </div>
                    <div class="qa-row">
                        <div class="qa-field qa-half">
                            <label class="qa-label">Mobile</label>
                            <input type="tel" class="qa-input" data-field="mobile" value={quickAgent.mobile} onchange={handleQuickAgentInput} placeholder="+44...">
                        </div>
                        <div class="qa-field qa-half">
                            <label class="qa-label">Phone</label>
                            <input type="tel" class="qa-input" data-field="phone" value={quickAgent.phone} onchange={handleQuickAgentInput} placeholder="+44...">
                        </div>
                    </div>
                </div>
                <div class="archive-modal-actions">
                    <button class="archive-cancel-btn" onclick={handleCloseQuickAgent}>Cancel</button>
                    <button class="qa-create-btn" onclick={handleCreateQuickAgent} disabled={isCreatingAgent}>
                        <template if:true={isCreatingAgent}>Creating...</template>
                        <template if:false={isCreatingAgent}>Create Agent</template>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- BOOKING LIGHTBOX -->
    <template if:true={showBookingModal}>
        <div class="archive-overlay" onclick={handleCloseBooking}>
            <div class="bk-modal" onclick={handleArchiveModalClick}>
                <div class="bk-header">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4A6B5E" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <h3>Book Appointment — {bookingAgentLabel}</h3>
                    <button class="af-close" onclick={handleCloseBooking}>&times;</button>
                </div>

                <template if:true={isLoadingSlots}>
                    <div class="af-loading">
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        <p>Loading available slots...</p>
                    </div>
                </template>

                <template if:false={isLoadingSlots}>
                    <template if:true={hasAvailableSlots}>
                        <div class="bk-slots">
                            <template for:each={availableSlots} for:item="slot">
                                <div class={slot.rowClass} key={slot.id} data-id={slot.id} onclick={handleSelectSlot}>
                                    <div class="bk-slot-date">
                                        <span class="bk-day">{slot.dayName}</span>
                                        <span class="bk-date">{slot.dateFormatted}</span>
                                    </div>
                                    <div class="bk-slot-times">
                                        <template if:true={slot.am}>
                                            <span class="bk-time-badge bk-am">AM</span>
                                        </template>
                                        <template if:true={slot.pm}>
                                            <span class="bk-time-badge bk-pm">PM</span>
                                        </template>
                                    </div>
                                    <template if:true={slot.isSelected}>
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#16a34a" stroke="#16a34a" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Time picker for selected slot -->
                        <template if:true={selectedSlotId}>
                            <div class="bk-time-picker">
                                <label class="bk-time-label">Select Time</label>
                                <div class="bk-time-options">
                                    <template for:each={timeOptions} for:item="t">
                                        <button class={t.btnClass} key={t.value} data-time={t.value} onclick={handleSelectTime}>{t.label}</button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasAvailableSlots}>
                        <div class="af-empty">No available vendor slots found. Add availability in the Vendor Availability section first.</div>
                    </template>
                </template>

                <div class="af-step-actions">
                    <button class="af-cancel-btn" onclick={handleCloseBooking}>Cancel</button>
                    <template if:true={canConfirmBooking}>
                        <button class="af-next-btn" onclick={handleConfirmBooking} disabled={isBooking}>
                            <template if:true={isBooking}>Booking...</template>
                            <template if:false={isBooking}>Confirm Booking</template>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- ASSIGN AGENT LIGHTBOX -->
    <template if:true={showAssignAgent}>
        <div class="archive-overlay" onclick={handleCloseAssignAgent}>
            <div class="af-modal" onclick={handleArchiveModalClick}>
                <div class="af-header">
                    <div class="af-header-left">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4A6B5E" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                        <h3>Assign Agent</h3>
                    </div>
                    <div class="af-steps">
                        <div class={step1Class}><span class="af-step-num">1</span><span class="af-step-text">Search</span></div>
                        <span class="af-step-line"></span>
                        <div class={step2Class}><span class="af-step-num">2</span><span class="af-step-text">Select Agents</span></div>
                        <span class="af-step-line"></span>
                        <div class={step3Class}><span class="af-step-num">3</span><span class="af-step-text">Confirm</span></div>
                    </div>
                    <button class="af-close" onclick={handleCloseAssignAgent}>&times;</button>
                </div>

                <!-- STEP 1: Property & Radius -->
                <template if:true={isStep1}>
                    <div class="af-step-body">
                        <div class="af-prop-card">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4A6B5E" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            <div>
                                <div class="af-prop-label">Property Address</div>
                                <div class="af-prop-addr">{formData.propertyAddress}</div>
                            </div>
                        </div>
                        <div class="af-radius-field">
                            <label class="af-radius-label">Search Radius</label>
                            <lightning-combobox
                                name="radius"
                                value={assignRadius}
                                options={radiusOptions}
                                onchange={handleRadiusChange}
                                variant="label-hidden"
                                class="af-radius-combo">
                            </lightning-combobox>
                        </div>
                        <div class="af-step-actions">
                            <button class="af-cancel-btn" onclick={handleCloseAssignAgent}>Cancel</button>
                            <button class="af-next-btn" onclick={handleSearchAgents}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                                Search Agents
                            </button>
                        </div>
                    </div>
                </template>

                <!-- STEP 2: Agent List -->
                <template if:true={isStep2}>
                    <template if:true={assignAgentInfo}>
                        <div class="af-info">{assignAgentInfo}</div>
                    </template>

                    <template if:true={isLoadingAgents}>
                        <div class="af-loading">
                            <lightning-spinner alternative-text="Searching" size="medium"></lightning-spinner>
                            <p>Searching for estate agents within {assignRadius} miles...</p>
                        </div>
                    </template>

                    <template if:false={isLoadingAgents}>
                        <template if:true={hasNearbyAgents}>
                            <div class="af-list">
                                <template for:each={nearbyAgents} for:item="agent">
                                    <div class={agent.rowClass} key={agent.id}>
                                        <div class="af-agent-info">
                                            <div class="af-agent-name">
                                                {agent.name}
                                                <a href={agent.rightmoveLink} target="_blank" class="af-rm-link" title="View on Rightmove">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00DEB6" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                                </a>
                                            </div>
                                            <div class="af-agent-meta">
                                                <span class="af-distance">{agent.distanceLabel}</span>
                                                <span class="af-postcode">{agent.postcode}</span>
                                                <template if:true={agent.city}>
                                                    <span class="af-city">{agent.city}</span>
                                                </template>
                                            </div>
                                            <div class="af-agent-contact">
                                                <template if:true={agent.phone}>
                                                    <span>T: {agent.phone}</span>
                                                </template>
                                                <template if:true={agent.mobile}>
                                                    <span>M: {agent.mobile}</span>
                                                </template>
                                                <template if:true={agent.email}>
                                                    <span>{agent.email}</span>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="af-actions">
                                            <template if:true={agent.isAssigned}>
                                                <span class="af-assigned-badge">{agent.assignedLabel}</span>
                                                <button class="af-change-btn" data-id={agent.id} data-name={agent.name} data-slot={agent.isAgent2} onclick={handleUnassignAgent} title="Change">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                                </button>
                                            </template>
                                            <template if:false={agent.isAssigned}>
                                                <button class="af-assign-btn af-btn-2" data-id={agent.id} data-name={agent.name} data-slot="agent2" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 2</button>
                                                <button class="af-assign-btn af-btn-3" data-id={agent.id} data-name={agent.name} data-slot="agent3" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 3</button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:false={hasNearbyAgents}>
                            <div class="af-empty">No agents found within {assignRadius} miles. Try increasing the radius.</div>
                        </template>
                        <div class="af-step-actions">
                            <button class="af-back-btn" onclick={handleBackToStep1}>Back</button>
                            <template if:true={assignedAgent2Name}>
                                <span class="af-selected-badge af-sel-2">Agent 2: {assignedAgent2Name}</span>
                            </template>
                            <template if:true={assignedAgent3Name}>
                                <span class="af-selected-badge af-sel-3">Agent 3: {assignedAgent3Name}</span>
                            </template>
                        </div>
                    </template>
                </template>

                <!-- STEP 3: Confirmation -->
                <template if:true={isStep3}>
                    <div class="af-step-body af-confirm">
                        <div class="af-confirm-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        </div>
                        <h3 class="af-confirm-title">Agents Assigned</h3>
                        <div class="af-confirm-detail">
                            <div class="af-confirm-row">
                                <span class="af-confirm-label af-label-2">Agent 2</span>
                                <span class="af-confirm-name">{assignedAgent2Name}</span>
                            </div>
                            <div class="af-confirm-row">
                                <span class="af-confirm-label af-label-3">Agent 3</span>
                                <span class="af-confirm-name">{assignedAgent3Name}</span>
                            </div>
                        </div>
                        <div class="af-step-actions">
                            <button class="af-next-btn" onclick={handleConfirmAssignment}>Done</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>
</template>
