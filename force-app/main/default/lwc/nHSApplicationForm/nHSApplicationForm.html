<template>
    <div class="form-wrapper">
        <!-- Sticky Header -->
        <header class="form-sticky-header">
            <div class="header-left">
                <h2>Application Form</h2>
            </div>
            <div class="header-right">
                <template if:true={logoUrl}>
                    <img src={logoUrl} alt="Housebuilder Logo" class="header-logo" />
                </template>
            </div>
        </header>

        <div class="layout-container">
            <!-- Side Navigation -->
            <aside class="side-nav-container">
                <div class="nav-card">
                    <template for:each={sections} for:item="nav">
                        <div key={nav.id} class={nav.itemClass} data-id={nav.id} onclick={handleNavClick}>
                            <lightning-icon icon-name={nav.icon} size="x-small" class="slds-m-right_small"></lightning-icon>
                            <span>{nav.label}</span>
                        </div>
                    </template>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
                </template>

                <!-- SECTION 1: House Builder Details -->
                <section class="section-card" data-id="housebuilder">
                    <div class="section-header-modern header-with-date">
                        <div class="header-title-group">
                            <lightning-icon icon-name="utility:company" size="small"></lightning-icon>
                            <h2>Housebuilder Details</h2>
                        </div>
                        <div class="header-date-group">
                            <label class="modern-label">Date of Enquiry</label>
                            <lightning-input 
                                disabled={isReadOnly} 
                                type="date" 
                                variant="label-hidden" 
                                name="dateOfApplicationReceived" 
                                value={formData.Application.dateOfApplicationReceived} 
                                onchange={handleApplicationChange}
                                max={todayDate}
                                message-when-range-overflow="Date of Enquiry cannot be in the future.">
                            </lightning-input>
                        </div>
                    </div>
                    <div class="modern-grid">
                        <div class="field-group">
                            <label class="modern-label">Housebuilder</label>
                            <c-custom-lookup-lwc 
                                label=""
                                selected-icon-name="standard:account" 
                                object-label="Account"
                                object-api-name="Account" 
                                field-api-name="Name"
                                other-field-api-name="Industry" 
                                selected-record-id={housebuilderId} 
                                disabled={isReadOnly}
                                onvalueselected={handleValueSelectedOnAccount}>
                            </c-custom-lookup-lwc>
                        </div>
                        <div class="field-group">
                            <label class="modern-label">Development Name</label>
                            <lightning-input disabled={isReadOnly} type="text" variant="label-hidden" name="development" value={formData.Application.development} onchange={handleApplicationChange}></lightning-input>
                        </div>
                        <div class="field-group">
                            <label class="modern-label">Plot Number</label>
                            <lightning-input 
                                disabled={isReadOnly} 
                                type="number" 
                                variant="label-hidden" 
                                name="plot" 
                                value={formData.Application.plot} 
                                onchange={handleApplicationChange}
                                max="999"
                                message-when-range-overflow="Plot number can be a maximum of 3 digits only.">
                            </lightning-input>
                        </div>
                        <div class="field-group">
                            <label class="modern-label">Scheme</label>
                            <lightning-combobox variant="label-hidden" name="scheme" value={formData.Application.scheme} options={options} disabled={isReadOnly} onchange={handleApplicationChange}></lightning-combobox>
                        </div>
                        <div class="field-group">
                            <label class="modern-label">ALCD Start Date</label>
                            <template if:false={isReadOnly}>
                                <input name="startDate" class="startDateInput" type="month" id="startDateInput" onchange={handleApplicationChange} style="height: 32px; border: 1px solid #d8dde6; border-radius: 4px; padding: 0 12px; width: 100%;">
                            </template>
                            <template if:true={isReadOnly}>
                                <lightning-input type="text" variant="label-hidden" value={startDateInputs} disabled></lightning-input>
                            </template>
                        </div>
                        <div class="field-group">
                            <label class="modern-label">ALCD End Date</label>
                            <template if:false={isReadOnly}>
                                <input name="endDate" class="endDateInput" type="month" id="endDateInput" onchange={handleApplicationChange} style="height: 32px; border: 1px solid #d8dde6; border-radius: 4px; padding: 0 12px; width: 100%;">
                            </template>
                            <template if:true={isReadOnly}>
                                <lightning-input type="text" variant="label-hidden" value={endDateInputs} disabled></lightning-input>
                            </template>
                        </div>
                    </div>
                </section>

                <!-- SECTION 3 & 4: Property Details (Merged) -->
                <section class="section-card" data-id="property-details">
                    <div class="section-header-modern">
                        <lightning-icon icon-name="utility:retail_execution" size="small"></lightning-icon>
                        <h2>Property Details</h2>
                        <template if:false={isReadOnly}>
                            <button class="address-mode-toggle" type="button" onclick={handleToggleAddressMode} title={addressToggleTitle}>
                                <template if:false={manualAddressMode}>
                                    <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                                    <span>Enter Manually</span>
                                </template>
                                <template if:true={manualAddressMode}>
                                    <lightning-icon icon-name="utility:search" size="xx-small"></lightning-icon>
                                    <span>Use Search</span>
                                </template>
                            </button>
                        </template>
                    </div>

                    <!-- Search Component -->
                    <template if:false={isReadOnly}>
                        <template if:false={manualAddressMode}>
                            <div class="slds-m-bottom_medium">
                                <label class="modern-label">Search Property</label>
                                <c-idealaddresslookup
                                    selected-icon-name="standard:account"
                                    object-label="Property"
                                    object-api-name="NHS_Property__c"
                                    field-api-name="Name"
                                    other-field-api-name="Industry"
                                    onvalueselected={handleValueSelectedOnAccounts}>
                                </c-idealaddresslookup>
                            </div>
                        </template>

                        <!-- Manual address entry -->
                        <template if:true={manualAddressMode}>
                            <div class="manual-address-grid">
                                <div class="manual-field manual-field-full">
                                    <label class="modern-label">Street Address</label>
                                    <lightning-input variant="label-hidden" data-manual="street" value={formData.Property.street} onchange={handleManualAddressChange} placeholder="e.g. Flat 12, 42 High Street"></lightning-input>
                                </div>
                                <div class="manual-field">
                                    <label class="modern-label">City / Town</label>
                                    <lightning-input variant="label-hidden" data-manual="city" value={formData.Property.city} onchange={handleManualAddressChange} placeholder="e.g. Leeds"></lightning-input>
                                </div>
                                <div class="manual-field">
                                    <label class="modern-label">Postcode</label>
                                    <lightning-input variant="label-hidden" data-manual="pcode" value={formData.Property.pcode} onchange={handleManualAddressChange} placeholder="e.g. LS1 4AB"></lightning-input>
                                </div>
                                <div class="manual-field manual-field-full">
                                    <label class="modern-label">Country</label>
                                    <lightning-input variant="label-hidden" data-manual="country" value={formData.Property.country} onchange={handleManualAddressChange} placeholder="United Kingdom"></lightning-input>
                                </div>
                            </div>
                        </template>
                    </template>

                    <!-- Compact address display after selection -->
                    <template if:true={propertAddress}>
                        <div class="address-summary">
                            <div class="address-text">{propertAddress}</div>
                        </div>
                    </template>

                    <!-- Hidden field mapping (needed for data binding) -->
                    <template if:false={isReadOnly}>
                        <div class="hidden-fields">
                            <lightning-record-edit-form object-api-name="NHS_Property__c">
                                <template for:each={mapData} for:item="keyValue">
                                    <div key={keyValue.key}>
                                        <template for:each={keyValue.value} for:item="field">
                                            <lightning-input-field key={field.fieldPath} field-name={field.fieldPath} data-field-name={field.fieldPath} disabled></lightning-input-field>
                                        </template>
                                    </div>
                                </template>
                            </lightning-record-edit-form>
                        </div>
                    </template>
                </section>


                <!-- SECTION 5: Vendor Details -->
                <section class="section-card" data-id="vendor-details">
                    <div class="section-header-modern">
                        <lightning-icon icon-name="utility:groups" size="small"></lightning-icon>
                        <h2>Vendor Details</h2>
                    </div>
                    <div class="two-column-grid slds-m-bottom_large">
                        <div class="field-group">
                            <h3 class="slds-text-title_bold slds-m-bottom_small">Vendor 1</h3>
                            <lightning-input disabled={isReadOnly} type="text" label="First Name" name="firstname" value={formData.Vendor.firstname} onchange={handleVendorChange}></lightning-input>
                            <lightning-input disabled={isReadOnly} type="text" label="Last Name" name="lastname" data-field-name="lastname" value={formData.Vendor.lastname} onchange={handleVendorChange} required></lightning-input>
                            <lightning-input disabled={isReadOnly} type="email" label="Email" name="email" value={formData.Vendor.email} onchange={handleVendorChange}></lightning-input>
                            <lightning-input disabled={isReadOnly} type="tel" label="Phone" name="mobilePhone" value={formData.Vendor.mobilePhone} onchange={handleVendorChange}></lightning-input>
                        </div>
                        <div class="field-group">
                            <h3 class="slds-text-title_bold slds-m-bottom_small">Vendor 2</h3>
                            <lightning-input disabled={isReadOnly} type="text" label="First Name" name="firstname1" value={formData.Vendor.firstname1} onchange={handleVendorChange}></lightning-input>
                            <lightning-input disabled={isReadOnly} type="text" label="Last Name" name="lastname1" value={formData.Vendor.lastname1} onchange={handleVendorChange}></lightning-input>
                            <lightning-input disabled={isReadOnly} type="email" label="Email" name="email1" value={formData.Vendor.email1} onchange={handleVendorChange}></lightning-input>
                            <lightning-input disabled={isReadOnly} type="tel" label="Phone" name="mobilePhone1" value={formData.Vendor.mobilePhone1} onchange={handleVendorChange}></lightning-input>
                        </div>
                    </div>
                </section>

                <!-- SECTION 6: Property Description -->
                <section class="section-card" data-id="property-description">
                    <div class="section-header-modern">
                        <lightning-icon icon-name="utility:description" size="small"></lightning-icon>
                        <h2>Property Description</h2>
                    </div>
                    <div class="modern-grid">
                        <div class="field-group two-third-width">
                            <h3 class="slds-text-title_bold slds-m-bottom_small">Type</h3>
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Detached" name="Detached" checked={formData.Property.Detached} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Semi Detached" name="SemiDetached" checked={formData.Property.SemiDetached} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="End Terrace" name="EndTerrace" checked={formData.Property.EndTerrace} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Mid Terrace" name="MidTerrace" checked={formData.Property.MidTerrace} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Apartment" name="Apartment" checked={formData.Property.Apartment} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Maisonette" name="Maisonette" checked={formData.Property.Maisonette} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Studio" name="Studio" checked={formData.Property.Studio} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Bungalow" name="Bungalow" checked={formData.Property.Bungalow} onchange={handlePropertChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-bottom_x-small">
                                    <lightning-input disabled={isReadOnly} type="checkbox" label="Other" name="Other" checked={formData.Property.Other} onchange={handlePropertChange}></lightning-input>
                                </div>
                            </div>
                            <!-- Conditional Other Note -->
                            <template if:true={formData.Property.Other}>
                                <div class="slds-m-top_medium">
                                    <label class="modern-label">Other Notes</label>
                                    <lightning-textarea 
                                        disabled={isReadOnly}
                                        label=""
                                        name="Other_Note"
                                        value={formData.Property.Other_Note}
                                        onchange={handlePropertChange}
                                        placeholder="Please specify other property details..."
                                        class="modern-textarea">
                                    </lightning-textarea>
                                </div>
                            </template>
                        </div>
                        <div class="field-group">
                            <lightning-combobox label="Number of Bedrooms" name="NumberofBedrooms" value={formData.Property.NumberofBedrooms} options={numberOfBedrooms} disabled={isReadOnly} onchange={handlePropertChange}></lightning-combobox>
                        </div>
                    </div>
                </section>

                <!-- SECTION 7: Additional Details -->
                <section class="section-card" data-id="additional-details">
                    <div class="section-header-modern">
                        <lightning-icon icon-name="utility:add" size="small"></lightning-icon>
                        <h2>Additional Details</h2>
                    </div>
                    <div class="modern-grid">
                        <div class="field-group">
                            <label class="modern-label">Vendor's Expectations</label>
                            <lightning-input disabled={isReadOnly} type="number" variant="label-hidden" name="expectation" formatter="currency" step=".01" value={formData.Application.expectation} onchange={handleApplicationChange}></lightning-input>
                        </div>
                        <div class="field-group full-width slds-m-top_small">
                            <label class="modern-label">Notes</label>
                            <lightning-textarea disabled={isReadOnly} label="" variant="label-hidden" name="notes" placeholder="Any additional notes..." value={formData.Application.notes} onchange={handleApplicationChange} class="modern-textarea"></lightning-textarea>
                        </div>
                    </div>
                </section>

                <!-- SUCCESS MESSAGE -->
                <template if:true={finalCheck}>
                    <div class="section-card slds-text-align_center">
                        <lightning-icon icon-name="action:approval" size="large" class="slds-m-bottom_medium"></lightning-icon>
                        <h2 class="slds-text-heading_medium">{finalMessage}</h2>
                        <div class="slds-m-top_medium success-actions">
                            <lightning-button label="Download PDF Summary" variant="brand-outline" onclick={handleDownloadPdf} icon-name="utility:download"></lightning-button>
                            <lightning-button label="Go to Application" variant="brand" onclick={handleGoToApplication} icon-name="utility:forward" icon-position="right"></lightning-button>
                        </div>
                    </div>
                </template>

            </main>
        </div>

        <!-- Footer Actions -->
        <footer class="form-footer">
            <lightning-button variant="neutral" label="Cancel" onclick={handleClickCancel}></lightning-button>
            <lightning-button variant="brand" label="Save & Submit" onclick={handleSaveAndSubmit} disabled={disable}></lightning-button>
        </footer>
    </div>

    <!-- Soft-warning modal — recommended fields not filled -->
    <template if:true={showWarningModal}>
        <div class="nhs-warn-overlay">
            <div class="nhs-warn-modal">
                <div class="nhs-warn-header">
                    <div class="nhs-warn-icon">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    </div>
                    <div class="nhs-warn-titles">
                        <h3>Some recommended details are missing</h3>
                        <p>You can still submit the application, but please consider adding these details before proceeding.</p>
                    </div>
                </div>
                <div class="nhs-warn-body">
                    <ul class="nhs-warn-list">
                        <template for:each={warningList} for:item="w">
                            <li key={w.key}>
                                <span class="nhs-warn-dot"></span>
                                <span class="nhs-warn-label">{w.label}</span>
                            </li>
                        </template>
                    </ul>
                </div>
                <div class="nhs-warn-footer">
                    <button type="button" class="nhs-warn-btn nhs-warn-btn-secondary" onclick={handleWarningCancel}>
                        Go Back &amp; Fix
                    </button>
                    <button type="button" class="nhs-warn-btn nhs-warn-btn-primary" onclick={handleWarningContinue}>
                        Continue Anyway
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Original Modals (Preserved) -->
    <template if:true={isModalOpen}>
        <div class="custom-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Processing Application</h2>
                </div>
                <div class="modal-body">
                    <template for:each={processResults} for:item="res">
                        <div key={res.id} class="result-row">
                            <div class={res.animationClass}></div>
                            <span>{res.message}</span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
</template>
