<template>

  <!-- ========== 1. PAGE HEADER ========== -->
  <div class="page-hdr">
    <div class="page-hdr-top">
      <div>
        <h1 class="prop-title">{propertyAddress}</h1>
        <div class="prop-meta">
          <span class="meta-tag">Application: {formData.vendor1Name}</span>
          <span class="meta-tag">{formData.houseBuilderName}</span>
          <span class="meta-tag">Plot {formData.plot} &middot; {formData.development}</span>
        </div>
      </div>
      <div class="page-hdr-badges">
        <span class="ref-badge">REF: #{recordId}</span>
        <span class="status-badge">{formData.nhsProcess}</span>
      </div>
    </div>
  </div>

  <!-- ========== 2. PIPELINE ========== -->
  <div class="pipeline">
    <template for:each={pipelineSteps} for:item="step">
      <div key={step.value} class={step.stepClass} data-stage={step.value} onclick={handleStageClick}>
        <div class={step.dotClass}>{step.dotLabel}</div>
        <span class="pipe-label">{step.label}</span>
      </div>
    </template>
  </div>

  <!-- ========== 3. PAGE BODY ========== -->
  <div class="page-body">

    <!-- ===== MAIN COLUMN ===== -->
    <div class="main-col">

      <!-- ---- A. Property Details Card ---- -->
      <template if:true={notFinalChecks}>
      <div class={propCardClass}>
        <div class="card-header">
          <h2 class="card-title"><span class="card-title-dot"></span>Property Details</h2>
          <template if:true={notFinalChecks}>
          <div class="card-actions">
            <button class="action-btn" onclick={handleCallVendor} title="Call Vendor">
              <lightning-icon icon-name="utility:call" size="x-small"></lightning-icon>
              <span>Call</span>
            </button>
            <button class="action-btn" onclick={handleEmailVendor} title="Email Vendor">
              <lightning-icon icon-name="utility:email" size="x-small"></lightning-icon>
              <span>Email</span>
            </button>
            <div class="qn-wrap">
              <button class="action-btn" onclick={handleToggleQuickNote} title="Quick Note">
                <lightning-icon icon-name="utility:note" size="x-small"></lightning-icon>
                <span>Notes</span>
              </button>
              <template if:true={showQuickNote}>
                <div class="qn-popup">
                  <div class="qn-header">
                    <span class="qn-title">Quick Note</span>
                    <button class="qn-close" onclick={handleToggleQuickNote}>&times;</button>
                  </div>
                  <textarea class="qn-textarea" placeholder="Type a quick note..." onchange={handleQuickNoteChange}>{quickNoteText}</textarea>
                  <div class="qn-footer">
                    <button class="btn-primary btn-sm" onclick={handleSaveQuickNote} disabled={isQuickNoteSaving}>
                      <template if:true={isQuickNoteSaving}>Saving...</template>
                      <template if:false={isQuickNoteSaving}>Save Note</template>
                    </button>
                  </div>
                </div>
              </template>
            </div>
            <a class="action-btn" href={googleMapsUrl} target="_blank" title="Get Directions">
              <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
              <span>Get Directions</span>
            </a>
          </div>
          </template><!-- /notFinalChecks actions -->
        </div>

        <div class="card-body">

          <!-- Property Address Box (green) -->
          <div class="prop-address-box">
            <div class="section-label" style="color: var(--nhs-dk);">Property Address</div>
            <div class="prop-grid-5">
              <div class="field">
                <label class="field-label">Address</label>
                <lightning-input
                  variant="label-hidden"
                  label="Address"
                  value={formData.propertyAddress}
                  data-field="propertyAddress"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">House Builder</label>
                <c-custom-lookup-lwc
                  object-api-name="Account"
                  icon-name="standard:account"
                  selected-record-id={formData.houseBuilderId}
                  placeholder="Search housebuilder..."
                  onlookup={handleHousebuilderLookup}>
                </c-custom-lookup-lwc>
              </div>
              <div class="field">
                <label class="field-label">Development</label>
                <lightning-input
                  variant="label-hidden"
                  label="Development"
                  value={formData.development}
                  data-field="development"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Plot</label>
                <lightning-input
                  variant="label-hidden"
                  label="Plot"
                  value={formData.plot}
                  data-field="plot"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Scheme</label>
                <select class="slds-select" data-field="scheme" onchange={handleFieldChange}>
                  <option value="">-- Select --</option>
                  <option value="Part Exchange" selected={isSchemePartExchange}>Part Exchange</option>
                  <option value="Assisted Sale" selected={isSchemeAssistedSale}>Assisted Sale</option>
                  <option value="New Home" selected={isSchemeNewHome}>New Home</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Vendor Info Box (blue) -->
          <div class="vendor-info-box">
            <div class="section-label" style="color: #1A4F7A;">Vendor Information</div>
            <div class="vendor-grid-4">
              <div class="field">
                <label class="field-label">Vendor Name</label>
                <lightning-input
                  variant="label-hidden"
                  label="Vendor Name"
                  value={formData.vendor1Name}
                  data-field="vendor1Name"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Mobile</label>
                <lightning-input
                  type="tel"
                  variant="label-hidden"
                  label="Mobile"
                  value={formData.vendorMobile}
                  data-field="vendorMobile"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Phone</label>
                <lightning-input
                  type="tel"
                  variant="label-hidden"
                  label="Phone"
                  value={formData.vendorPhone}
                  data-field="vendorPhone"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Email</label>
                <lightning-input
                  type="email"
                  variant="label-hidden"
                  label="Email"
                  value={formData.vendorEmail}
                  data-field="vendorEmail"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
            </div>
          </div>

          <!-- Metrics Row -->
          <div class="metrics-row">
            <div class="metric metric-highlight">
              <div class="metric-label">Vendor Expectations</div>
              <div class="metric-value">{vendorExpectationsDisplay}</div>
              <div class="metric-sub">Asking price</div>
            </div>
            <div class="metric">
              <div class="metric-label">Received Date</div>
              <div class="metric-value metric-value-sm">{receivedDateDisplay}</div>
              <div class="metric-sub">Application received</div>
            </div>
            <div class="metric">
              <div class="metric-label">ALCD</div>
              <div class="metric-value metric-value-sm">{etaCompEndDisplay}</div>
              <div class="metric-sub">Target completion</div>
            </div>
          </div>

        </div>
      </div>
      </template><!-- /notFinalChecks Property Details -->

      <!-- ---- B. Stage-Specific Cards ---- -->

      <!-- Vendor Availability -->
      <template if:true={showVendorAvailability}>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title"><span class="card-title-dot"></span>Vendor Availability</h2>
            <div class="va-toolbar">
              <span class="va-bulk-label">Mark:</span>
              <button class="va-bulk-btn va-bulk-all" onclick={handleVaBulkAll}>All Day</button>
              <button class="va-bulk-btn va-bulk-am" onclick={handleVaBulkAm}>AM (9–12)</button>
              <button class="va-bulk-btn va-bulk-pm" onclick={handleVaBulkPm}>PM (12–5)</button>
              <button class="va-bulk-btn va-bulk-clear" onclick={handleVaBulkClear}>✕ Clear</button>
            </div>
          </div>

          <!-- Vendor info strip -->
          <div class="va-vendor-strip">
            <div class="va-vendor-name">{formData.vendor1Name}</div>
            <div class="va-vendor-contact">{formData.vendorMobile}</div>
            <div class="va-vendor-contact">{formData.vendorEmail}</div>
          </div>

          <!-- Navigation -->
          <div class="va-nav">
            <button class="va-nav-btn" onclick={handleVaPrev}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
              Prev
            </button>
            <span class="va-range">{vaRangeLabel}</span>
            <button class="va-nav-btn" onclick={handleVaNext}>
              Next
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="va-nav-btn va-nav-today" onclick={handleVaToday}>Today</button>
          </div>

          <!-- Calendar -->
          <div class="va-calendar">
            <table class="va-table">
              <thead>
                <tr>
                  <th class="va-th-time">Period</th>
                  <template for:each={vaDays} for:item="day">
                    <th key={day.key} class={day.thClass}>
                      <template if:true={day.showWeekendToggle}>
                        <label class="va-weekend-toggle" data-di={day.idx} onclick={handleWeekendToggle}>
                          <input type="checkbox" checked={day.weekendEnabled}/>
                        </label>
                      </template>
                      <div class="va-day-name">{day.dayName}</div>
                      <div class="va-day-num">{day.dayNum}</div>
                      <template if:false={day.isDisabled}>
                        <button class={day.allBtnClass} data-di={day.idx} onclick={handleVaDayAll}>All</button>
                      </template>
                      <template if:true={day.isPast}>
                        <div class="va-past-label">Past</div>
                      </template>
                    </th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <!-- AM Row -->
                <tr>
                  <td class="va-td-label va-td-am">
                    <div class="va-period-name">AM</div>
                    <div class="va-period-desc">Before 9 am – 12 pm</div>
                  </td>
                  <template for:each={vaDays} for:item="day">
                    <td key={day.key} class={day.amCellClass} data-di={day.idx} data-period="am" onclick={handleVaCellClick}>
                      <template if:true={day.amActive}>
                        <span class="va-check">✓</span>
                      </template>
                    </td>
                  </template>
                </tr>
                <!-- PM Row -->
                <tr>
                  <td class="va-td-label va-td-pm">
                    <div class="va-period-name">PM</div>
                    <div class="va-period-desc">12 pm – 5 pm</div>
                  </td>
                  <template for:each={vaDays} for:item="day">
                    <td key={day.key} class={day.pmCellClass} data-di={day.idx} data-period="pm" onclick={handleVaCellClick}>
                      <template if:true={day.pmActive}>
                        <span class="va-check">✓</span>
                      </template>
                    </td>
                  </template>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Save -->
          <div class="va-footer">
            <button class="btn-primary" onclick={handleVaSave} disabled={isVaSaving}>Save Availability</button>
          </div>
        </div>
      </template>

      <!-- Book Agents -->
      <template if:true={showBookAgents}>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title"><span class="card-title-dot"></span>Book Agents</h2>
            <span class="ba-count">{bookingCountLabel}</span>
          </div>

          <!-- 3 Agent Status Cards -->
          <div class="ba-status-grid">
            <!-- Agent 1 -->
            <div class="ba-status ba-status-1">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-1">1</span>
                  <div>
                    <div class="ba-agent-label">Agent 1</div>
                    <div class="ba-agent-name">{formData.agent1Name}</div>
                  </div>
                </div>
                <template if:true={formData.agent1DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent1DesktopVal}>
                  <template if:true={ba1Booked}>
                    <span class="ba-booked-badge ba-badge-1">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent1DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent1DesktopVal}>
              <div class="ba-appt-box ba-appt-1">
                <template if:true={ba1Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba1DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba1TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba1Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba1Booked}>
                <div class="ba-action-btns">
                  <button class="ba-amend-btn" data-agent="1" onclick={handleBaAmend}>✏️ Amend Booking</button>
                  <button class="ba-cancel-btn" data-agent="1" onclick={handleBaCancel}>🗑 Cancel Booking</button>
                </div>
                <button class="ba-email-btn ba-email-1" data-agent="1" onclick={handleEmailAgent}>✉️ Email Agent 1</button>
                <template if:true={showBaCancel1}>
                  <div class="ba-cancel-confirm">
                    <template if:true={isBaCancelStep1}>
                      <div class="ba-cc-title">⚠️ Cancel appointment for Agent 1?</div>
                      <div class="ba-cc-text">This will remove the booking for <strong>{baCancelAgentName}</strong>. This cannot be undone.</div>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Keep Booking</button>
                        <button class="ba-cc-yes" onclick={handleBaCancelProceed}>Yes, Cancel</button>
                      </div>
                    </template>
                    <template if:true={isBaCancelStep2}>
                      <div class="ba-cc-title">📝 Cancellation Reason</div>
                      <textarea class="ba-cc-reason" placeholder="Please provide a reason for cancelling..." onchange={handleBaCancelReasonChange}></textarea>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Go Back</button>
                        <button class="ba-cc-confirm" onclick={handleBaCancelConfirm}>✕ Confirm Cancel</button>
                      </div>
                    </template>
                  </div>
                </template>
              </template>
              </template><!-- /notDesktopVal agent1 -->
            </div>

            <!-- Agent 2 -->
            <div class="ba-status ba-status-2">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-2">2</span>
                  <div>
                    <div class="ba-agent-label">Agent 2</div>
                    <div class="ba-agent-name">{formData.agent2Name}</div>
                  </div>
                </div>
                <template if:true={formData.agent2DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent2DesktopVal}>
                  <template if:true={ba2Booked}>
                    <span class="ba-booked-badge ba-badge-2">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent2DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent2DesktopVal}>
              <div class="ba-appt-box ba-appt-2">
                <template if:true={ba2Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba2DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba2TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba2Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba2Booked}>
                <div class="ba-action-btns">
                  <button class="ba-amend-btn" data-agent="2" onclick={handleBaAmend}>✏️ Amend Booking</button>
                  <button class="ba-cancel-btn" data-agent="2" onclick={handleBaCancel}>🗑 Cancel Booking</button>
                </div>
                <button class="ba-email-btn ba-email-2" data-agent="2" onclick={handleEmailAgent}>✉️ Email Agent 2</button>
                <template if:true={showBaCancel2}>
                  <div class="ba-cancel-confirm">
                    <template if:true={isBaCancelStep1}>
                      <div class="ba-cc-title">⚠️ Cancel appointment for Agent 2?</div>
                      <div class="ba-cc-text">This will remove the booking for <strong>{baCancelAgentName}</strong>. This cannot be undone.</div>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Keep Booking</button>
                        <button class="ba-cc-yes" onclick={handleBaCancelProceed}>Yes, Cancel</button>
                      </div>
                    </template>
                    <template if:true={isBaCancelStep2}>
                      <div class="ba-cc-title">📝 Cancellation Reason</div>
                      <textarea class="ba-cc-reason" placeholder="Please provide a reason for cancelling..." onchange={handleBaCancelReasonChange}></textarea>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Go Back</button>
                        <button class="ba-cc-confirm" onclick={handleBaCancelConfirm}>✕ Confirm Cancel</button>
                      </div>
                    </template>
                  </div>
                </template>
              </template>
              </template><!-- /notDesktopVal agent2 -->
            </div>

            <!-- Agent 3 -->
            <div class="ba-status ba-status-3">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-3">3</span>
                  <div>
                    <div class="ba-agent-label">Agent 3</div>
                    <div class="ba-agent-name">{formData.agent3Name}</div>
                  </div>
                </div>
                <template if:true={formData.agent3DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent3DesktopVal}>
                  <template if:true={ba3Booked}>
                    <span class="ba-booked-badge ba-badge-3">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent3DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent3DesktopVal}>
              <div class="ba-appt-box ba-appt-3">
                <template if:true={ba3Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba3DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba3TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba3Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba3Booked}>
                <div class="ba-action-btns">
                  <button class="ba-amend-btn" data-agent="3" onclick={handleBaAmend}>✏️ Amend Booking</button>
                  <button class="ba-cancel-btn" data-agent="3" onclick={handleBaCancel}>🗑 Cancel Booking</button>
                </div>
                <button class="ba-email-btn ba-email-3" data-agent="3" onclick={handleEmailAgent}>✉️ Email Agent 3</button>
                <template if:true={showBaCancel3}>
                  <div class="ba-cancel-confirm">
                    <template if:true={isBaCancelStep1}>
                      <div class="ba-cc-title">⚠️ Cancel appointment for Agent 3?</div>
                      <div class="ba-cc-text">This will remove the booking for <strong>{baCancelAgentName}</strong>. This cannot be undone.</div>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Keep Booking</button>
                        <button class="ba-cc-yes" onclick={handleBaCancelProceed}>Yes, Cancel</button>
                      </div>
                    </template>
                    <template if:true={isBaCancelStep2}>
                      <div class="ba-cc-title">📝 Cancellation Reason</div>
                      <textarea class="ba-cc-reason" placeholder="Please provide a reason for cancelling..." onchange={handleBaCancelReasonChange}></textarea>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Go Back</button>
                        <button class="ba-cc-confirm" onclick={handleBaCancelConfirm}>✕ Confirm Cancel</button>
                      </div>
                    </template>
                  </div>
                </template>
              </template>
              </template><!-- /notDesktopVal agent3 -->
            </div>
          </div>

          <!-- Availability Calendar Toggle -->
          <div class="ba-cal-toggle" onclick={handleBaToggleCal}>
            <span class="ba-cal-arrow">{baCalToggleIcon}</span>
            <span class="ba-cal-title">Availability Calendar</span>
            <span class="ba-cal-range">{baCalRangeLabel}</span>
            <template if:true={baAmendingAgent}>
              <span class="ba-cal-hint">Select a new slot for Agent {baAmendingAgent} below</span>
            </template>
            <div class="ba-cal-nav" onclick={handleBaCalNavStop}>
              <button class="va-nav-btn" onclick={handleBaCalPrev}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                Prev
              </button>
              <button class="va-nav-btn" onclick={handleBaCalToday}>Today</button>
              <button class="va-nav-btn" onclick={handleBaCalNext}>
                Next
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            </div>
          </div>

          <!-- Calendar Grid -->
          <template if:true={baCalExpanded}>
            <div class="ba-cal-wrap">
              <table class="ba-cal-table">
                <thead>
                  <tr>
                    <th class="ba-cal-th-time">Time Slot</th>
                    <template for:each={baCalDays} for:item="day">
                      <th key={day.key} class={day.thClass}>
                        <div class="va-day-name">{day.dayName}</div>
                        <div class="va-day-num">{day.dayNum}</div>
                      </th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template for:each={baCalRows} for:item="row">
                    <tr key={row.key}>
                      <td class={row.tdLabelClass}>{row.label}</td>
                      <template for:each={row.cells} for:item="cell">
                        <td key={cell.key} class={cell.tdClass}>
                          <template if:true={cell.available}>
                            <div class="ba-slot-grid">
                              <template for:each={cell.subSlots} for:item="sub">
                                <div key={sub.key} class={sub.chipClass} data-sub-key={sub.subKey} data-day-label={sub.dayLabel} data-slot-label={row.label} data-time={sub.time} onclick={handleBaSlotClick}>
                                  {sub.time}
                                  <template if:true={sub.hasAgents}>
                                    <div class="ba-chip-dots">
                                      <template for:each={sub.agentDots} for:item="dot">
                                        <span key={dot.key} class={dot.dotClass}></span>
                                      </template>
                                    </div>
                                  </template>
                                </div>
                              </template>
                            </div>
                          </template>
                          <template if:false={cell.available}>
                            <div class="ba-slot-empty">—</div>
                          </template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>

          <!-- Agent Picker Popover -->
          <template if:true={showBaPicker}>
            <div class="ba-picker-overlay" onclick={handleBaClosePicker}>
              <div class="ba-picker" onclick={handleBaPickerStop} style={baPickerStyle}>
                <div class="ba-picker-header">

          <h2 class="card-title"><span class="card-title-dot"></span>Application Notes</h2>
        </div>
        <div class="card-body" style="padding: 14px;">
          <textarea class="app-notes-textarea" placeholder="Application notes..." onchange={handleAppNotesChange}>{formData.notes}</textarea>
        </div>
      </div>

    </div>

  </div>

  <!-- ========== 4. BOTTOM BAR (fixed) ========== -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <button class="btn-bottom btn-comms" onclick={handleOpenCommsHub}>
        <lightning-icon icon-name="utility:chat" size="x-small"></lightning-icon>
        Comms Hub
      </button>
      <button class="btn-bottom btn-pdf" onclick={handleGeneratePdf}>
        <lightning-icon icon-name="utility:pdf_ext" size="x-small"></lightning-icon>
        Generate PDF
      </button>
      <button class="btn-bottom btn-refresh" onclick={handleRefresh}>
        <lightning-icon icon-name="utility:refresh" size="x-small"></lightning-icon>
        Refresh
      </button>
    </div>
    <div class="bottom-right">
      <template if:true={notFinalChecks}>
      <button class="btn-bottom btn-cancel" onclick={handleCancel}>Cancel</button>
      <template if:false={isSaving}>
        <template if:false={saveSuccess}>
          <button class="btn-bottom btn-save" onclick={handleSave}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Application
          </button>
        </template>
        <template if:true={saveSuccess}>
          <button class="btn-bottom btn-saved" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Saved
          </button>
        </template>
      </template>
      <template if:true={isSaving}>
        <button class="btn-bottom btn-saving" disabled>
          <span class="save-spinner"></span>
          Saving...
        </button>
      </template>
      </template><!-- /notFinalChecks for save buttons -->
    </div>
  </div>

  <!-- ========== 5. COMMS HUB OVERLAY ========== -->
  <template if:true={showCommsHub}>
    <div class="overlay-backdrop" onclick={handleCloseCommsHub}></div>
    <div class="overlay-panel">
      <c-nhs-communications-hub
        record-id={recordId}
        onclose={handleCloseCommsHub}>
      </c-nhs-communications-hub>
    </div>
  </template>

  <!-- ========== ASSIGN AGENT MODAL ========== -->
  <template if:true={showAssignAgent}>
    <div class="af-overlay" onclick={handleCloseAssignAgent}>
      <div class="af-modal" onclick={handleAssignModalClick}>
        <div class="af-header">
          <h3>Assign Agent</h3>
          <div class="af-steps">
            <div class={step1Class}><span class="af-step-num">1</span><span class="af-step-text">Search</span></div>
            <span class="af-step-line"></span>
            <div class={step2Class}><span class="af-step-num">2</span><span class="af-step-text">Select Agents</span></div>
            <span class="af-step-line"></span>
            <div class={step3Class}><span class="af-step-num">3</span><span class="af-step-text">Confirm</span></div>
          </div>
          <button class="af-close" onclick={handleCloseAssignAgent}>&times;</button>
        </div>

        <!-- Step 1: Search -->
        <template if:true={isStep1}>
          <div class="af-body">
            <div class="af-prop-card">
              <div class="af-prop-label">Property Address</div>
              <div class="af-prop-addr">{formData.propertyAddress}</div>
            </div>
            <div class="af-field">
              <label class="af-field-label">Search Radius</label>
              <lightning-combobox name="radius" value={assignRadius} options={radiusOptions} onchange={handleRadiusChange} variant="label-hidden"></lightning-combobox>
            </div>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleCloseAssignAgent}>Cancel</button>
              <button class="af-btn-next" onclick={handleSearchAgents}>Search Agents</button>
            </div>
          </div>
        </template>

        <!-- Step 2: Agent List -->
        <template if:true={isStep2}>
          <template if:true={assignAgentInfo}>
            <div class="af-info">{assignAgentInfo}</div>
          </template>
          <template if:true={isLoadingAgents}>
            <div class="af-loading"><lightning-spinner alternative-text="Searching" size="medium"></lightning-spinner></div>
          </template>
          <template if:false={isLoadingAgents}>
            <template if:true={hasNearbyAgents}>
              <div class="af-list">
                <template for:each={nearbyAgents} for:item="agent">
                  <div class={agent.rowClass} key={agent.id}>
                    <div class="af-agent-info">
                      <div class="af-agent-name">{agent.name}</div>
                      <div class="af-agent-meta">
                        <span class="af-distance">{agent.distanceLabel}</span>
                        <span>{agent.postcode}</span>
                      </div>
                      <div class="af-agent-contact">
                        <template if:true={agent.phone}><span>T: {agent.phone}</span></template>
                        <template if:true={agent.mobile}><span>M: {agent.mobile}</span></template>
                        <template if:true={agent.email}><span>{agent.email}</span></template>
                      </div>
                    </div>
                    <div class="af-agent-actions">
                      <template if:true={agent.isAssigned}>
                        <span class="af-assigned-badge">{agent.assignedLabel}</span>
                        <button class="af-unassign-btn" data-id={agent.id} onclick={handleUnassignAgent}>✕</button>
                      </template>
                      <template if:false={agent.isAssigned}>
                        <button class="af-assign-btn af-btn-a2" data-id={agent.id} data-name={agent.name} data-slot="agent2" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 2</button>
                        <button class="af-assign-btn af-btn-a3" data-id={agent.id} data-name={agent.name} data-slot="agent3" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 3</button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template if:false={hasNearbyAgents}>
              <div class="af-empty">No agents found within {assignRadius} miles.</div>
            </template>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleBackToStep1}>Back</button>
              <template if:true={assignedAgent2Name}><span class="af-sel-badge af-sel-2">Agent 2: {assignedAgent2Name}</span></template>
              <template if:true={assignedAgent3Name}><span class="af-sel-badge af-sel-3">Agent 3: {assignedAgent3Name}</span></template>
            </div>
          </template>
        </template>

        <!-- Step 3: Confirm -->
        <template if:true={isStep3}>
          <div class="af-body af-confirm">
            <div class="af-confirm-icon">✓</div>
            <h3>Agents Assigned</h3>
            <div class="af-confirm-detail">
              <div class="af-confirm-row"><span class="af-label-2">Agent 2</span><span>{assignedAgent2Name}</span></div>
              <div class="af-confirm-row"><span class="af-label-3">Agent 3</span><span>{assignedAgent3Name}</span></div>
            </div>
            <div class="af-actions">
              <button class="af-btn-next" onclick={handleConfirmAssignment}>Done</button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

</template>
