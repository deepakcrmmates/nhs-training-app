<template>
    <lightning-card title="UK Property Data" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
            <lightning-input label="Enter postcode"
                             value={postcode}
                             onchange={handlePostcodeChange}></lightning-input>
            <lightning-button label="Get Data"
                              onclick={fetchData}
                              variant="brand"
                              class="slds-m-top_small"></lightning-button>
            <template if:true={propertyData}>
                <p class="slds-m-top_medium">{propertyData}</p>
            </template>
            <template if:true={error}>
                <p class="slds-m-top_medium">{error}</p>
            </template>
        </div>
    </lightning-card>
</template>
