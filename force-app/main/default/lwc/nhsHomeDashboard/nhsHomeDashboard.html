<template>
    <div class="dash">
        <!-- Hero Greeting -->
        <div class="dash-hero">
            <div class="dash-hero-content">
                <div class="dash-greeting">
                    <h1>{greeting}, {firstName}</h1>
                    <p class="dash-date">{todayFormatted}</p>
                </div>
                <div class="dash-quick-actions">
                    <button class="dash-action-btn dash-action-primary" onclick={handleCreateApp}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                        New Application
                    </button>
                    <button class="dash-action-btn" onclick={handleSearchProperty}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        Search Property
                    </button>
                </div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="dash-kpis">
            <div class="dash-kpi">
                <div class="dash-kpi-icon kpi-blue">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
                </div>
                <div class="dash-kpi-data">
                    <span class="dash-kpi-value">{activeApplications}</span>
                    <span class="dash-kpi-label">Active Applications</span>
                </div>
            </div>
            <div class="dash-kpi">
                <div class="dash-kpi-icon kpi-green">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </div>
                <div class="dash-kpi-data">
                    <span class="dash-kpi-value">{newThisMonth}</span>
                    <span class="dash-kpi-label">New This Month</span>
                </div>
                <span class="dash-kpi-sub">{newThisWeek} this week</span>
            </div>
            <div class="dash-kpi">
                <div class="dash-kpi-icon kpi-amber">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                </div>
                <div class="dash-kpi-data">
                    <span class="dash-kpi-value">{upcomingAppointments}</span>
                    <span class="dash-kpi-label">Upcoming Appointments</span>
                </div>
                <span class="dash-kpi-sub">next 7 days</span>
            </div>
            <div class="dash-kpi">
                <div class="dash-kpi-icon kpi-sage">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
                </div>
                <div class="dash-kpi-data">
                    <span class="dash-kpi-value">{totalProperties}</span>
                    <span class="dash-kpi-label">Properties</span>
                </div>
                <span class="dash-kpi-sub">{totalAgents} agents</span>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="dash-grid">
            <!-- Pipeline -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <h2>Pipeline Overview</h2>
                </div>
                <div class="dash-card-body">
                    <template if:true={hasPipeline}>
                        <template for:each={pipelineData} for:item="stage">
                            <div key={stage.stage} class="pipe-row">
                                <span class="pipe-label">{stage.stage}</span>
                                <div class="pipe-bar-wrap">
                                    <div class="pipe-bar" style={stage.barStyle}></div>
                                </div>
                                <span class="pipe-count">{stage.count}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasPipeline}>
                        <p class="dash-empty-text">No active applications in pipeline</p>
                    </template>
                </div>
            </div>

            <!-- Upcoming Appointments -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <h2>Upcoming Appointments</h2>
                </div>
                <div class="dash-card-body">
                    <template if:true={hasEvents}>
                        <template for:each={events} for:item="evt">
                            <div key={evt.id} class="appt-row">
                                <div class="appt-date-badge">
                                    <span class="appt-day">{evt.dayNum}</span>
                                    <span class="appt-month">{evt.monthShort}</span>
                                </div>
                                <div class="appt-info">
                                    <div class="appt-subject">{evt.subject}</div>
                                    <div class="appt-meta">
                                        <span>{evt.timeDisplay}</span>
                                        <template if:true={evt.location}>
                                            <span> &middot; {evt.location}</span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasEvents}>
                        <p class="dash-empty-text">No appointments in the next 7 days</p>
                    </template>
                </div>
            </div>
        </div>

        <!-- Recent Applications -->
        <div class="dash-card dash-card-full">
            <div class="dash-card-header">
                <h2>Recent Applications</h2>
                <button class="dash-view-all" onclick={handleViewAll}>View All</button>
            </div>
            <div class="dash-card-body dash-card-body-table">
                <template if:true={hasRecent}>
                    <table class="dash-table">
                        <thead>
                            <tr>
                                <th>Property</th>
                                <th>Vendor</th>
                                <th>Housebuilder</th>
                                <th>Stage</th>
                                <th>Process</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={recentApps} for:item="app">
                                <tr key={app.id} class="dash-tr" onclick={handleAppClick} data-id={app.id}>
                                    <td class="dash-td-name">{app.name}</td>
                                    <td>{app.vendor}</td>
                                    <td>{app.houseBuilder}</td>
                                    <td><span class={app.stageClass}>{app.stage}</span></td>
                                    <td>{app.process}</td>
                                    <td class="dash-td-date">{app.dateDisplay}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>
        </div>
    </div>
</template>
