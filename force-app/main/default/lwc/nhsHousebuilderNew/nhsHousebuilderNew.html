<template>
    <div class="hb-wrap">
        <!-- Header -->
        <header class="hb-header">
            <div class="hb-header-left">
                <svg class="hb-logo-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="14" cy="20" r="11" fill="none" stroke="#4A6B5E" stroke-width="3.5"/>
                    <circle cx="26" cy="20" r="11" fill="none" stroke="#4A6B5E" stroke-width="3.5" opacity="0.55"/>
                    <circle cx="14" cy="20" r="4" fill="#4A6B5E"/>
                    <circle cx="26" cy="20" r="4" fill="#4A6B5E" opacity="0.55"/>
                </svg>
                <div>
                    <h1>New Housebuilder</h1>
                    <p class="hb-subtitle">Create a housebuilder account with contacts and branding</p>
                </div>
            </div>
        </header>

        <!-- Form body -->
        <div class="hb-body">
            <!-- Logo section -->
            <section class="hb-section">
                <div class="hb-section-header">
                    <span class="hb-dot"></span>
                    <h2>Company Logo</h2>
                </div>
                <div class="hb-logo-zone">
                    <template if:true={hasLogo}>
                        <div class="hb-logo-preview">
                            <img src={logoFile.previewUrl} alt="Logo preview"/>
                            <div class="hb-logo-info">
                                <div class="hb-logo-name">{logoFile.name}</div>
                                <div class="hb-logo-size">{logoFile.sizeLabel}</div>
                                <button class="hb-btn-link" onclick={handleRemoveLogo}>Remove</button>
                            </div>
                        </div>
                    </template>
                    <template if:false={hasLogo}>
                        <label class="hb-logo-upload">
                            <input type="file" accept="image/*" onchange={handleLogoChange}/>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span class="hb-logo-upload-title">Click to upload company logo</span>
                            <span class="hb-logo-upload-sub">PNG, JPG, SVG · max 4MB · saved to Box with public link</span>
                        </label>
                    </template>
                </div>
            </section>

            <!-- Company details -->
            <section class="hb-section">
                <div class="hb-section-header">
                    <span class="hb-dot"></span>
                    <h2>Company Details</h2>
                </div>
                <div class="hb-grid">
                    <div class="hb-field hb-col-full">
                        <label>Company Name *</label>
                        <input type="text" data-field="name" value={account.name} onchange={handleAccountChange} placeholder="e.g. Persimmon Homes Ltd"/>
                    </div>
                    <div class="hb-field">
                        <label>Email</label>
                        <input type="email" data-field="email" value={account.email} onchange={handleAccountChange} placeholder="info@example.com"/>
                    </div>
                    <div class="hb-field">
                        <label>Phone</label>
                        <input type="tel" data-field="phone" value={account.phone} onchange={handleAccountChange} placeholder="0330 000 0000"/>
                    </div>
                    <div class="hb-field hb-col-full">
                        <label>Website</label>
                        <input type="url" data-field="website" value={account.website} onchange={handleAccountChange} placeholder="https://example.com"/>
                    </div>
                    <div class="hb-field hb-col-full">
                        <label>Street Address</label>
                        <input type="text" data-field="street" value={account.street} onchange={handleAccountChange}/>
                    </div>
                    <div class="hb-field">
                        <label>City</label>
                        <input type="text" data-field="city" value={account.city} onchange={handleAccountChange}/>
                    </div>
                    <div class="hb-field">
                        <label>Postcode</label>
                        <input type="text" data-field="postcode" value={account.postcode} onchange={handleAccountChange}/>
                    </div>
                    <div class="hb-field">
                        <label>Country</label>
                        <input type="text" data-field="country" value={account.country} onchange={handleAccountChange}/>
                    </div>
                </div>
            </section>

            <!-- Contacts -->
            <section class="hb-section">
                <div class="hb-section-header">
                    <span class="hb-dot"></span>
                    <h2>Contacts</h2>
                    <button class="hb-btn-add" onclick={handleAddContact}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Add Contact
                    </button>
                </div>

                <template for:each={contacts} for:item="c" for:index="idx">
                    <div class="hb-contact-row" key={c.key}>
                        <div class="hb-contact-header">
                            <span class="hb-contact-num">Contact #{idx}</span>
                            <button class="hb-btn-link hb-btn-danger" data-key={c.key} onclick={handleRemoveContact}>Remove</button>
                        </div>
                        <div class="hb-grid">
                            <div class="hb-field">
                                <label>First Name</label>
                                <input type="text" data-key={c.key} data-field="firstName" value={c.firstName} onchange={handleContactChange}/>
                            </div>
                            <div class="hb-field">
                                <label>Last Name</label>
                                <input type="text" data-key={c.key} data-field="lastName" value={c.lastName} onchange={handleContactChange}/>
                            </div>
                            <div class="hb-field">
                                <label>Email</label>
                                <input type="email" data-key={c.key} data-field="email" value={c.email} onchange={handleContactChange}/>
                            </div>
                            <div class="hb-field">
                                <label>Mobile</label>
                                <input type="tel" data-key={c.key} data-field="mobile" value={c.mobile} onchange={handleContactChange}/>
                            </div>
                            <div class="hb-field hb-col-full">
                                <label>Job Title</label>
                                <input type="text" data-key={c.key} data-field="jobTitle" value={c.jobTitle} onchange={handleContactChange}/>
                            </div>
                        </div>
                    </div>
                </template>
            </section>
        </div>

        <!-- Footer -->
        <footer class="hb-footer">
            <button class="hb-btn hb-btn-secondary" onclick={handleCancel} disabled={isSaving}>Cancel</button>
            <button class="hb-btn hb-btn-primary" onclick={handleSave} disabled={isSaving}>
                <template if:true={isSaving}>
                    <lightning-spinner alternative-text="Saving" size="x-small" variant="inverse"></lightning-spinner>
                    Saving...
                </template>
                <template if:false={isSaving}>Save Housebuilder</template>
            </button>
        </footer>
    </div>
</template>
