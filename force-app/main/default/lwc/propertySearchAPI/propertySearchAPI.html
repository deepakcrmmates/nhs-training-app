<template>
    <lightning-card title="Property Data">
        <div class="slds-m-around_medium">
            <lightning-input label="Enter Postcode" value={postcode} onchange={handlePostcodeChange}></lightning-input>
            <lightning-button label="Get Data" onclick={fetchPropertyData}></lightning-button>
        </div>
        <template if:true={propertyData}>
            <div class="slds-m-around_medium">
                <lightning-card title="Property Data Response">
                    <pre>{formattedData}</pre>
                </lightning-card>
            </div>
        </template>
    </lightning-card>
</template>
