<template>
    <lightning-card title="Availability Table">
        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Availability</th>
                    <th>AM</th>
                    <th>PM</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={tableData} for:item="item">
                    <tr key={item.id}>
                        <td>{item.date}</td>
                        <td>
                            <button 
                                data-id={item.id}
                                class="slds-button slds-button_neutral"
                                onclick={toggleAvailability}
                                disabled={item.disabled} 
                            >
                                {item.buttonLabel}
                            </button>
                        </td>
                        <td>
                            <label class="slds-checkbox">
                                <input 
                                    type="checkbox" 
                                    data-id={item.id}
                                    data-field="am"
                                    onchange={handleCheckboxChange}
                                    checked={item.am}
                                    disabled={item.amDisabled}
                                />
                                <span class="slds-checkbox_faux"></span>
                                <span class="slds-assistive-text">AM</span>
                            </label>
                        </td>
                        <td>
                            <label class="slds-checkbox">
                                <input 
                                    type="checkbox" 
                                    data-id={item.id}
                                    data-field="pm"
                                    onchange={handleCheckboxChange}
                                    checked={item.pm}
                                    disabled={item.pmDisabled}
                                />
                                <span class="slds-checkbox_faux"></span>
                                <span class="slds-assistive-text">PM</span>
                            </label>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </lightning-card>
</template>
