<template>
    <template if:true={isLoading}>
        <div class="hbd-loading"><lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner></div>
    </template>

    <template if:false={isLoading}>
        <template if:true={error}>
            <div class="hbd-error">{error}</div>
        </template>

        <template if:true={data}>
            <!-- Hero header -->
            <div class="hbd-hero">
                <div class="hbd-hero-left">
                    <template if:true={hasLogoDisplay}>
                        <div class="hbd-logo-box">
                            <img src={displayLogoUrl} alt="Logo"/>
                        </div>
                    </template>
                    <template if:false={hasLogoDisplay}>
                        <div class="hbd-logo-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
                                <path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/>
                            </svg>
                        </div>
                    </template>
                    <div class="hbd-hero-info">
                        <span class="hbd-kicker">Housebuilder</span>
                        <h1>{data.name}</h1>
                        <template if:true={hasAddress}>
                            <a href={googleMapsUrl} target="_blank" class="hbd-address">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                                </svg>
                                {fullAddress}
                            </a>
                        </template>
                    </div>
                </div>
                <div class="hbd-contact-strip">
                    <button class="hbd-settings-btn" onclick={handleOpenSettings} title="Housebuilder settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <button class="hbd-edit-btn" onclick={handleShowEditHb} title="Edit Housebuilder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Edit
                    </button>
                    <template if:true={data.phone}>
                        <a href={phoneHref} class="hbd-quick">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.17 6.17l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <span>{data.phone}</span>
                        </a>
                    </template>
                    <template if:true={data.email}>
                        <a href={emailHref} class="hbd-quick">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            <span>{data.email}</span>
                        </a>
                    </template>
                    <template if:true={data.website}>
                        <a href={websiteHref} target="_blank" class="hbd-quick">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            <span>{data.website}</span>
                        </a>
                    </template>
                </div>
            </div>

            <!-- Tabs -->
            <div class="hbd-tabs">
                <button class={contactsTabClass} data-tab="contacts" onclick={handleTabClick}>
                    Contacts <span class="hbd-tab-count">{contactCount}</span>
                </button>
                <button class={appsTabClass} data-tab="apps" onclick={handleTabClick}>
                    Applications <span class="hbd-tab-count">{appCount}</span>
                </button>
                <button class={commsTabClass} data-tab="comms" onclick={handleTabClick}>
                    Comms History <span class="hbd-tab-count">{commsCount}</span>
                </button>
                <button class={prefAgentsTabClass} data-tab="prefagents" onclick={handleTabClick}>
                    Preferred Agents <span class="hbd-tab-count">{prefAgentsCount}</span>
                </button>
            </div>

            <!-- Contacts -->
            <template if:true={isContactsTab}>
                <div class="hbd-tab-body">
                    <div class="hbd-tab-actions">
                        <button class="hbd-btn-primary hbd-btn-sm" onclick={handleShowAddContact}>+ Add Contact</button>
                    </div>
                    <template if:true={hasContacts}>
                        <div class="hbd-contact-list">
                            <div class="hbd-contact-head">
                                <div class="hbd-col-name">Name</div>
                                <div class="hbd-col-title">Job Title</div>
                                <div class="hbd-col-email">Email</div>
                                <div class="hbd-col-mobile">Mobile</div>
                                <div class="hbd-col-phone">Phone</div>
                                <div class="hbd-col-action"></div>
                            </div>
                            <template for:each={contactsDisplay} for:item="c">
                                <div class="hbd-contact-row" key={c.id} data-id={c.id} onclick={handleContactClick}>
                                    <div class="hbd-col-name">
                                        <div class="hbd-contact-avatar">{c.initials}</div>
                                        <div class="hbd-contact-name">{c.fullName}</div>
                                    </div>
                                    <div class="hbd-col-title">
                                        <template if:true={c.jobTitle}>{c.jobTitle}</template>
                                        <template if:false={c.jobTitle}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-col-email">
                                        <template if:true={c.email}>
                                            <a href={c.emailHref} onclick={stopProp}>{c.email}</a>
                                        </template>
                                        <template if:false={c.email}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-col-mobile">
                                        <template if:true={c.mobile}>
                                            <a href={c.mobileHref} onclick={stopProp}>{c.mobile}</a>
                                        </template>
                                        <template if:false={c.mobile}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-col-phone">
                                        <template if:true={c.phone}>
                                            <a href={c.phoneHref} onclick={stopProp}>{c.phone}</a>
                                        </template>
                                        <template if:false={c.phone}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-col-action hbd-pa-actions">
                                        <button class="hbd-edit-row-btn" data-id={c.id} onclick={handleEditContact} title="Edit">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                        </button>
                                        <button class="hbd-delete-btn" data-id={c.id} onclick={handleDeleteContact} title="Delete">&times;</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasContacts}>
                        <div class="hbd-empty">No contacts added yet.</div>
                    </template>

                    <!-- Add contact modal -->
                    <template if:true={showAddContact}>
                        <div class="hbd-backdrop" onclick={handleCloseAddContact}></div>
                        <div class="hbd-modal">
                            <div class="hbd-modal-header">
                                <h3>Add Contact</h3>
                                <button class="hbd-modal-close" onclick={handleCloseAddContact}>&times;</button>
                            </div>
                            <div class="hbd-modal-body">
                                <div class="hbd-modal-grid">
                                    <div class="hbd-modal-field">
                                        <label>First Name</label>
                                        <input type="text" data-field="firstName" value={newContact.firstName} onchange={handleContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Last Name</label>
                                        <input type="text" data-field="lastName" value={newContact.lastName} onchange={handleContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Email</label>
                                        <input type="email" data-field="email" value={newContact.email} onchange={handleContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Mobile</label>
                                        <input type="tel" data-field="mobile" value={newContact.mobile} onchange={handleContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field hbd-col-full">
                                        <label>Job Title</label>
                                        <input type="text" data-field="jobTitle" value={newContact.jobTitle} onchange={handleContactFieldChange}/>
                                    </div>
                                </div>
                            </div>
                            <div class="hbd-modal-footer">
                                <button class="hbd-btn-secondary" onclick={handleCloseAddContact}>Cancel</button>
                                <button class="hbd-btn-primary" onclick={handleSaveContact}>Add Contact</button>
                            </div>
                        </div>
                    </template>

                    <!-- Edit contact modal -->
                    <template if:true={showEditContact}>
                        <div class="hbd-backdrop" onclick={handleCloseEditContact}></div>
                        <div class="hbd-modal">
                            <div class="hbd-modal-header">
                                <h3>Edit Contact</h3>
                                <button class="hbd-modal-close" onclick={handleCloseEditContact}>&times;</button>
                            </div>
                            <div class="hbd-modal-body">
                                <div class="hbd-modal-grid">
                                    <div class="hbd-modal-field">
                                        <label>First Name</label>
                                        <input type="text" data-field="firstName" value={editContact.firstName} onchange={handleEditContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Last Name</label>
                                        <input type="text" data-field="lastName" value={editContact.lastName} onchange={handleEditContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Email</label>
                                        <input type="email" data-field="email" value={editContact.email} onchange={handleEditContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Mobile</label>
                                        <input type="tel" data-field="mobile" value={editContact.mobile}
                                               pattern="[0-9+()\-\s]*" inputmode="tel"
                                               onkeypress={handleEditContactKeyPress}
                                               oninput={handleEditContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Phone</label>
                                        <input type="tel" data-field="phone" value={editContact.phone}
                                               pattern="[0-9+()\-\s]*" inputmode="tel"
                                               onkeypress={handleEditContactKeyPress}
                                               oninput={handleEditContactFieldChange}/>
                                    </div>
                                    <div class="hbd-modal-field hbd-col-full">
                                        <label>Job Title</label>
                                        <input type="text" data-field="jobTitle" value={editContact.jobTitle} onchange={handleEditContactFieldChange}/>
                                    </div>
                                </div>
                            </div>
                            <div class="hbd-modal-footer">
                                <button class="hbd-btn-secondary" onclick={handleCloseEditContact}>Cancel</button>
                                <button class="hbd-btn-primary" onclick={handleSaveEditContact} disabled={isEditContactSaving}>
                                    <template if:true={isEditContactSaving}>Saving…</template>
                                    <template if:false={isEditContactSaving}>Save Changes</template>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Applications -->
            <template if:true={isAppsTab}>
                <div class="hbd-tab-body">
                    <template if:true={hasApps}>
                        <div class="hbd-contact-list">
                            <div class="hbd-contact-head hbd-app-head">
                                <div>Application</div>
                                <div>Development</div>
                                <div>Plot</div>
                                <div>Vendor</div>
                                <div>Received</div>
                                <div class="hbd-app-stage-col">Stage</div>
                            </div>
                            <template for:each={appsDisplay} for:item="a">
                                <div class="hbd-contact-row hbd-app-row" key={a.id} data-id={a.id} onclick={handleAppClick}>
                                    <div class="hbd-app-name-col">
                                        <div class="hbd-contact-name">{a.name}</div>
                                        <div class="hbd-dim hbd-app-addr-sub">{a.propertyAddress}</div>
                                    </div>
                                    <div>
                                        <template if:true={a.development}>{a.development}</template>
                                        <template if:false={a.development}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div>
                                        <template if:true={a.plot}>{a.plot}</template>
                                        <template if:false={a.plot}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div>
                                        <template if:true={a.vendorName}>{a.vendorName}</template>
                                        <template if:false={a.vendorName}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-app-date">{a.createdDateFormatted}</div>
                                    <div class="hbd-app-stage-col"><span class={a.stageClass}>{a.nhsProcess}</span></div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasApps}>
                        <div class="hbd-empty">No applications for this housebuilder yet.</div>
                    </template>
                </div>
            </template>

            <!-- Comms -->
            <template if:true={isCommsTab}>
                <div class="hbd-tab-body">
                    <template if:true={hasComms}>
                        <div class="hbd-contact-list">
                            <div class="hbd-contact-head hbd-comms-head">
                                <div>Dir</div>
                                <div>Subject</div>
                                <div>From</div>
                                <div>To</div>
                                <div>When</div>
                            </div>
                            <template for:each={commsDisplay} for:item="c">
                                <div class="hbd-contact-row hbd-comms-row" key={c.id} data-id={c.id} onclick={handleCommsRowClick}>
                                    <div><span class={c.dirPill}>{c.direction}</span></div>
                                    <div class="hbd-comms-subject-col">
                                        <div class="hbd-contact-name">{c.subject}</div>
                                        <div class="hbd-dim hbd-comms-preview">{c.preview}</div>
                                    </div>
                                    <div>
                                        <template if:true={c.from}>{c.from}</template>
                                        <template if:false={c.from}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div>
                                        <template if:true={c.to}>{c.to}</template>
                                        <template if:false={c.to}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div class="hbd-comms-datecol">
                                        <div class="hbd-comms-relative">{c.relativeTime}</div>
                                        <div class="hbd-comms-absolute">{c.dateFormatted}</div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasComms}>
                        <div class="hbd-empty">No communications recorded yet.</div>
                    </template>
                </div>
            </template>

            <!-- Preferred Agents -->
            <template if:true={isPrefAgentsTab}>
                <div class="hbd-tab-body">
                    <div class="hbd-tab-actions">
                        <button class="hbd-btn-primary hbd-btn-sm" onclick={handleShowAddPrefAgent}>+ Add Preferred Agent</button>
                    </div>

                    <template if:true={hasPrefAgents}>
                        <div class="hbd-contact-list">
                            <div class="hbd-contact-head hbd-pa-head">
                                <div>Priority</div>
                                <div>Agent</div>
                                <div>City</div>
                                <div>Phone</div>
                                <div>Status</div>
                                <div>Added</div>
                                <div class="hbd-col-action"></div>
                            </div>
                            <template for:each={prefAgentsDisplay} for:item="p">
                                <div class="hbd-contact-row hbd-pa-row" key={p.id} data-agentid={p.agentId} onclick={handlePrefAgentClick}>
                                    <div class="hbd-pa-priority">{p.priorityDisplay}</div>
                                    <div>
                                        <div class="hbd-contact-name">{p.agentName}</div>
                                        <template if:true={p.agentEmail}>
                                            <a href={p.emailHref} onclick={stopProp} class="hbd-pa-sub">{p.agentEmail}</a>
                                        </template>
                                    </div>
                                    <div>{p.agentCity}</div>
                                    <div>
                                        <template if:true={p.agentPhone}>
                                            <a href={p.phoneHref} onclick={stopProp}>{p.agentPhone}</a>
                                        </template>
                                        <template if:false={p.agentPhone}><span class="hbd-dim">—</span></template>
                                    </div>
                                    <div><span class={p.statusClass}>{p.status}</span></div>
                                    <div class="hbd-pa-date">{p.addedDateFormatted}</div>
                    <div class="hbd-col-action hbd-pa-actions">
                        <button class="hbd-edit-row-btn" data-id={p.id} onclick={handleEditPrefAgent} title="Edit">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="hbd-delete-btn" data-id={p.id} onclick={handleDeletePrefAgent} title="Remove">&times;</button>
                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasPrefAgents}>
                        <div class="hbd-empty">No preferred estate agents yet. Click + Add Preferred Agent to start.</div>
                    </template>

                    <!-- Add Preferred Agent modal -->
                    <template if:true={showAddPrefAgent}>
                        <div class="hbd-backdrop" onclick={handleClosePrefAgent}></div>
                        <div class="hbd-modal hbd-modal-wide">
                            <div class="hbd-modal-header">
                                <h3>Add Preferred Agent</h3>
                                <button class="hbd-modal-close" onclick={handleClosePrefAgent}>&times;</button>
                            </div>
                            <div class="hbd-modal-body">
                                <div class="hbd-modal-field hbd-col-full">
                                    <label>Search Estate Agent</label>
                                    <input type="text" placeholder="Name, city, or postcode…" value={prefSearchTerm} oninput={handlePrefSearchChange}/>
                                </div>
                                <div class="hbd-pa-search-results">
                                    <template if:true={prefIsSearching}>
                                        <div class="hbd-pa-loading"><lightning-spinner alternative-text="Searching" size="small"></lightning-spinner></div>
                                    </template>
                                    <template if:false={prefIsSearching}>
                                        <template for:each={prefAgentResults} for:item="r">
                                            <div class={r.selectedClass} key={r.id} data-id={r.id} onclick={handlePrefPickAgent}>
                                                <div class="hbd-pa-result-main">
                                                    <div class="hbd-pa-result-name">{r.name}</div>
                                                    <div class="hbd-pa-result-meta">
                                                        <template if:true={r.city}><span>{r.city}</span></template>
                                                        <template if:true={r.postcode}><span>{r.postcode}</span></template>
                                                        <template if:true={r.phone}><span>{r.phone}</span></template>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                </div>

                                <template if:true={prefSelectedAgent}>
                                    <div class="hbd-modal-grid" style="margin-top:14px;">
                                        <div class="hbd-modal-field">
                                            <label>Priority (optional)</label>
                                            <input type="number" min="1" max="10" value={prefPriority} onchange={handlePrefPriorityChange} placeholder="e.g. 1"/>
                                        </div>
                                        <div class="hbd-modal-field hbd-col-full">
                                            <label>Notes</label>
                                            <input type="text" value={prefNotes} onchange={handlePrefNotesChange} placeholder="Why preferred? Territory? Performance?"/>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div class="hbd-modal-footer">
                                <button class="hbd-btn-secondary" onclick={handleClosePrefAgent}>Cancel</button>
                                <button class="hbd-btn-primary" onclick={handleSavePrefAgent} disabled={prefIsSaving}>
                                    <template if:true={prefIsSaving}>Saving…</template>
                                    <template if:false={prefIsSaving}>Add Preferred Agent</template>
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- Edit Preferred Agent modal -->
                    <template if:true={showEditPrefAgent}>
                        <div class="hbd-backdrop" onclick={handleCloseEditPrefAgent}></div>
                        <div class="hbd-modal">
                            <div class="hbd-modal-header">
                                <h3>Edit Preferred Agent</h3>
                                <button class="hbd-modal-close" onclick={handleCloseEditPrefAgent}>&times;</button>
                            </div>
                            <div class="hbd-modal-body">
                                <div class="hbd-modal-grid">
                                    <div class="hbd-modal-field hbd-col-full">
                                        <label>Estate Agent</label>
                                        <div class="hbd-locked-field">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                            </svg>
                                            {editPrefAgent.agentName}
                                        </div>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Priority</label>
                                        <input type="number" min="1" max="10" value={editPrefAgent.priority} onchange={handleEditPrefPriorityChange} placeholder="e.g. 1"/>
                                    </div>
                                    <div class="hbd-modal-field">
                                        <label>Status</label>
                                        <select onchange={handleEditPrefStatusChange}>
                                            <template for:each={editPrefStatusOptions} for:item="opt">
                                                <option key={opt.value} value={opt.value} selected={opt.selected}>{opt.label}</option>
                                            </template>
                                        </select>
                                    </div>
                                    <div class="hbd-modal-field hbd-col-full">
                                        <label>Notes</label>
                                        <input type="text" value={editPrefAgent.notes} onchange={handleEditPrefNotesChange} placeholder="Reason, territory, performance notes…"/>
                                    </div>
                                </div>
                            </div>
                            <div class="hbd-modal-footer">
                                <button class="hbd-btn-secondary" onclick={handleCloseEditPrefAgent}>Cancel</button>
                                <button class="hbd-btn-primary" onclick={handleSaveEditPrefAgent} disabled={isEditPrefSaving}>
                                    <template if:true={isEditPrefSaving}>Saving…</template>
                                    <template if:false={isEditPrefSaving}>Save Changes</template>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Email Viewer slide panel -->
            <template if:true={showEmailViewer}>
                <div class="hbd-ev-backdrop" onclick={handleCloseEmailViewer}></div>
                <aside class="hbd-ev-panel">
                    <header class="hbd-ev-header">
                        <div class="hbd-ev-header-left">
                            <span class="hbd-ev-kicker">Email</span>
                            <template if:true={hasEmailViewer}>
                                <h3 class="hbd-ev-subject">{emailViewer.subject}</h3>
                            </template>
                        </div>
                        <div class="hbd-ev-header-actions">
                            <template if:true={emailHasOpp}>
                                <button class="hbd-ev-btn hbd-ev-btn-secondary" onclick={handleOpenApplicationFromEmail} title="Open Application">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                        <polyline points="15 3 21 3 21 9"/>
                                        <line x1="10" y1="14" x2="21" y2="3"/>
                                    </svg>
                                    Go to Application
                                </button>
                            </template>
                            <button class="hbd-ev-close" onclick={handleCloseEmailViewer}>&times;</button>
                        </div>
                    </header>

                    <template if:true={emailLoading}>
                        <div class="hbd-ev-loading"><lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner></div>
                    </template>

                    <template if:true={hasEmailViewer}>
                        <div class="hbd-ev-meta">
                            <span class={emailViewer.dirPill}>{emailViewer.direction}</span>
                            <div class="hbd-ev-metarow"><span class="hbd-ev-lbl">From</span><span class="hbd-ev-val">{emailViewer.from}</span></div>
                            <div class="hbd-ev-metarow"><span class="hbd-ev-lbl">To</span><span class="hbd-ev-val">{emailViewer.to}</span></div>
                            <template if:true={emailViewer.cc}>
                                <div class="hbd-ev-metarow"><span class="hbd-ev-lbl">Cc</span><span class="hbd-ev-val">{emailViewer.cc}</span></div>
                            </template>
                            <template if:true={emailViewer.bcc}>
                                <div class="hbd-ev-metarow"><span class="hbd-ev-lbl">Bcc</span><span class="hbd-ev-val">{emailViewer.bcc}</span></div>
                            </template>
                            <div class="hbd-ev-metarow">
                                <span class="hbd-ev-lbl">Date</span>
                                <span class="hbd-ev-val">{emailViewer.dateFormatted} <span class="hbd-dim">· {emailViewer.relativeTime}</span></span>
                            </div>
                        </div>

                        <template if:true={emailHasAttachments}>
                            <div class="hbd-ev-attachments">
                                <div class="hbd-ev-att-label">Attachments ({emailAttachmentCount})</div>
                                <template for:each={emailViewer.attachments} for:item="a">
                                    <a key={a.id} href={a.downloadUrl} target="_blank" class="hbd-ev-att">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
                                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                            <polyline points="14 2 14 8 20 8"/>
                                        </svg>
                                        <span class="hbd-ev-att-name">{a.name}</span>
                                        <span class="hbd-ev-att-size">{a.sizeLabel}</span>
                                    </a>
                                </template>
                            </div>
                        </template>

                        <div class="hbd-ev-body-wrap">
                            <div class="hbd-email-body-rendered"></div>
                        </div>
                    </template>
                </aside>
            </template>

            <!-- Settings modal -->
            <template if:true={showSettings}>
                <div class="hbd-backdrop" onclick={handleCloseSettings}></div>
                <div class="hbd-modal">
                    <div class="hbd-modal-header">
                        <h3>Housebuilder Settings</h3>
                        <button class="hbd-modal-close" onclick={handleCloseSettings}>&times;</button>
                    </div>
                    <div class="hbd-modal-body">
                        <!-- Logo section -->
                        <div class="hbd-settings-section-label">Company Logo</div>
                        <div class="hbd-logo-section">
                            <div class="hbd-logo-preview-box">
                                <template if:true={hasLogoDisplay}>
                                    <img src={displayLogoUrl} alt="Current logo"/>
                                </template>
                                <template if:false={hasLogoDisplay}>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <polyline points="21 15 16 10 5 21"/>
                                    </svg>
                                </template>
                            </div>
                            <div class="hbd-logo-upload">
                                <label class="hbd-logo-upload-btn">
                                    <template if:true={isUploadingLogo}>
                                        <span class="hbd-inline-spinner"></span>
                                        Uploading…
                                    </template>
                                    <template if:false={isUploadingLogo}>
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                            <polyline points="17 8 12 3 7 8"/>
                                            <line x1="12" y1="3" x2="12" y2="15"/>
                                        </svg>
                                        <template if:true={hasLogoDisplay}>Replace Logo</template>
                                        <template if:false={hasLogoDisplay}>Upload Logo</template>
                                    </template>
                                    <input type="file" accept="image/*" onchange={handleLogoFileChange} disabled={isUploadingLogo} class="hbd-logo-input-hidden"/>
                                </label>
                                <span class="hbd-setting-desc">PNG, JPG, SVG · max 4MB · saved to Box with public link</span>
                            </div>
                        </div>

                        <div class="hbd-settings-section-label">Flags</div>
                        <div class="hbd-settings-grid">
                            <label class="hbd-setting">
                                <input type="checkbox" data-setting="useTimelineValuations" checked={settingsDraft.useTimelineValuations} onchange={handleSettingsToggle}/>
                                <div class="hbd-setting-copy">
                                    <span class="hbd-setting-title">Use Timeline Valuations</span>
                                    <span class="hbd-setting-desc">Switch this housebuilder's applications from the standard Initial / Target / Bottom model to the 4-timeframe model (Open Market, 6-8W, 4-6W, 2-4W). Wain Homes uses this.</span>
                                </div>
                            </label>
                            <label class="hbd-setting">
                                <input type="checkbox" data-setting="vendorDiscussionApproved" checked={settingsDraft.vendorDiscussionApproved} onchange={handleSettingsToggle}/>
                                <div class="hbd-setting-copy">
                                    <span class="hbd-setting-title">Vendor Discussion Approved</span>
                                    <span class="hbd-setting-desc">Housebuilder has pre-approved moving applications into the Vendor Discussions stage without further sign-off. Enables the Move-to-Next button on Final Checks.</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="hbd-modal-footer">
                        <button class="hbd-btn-secondary" onclick={handleCloseSettings}>Cancel</button>
                        <button class="hbd-btn-primary" onclick={handleSaveSettings} disabled={isSavingSettings}>
                            <template if:true={isSavingSettings}>Saving…</template>
                            <template if:false={isSavingSettings}>Save Settings</template>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Edit Housebuilder modal -->
            <template if:true={showEditHb}>
                <div class="hbd-backdrop" onclick={handleCloseEditHb}></div>
                <div class="hbd-modal hbd-modal-wide">
                    <div class="hbd-modal-header">
                        <h3>Edit Housebuilder</h3>
                        <button class="hbd-modal-close" onclick={handleCloseEditHb}>&times;</button>
                    </div>
                    <div class="hbd-modal-body">
                        <div class="hbd-modal-grid">
                            <div class="hbd-modal-field hbd-col-full">
                                <label>Company Name</label>
                                <input type="text" data-field="name" value={editHb.name} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field">
                                <label>Email</label>
                                <input type="email" data-field="email" value={editHb.email} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field">
                                <label>Phone</label>
                                <input type="tel" data-field="phone" value={editHb.phone}
                                       pattern="[0-9+()\-\s]*"
                                       inputmode="tel"
                                       placeholder="+44 1234 567890"
                                       onkeypress={handlePhoneKeyPress}
                                       oninput={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field hbd-col-full">
                                <label>Website</label>
                                <input type="text" data-field="website" value={editHb.website} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field hbd-col-full">
                                <label>Street</label>
                                <input type="text" data-field="street" value={editHb.street} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field">
                                <label>City</label>
                                <input type="text" data-field="city" value={editHb.city} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field">
                                <label>Postcode</label>
                                <input type="text" data-field="postcode" value={editHb.postcode} onchange={handleEditHbFieldChange}/>
                            </div>
                            <div class="hbd-modal-field hbd-col-full">
                                <label>Country</label>
                                <input type="text" data-field="country" value={editHb.country} onchange={handleEditHbFieldChange}/>
                            </div>
                        </div>
                    </div>
                    <div class="hbd-modal-footer">
                        <button class="hbd-btn-secondary" onclick={handleCloseEditHb}>Cancel</button>
                        <button class="hbd-btn-primary" onclick={handleSaveEditHb}>Save Changes</button>
                    </div>
                </div>
            </template>
        </template>
    </template>
</template>
