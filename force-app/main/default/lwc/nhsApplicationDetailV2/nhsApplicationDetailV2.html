<template>

  <!-- ========== 1. PAGE HEADER ========== -->
  <div class="page-hdr">
    <div class="page-hdr-top">
      <div>
        <h1 class="prop-title">{propertyAddress}</h1>
        <div class="prop-meta">
          <span class="meta-tag">Application: {formData.vendor1Name}</span>
          <span class="meta-tag">{formData.houseBuilderName}</span>
          <span class="meta-tag">Plot {formData.plot} &middot; {formData.development}</span>
        </div>
      </div>
      <div class="page-hdr-badges">
        <span class="ref-badge">REF: #{recordId}</span>
        <span class="status-badge">{formData.nhsProcess}</span>
      </div>
    </div>
  </div>

  <!-- ========== 2. PIPELINE ========== -->
  <div class="pipeline">
    <template for:each={pipelineSteps} for:item="step">
      <div key={step.value} class={step.stepClass} data-stage={step.value} onclick={handleStageClick}>
        <div class={step.dotClass}>{step.dotLabel}</div>
        <span class="pipe-label">{step.label}</span>
      </div>
    </template>
  </div>

  <!-- ========== 3. PAGE BODY ========== -->
  <div class="page-body">

    <!-- ===== MAIN COLUMN ===== -->
    <div class="main-col">

      <!-- ---- A. Property Details Card ---- -->
      <template if:true={notFinalChecks}>
      <div class={propCardClass}>
        <div class="card-header">
          <h2 class="card-title"><span class="card-title-dot"></span>Property Details</h2>
          <template if:true={notFinalChecks}>
          <div class="card-actions">
            <div class="cc-wrap">
              <button class="action-btn" onclick={handleCallVendor} title="Call">
                <lightning-icon icon-name="utility:call" size="x-small"></lightning-icon>
                <span>Call</span>
              </button>
              <template if:true={showCallPopup}>
                <div class="cc-popup">
                  <div class="cc-header">
                    <span class="cc-title">Quick Call</span>
                    <button class="cc-close" onclick={handleCloseCallPopup}>&times;</button>
                  </div>
                  <div class="cc-list">
                    <template if:true={hasCallContacts}>
                      <template for:each={callContacts} for:item="contact">
                        <div key={contact.key} class="cc-entry">
                          <div class={contact.avatarClass}>
                            <lightning-icon icon-name="utility:call" size="xx-small"></lightning-icon>
                          </div>
                          <div class="cc-entry-info">
                            <div class="cc-entry-name">{contact.name}</div>
                            <div class="cc-entry-detail">
                              <span class="cc-entry-role">{contact.role}</span>
                              <span class="cc-entry-number">{contact.number}</span>
                            </div>
                          </div>
                          <a href={contact.href} class="cc-call-btn" title="Call">
                            <lightning-icon icon-name="utility:call" size="x-small"></lightning-icon>
                          </a>
                        </div>
                      </template>
                    </template>
                    <template if:false={hasCallContacts}>
                      <div class="cc-empty">No phone numbers available.</div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
            <button class="action-btn" onclick={handleEmailVendor} title="Email Vendor">
              <lightning-icon icon-name="utility:email" size="x-small"></lightning-icon>
              <span>Email</span>
            </button>
            <div class="qn-wrap">
              <button class="action-btn" onclick={handleToggleQuickNote} title="Quick Note">
                <lightning-icon icon-name="utility:note" size="x-small"></lightning-icon>
                <span>Notes</span>
              </button>
              <template if:true={showQuickNote}>
                <div class="qn-popup">
                  <div class="qn-header">
                    <span class="qn-title">Quick Note</span>
                    <button class="qn-close" onclick={handleToggleQuickNote}>&times;</button>
                  </div>
                  <textarea class="qn-textarea" placeholder="Type a quick note..." onchange={handleQuickNoteChange}>{quickNoteText}</textarea>
                  <div class="qn-footer">
                    <button class="btn-primary btn-sm" onclick={handleSaveQuickNote} disabled={isQuickNoteSaving}>
                      <template if:true={isQuickNoteSaving}>Saving...</template>
                      <template if:false={isQuickNoteSaving}>Save Note</template>
                    </button>
                  </div>
                </div>
              </template>
            </div>
            <a class="action-btn" href={googleMapsUrl} target="_blank" title="Get Directions">
              <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
              <span>Get Directions</span>
            </a>
          </div>
          </template><!-- /notFinalChecks actions -->
        </div>

        <div class="card-body">

          <!-- Property Address Box (green) -->
          <div class="prop-address-box">
            <div class="prop-address-head">
              <div class="section-label" style="color: var(--nhs-dk);">Property Address</div>
              <template if:true={hasPropertyRecord}>
                <button class="prop-preview-btn" onclick={handlePreviewProperty} title="Open property record">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  Preview
                </button>
              </template>
            </div>
            <div class="prop-grid-5">
              <div class="field">
                <label class="field-label">Address</label>
                <lightning-input
                  variant="label-hidden"
                  label="Address"
                  value={formData.propertyAddress}
                  data-field="propertyAddress"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">House Builder</label>
                <c-custom-lookup-lwc
                  object-api-name="Account"
                  icon-name="standard:account"
                  selected-record-id={formData.houseBuilderId}
                  placeholder="Search housebuilder..."
                  onlookup={handleHousebuilderLookup}>
                </c-custom-lookup-lwc>
              </div>
              <div class="field">
                <label class="field-label">Development</label>
                <lightning-input
                  variant="label-hidden"
                  label="Development"
                  value={formData.development}
                  data-field="development"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Plot</label>
                <lightning-input
                  variant="label-hidden"
                  label="Plot"
                  value={formData.plot}
                  data-field="plot"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Scheme</label>
                <select class="slds-select" data-field="scheme" onchange={handleFieldChange}>
                  <option value="">-- Select --</option>
                  <option value="Part Exchange" selected={isSchemePartExchange}>Part Exchange</option>
                  <option value="Assisted Sale" selected={isSchemeAssistedSale}>Assisted Sale</option>
                  <option value="New Home" selected={isSchemeNewHome}>New Home</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Vendor Info Box (blue) -->
          <div class="vendor-info-box">
            <div class="section-label" style="color: #1A4F7A;">Vendor Information</div>
            <div class="vendor-grid-4">
              <div class="field">
                <label class="field-label">Vendor Name</label>
                <lightning-input
                  variant="label-hidden"
                  label="Vendor Name"
                  value={formData.vendor1Name}
                  data-field="vendor1Name"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Mobile</label>
                <lightning-input
                  type="tel"
                  variant="label-hidden"
                  label="Mobile"
                  value={formData.vendorMobile}
                  data-field="vendorMobile"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Phone</label>
                <lightning-input
                  type="tel"
                  variant="label-hidden"
                  label="Phone"
                  value={formData.vendorPhone}
                  data-field="vendorPhone"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
              <div class="field">
                <label class="field-label">Email</label>
                <lightning-input
                  type="email"
                  variant="label-hidden"
                  label="Email"
                  value={formData.vendorEmail}
                  data-field="vendorEmail"
                  onchange={handleFieldChange}>
                </lightning-input>
              </div>
            </div>
          </div>

          <!-- Vendor 2 Info Box (conditionally shown) -->
          <template lwc:if={hasVendor2}>
            <div class="vendor2-info-box">
              <div class="section-label" style="color: #7C3AED;">Vendor 2 Information</div>
              <div class="vendor-grid-4">
                <div class="field">
                  <label class="field-label">Vendor 2 Name</label>
                  <lightning-input
                    variant="label-hidden"
                    label="Vendor 2 Name"
                    value={formData.vendor2Name}
                    data-field="vendor2Name"
                    onchange={handleFieldChange}>
                  </lightning-input>
                </div>
                <div class="field">
                  <label class="field-label">Mobile</label>
                  <lightning-input
                    type="tel"
                    variant="label-hidden"
                    label="Mobile"
                    value={formData.vendor2Mobile}
                    data-field="vendor2Mobile"
                    onchange={handleFieldChange}>
                  </lightning-input>
                </div>
                <div class="field">
                  <label class="field-label">Phone</label>
                  <lightning-input
                    type="tel"
                    variant="label-hidden"
                    label="Phone"
                    value={formData.vendor2Phone}
                    data-field="vendor2Phone"
                    onchange={handleFieldChange}>
                  </lightning-input>
                </div>
                <div class="field">
                  <label class="field-label">Email</label>
                  <lightning-input
                    type="email"
                    variant="label-hidden"
                    label="Email"
                    value={formData.vendor2Email}
                    data-field="vendor2Email"
                    onchange={handleFieldChange}>
                  </lightning-input>
                </div>
              </div>
            </div>
          </template>

          <!-- Metrics Row -->
          <div class="metrics-row">
            <div class="metric metric-highlight">
              <div class="metric-label">Vendor Expectations</div>
              <div class="metric-value">{vendorExpectationsDisplay}</div>
              <div class="metric-sub">Asking price</div>
            </div>
            <div class="metric">
              <div class="metric-label">Received Date</div>
              <div class="metric-value metric-value-sm">{receivedDateDisplay}</div>
              <div class="metric-sub">Application received</div>
            </div>
            <div class="metric">
              <div class="metric-label">ALCD</div>
              <div class="metric-value metric-value-sm">{etaCompEndDisplay}</div>
              <div class="metric-sub">Target completion</div>
            </div>
          </div>

        </div>
      </div>
      </template><!-- /notFinalChecks Property Details -->

      <!-- ---- B. Stage-Specific Cards ---- -->

      <!-- Vendor Availability -->
      <template if:true={showVendorAvailability}>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title"><span class="card-title-dot"></span>Vendor Availability</h2>
            <div class="va-toolbar">
              <span class="va-bulk-label">Mark:</span>
              <button class="va-bulk-btn va-bulk-all" onclick={handleVaBulkAll}>All Day</button>
              <button class="va-bulk-btn va-bulk-am" onclick={handleVaBulkAm}>AM (9–12)</button>
              <button class="va-bulk-btn va-bulk-pm" onclick={handleVaBulkPm}>PM (12–5)</button>
              <button class="va-bulk-btn va-bulk-clear" onclick={handleVaBulkClear}>✕ Clear</button>
            </div>
          </div>

          <!-- Vendor info strip -->
          <div class="va-vendor-strip">
            <div class="va-vendor-name">{formData.vendor1Name}</div>
            <div class="va-vendor-contact">{formData.vendorMobile}</div>
            <div class="va-vendor-contact">{formData.vendorEmail}</div>
          </div>

          <!-- Navigation -->
          <div class="va-nav">
            <button class="va-nav-btn" onclick={handleVaPrev}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
              Prev
            </button>
            <span class="va-range">{vaRangeLabel}</span>
            <button class="va-nav-btn" onclick={handleVaNext}>
              Next
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="va-nav-btn va-nav-today" onclick={handleVaToday}>Today</button>
          </div>

          <!-- Calendar -->
          <div class="va-calendar">
            <table class="va-table">
              <thead>
                <tr>
                  <th class="va-th-time">Period</th>
                  <template for:each={vaDays} for:item="day">
                    <th key={day.key} class={day.thClass}>
                      <template if:true={day.showWeekendToggle}>
                        <label class="va-weekend-toggle" data-di={day.idx} onclick={handleWeekendToggle}>
                          <input type="checkbox" checked={day.weekendEnabled}/>
                        </label>
                      </template>
                      <div class="va-day-name">{day.dayName}</div>
                      <div class="va-day-num">{day.dayNum}</div>
                      <template if:false={day.isDisabled}>
                        <button class={day.allBtnClass} data-di={day.idx} onclick={handleVaDayAll}>All</button>
                      </template>
                      <template if:true={day.isPast}>
                        <div class="va-past-label">Past</div>
                      </template>
                    </th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <!-- AM Row -->
                <tr>
                  <td class="va-td-label va-td-am">
                    <div class="va-period-name">AM</div>
                    <div class="va-period-desc">Before 9 am – 12 pm</div>
                  </td>
                  <template for:each={vaDays} for:item="day">
                    <td key={day.key} class={day.amCellClass} data-di={day.idx} data-period="am" onclick={handleVaCellClick}>
                      <template if:true={day.amActive}>
                        <span class="va-check">✓</span>
                      </template>
                    </td>
                  </template>
                </tr>
                <!-- PM Row -->
                <tr>
                  <td class="va-td-label va-td-pm">
                    <div class="va-period-name">PM</div>
                    <div class="va-period-desc">12 pm – 5 pm</div>
                  </td>
                  <template for:each={vaDays} for:item="day">
                    <td key={day.key} class={day.pmCellClass} data-di={day.idx} data-period="pm" onclick={handleVaCellClick}>
                      <template if:true={day.pmActive}>
                        <span class="va-check">✓</span>
                      </template>
                    </td>
                  </template>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Save -->
          <div class="va-footer">
            <template if:false={isVaSaving}>
              <template if:false={vaSaveSuccess}>
                <button class="btn-primary" onclick={handleVaSave}>Save Availability</button>
              </template>
              <template if:true={vaSaveSuccess}>
                <button class="btn-primary va-btn-saved" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                  Saved
                </button>
              </template>
            </template>
            <template if:true={isVaSaving}>
              <button class="btn-primary va-btn-saving" disabled>
                <span class="save-spinner"></span>
                Saving...
              </button>
            </template>
          </div>
        </div>
      </template>

      <!-- Book Agents -->
      <template if:true={showBookAgents}>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title"><span class="card-title-dot"></span>Book Agents</h2>
            <span class="ba-count">{bookingCountLabel}</span>
            <button class="btn-assign-agent-sm" onclick={handleOpenAssignAgent}>+ Assign Agent</button>
          </div>

          <!-- 3 Agent Status Cards -->
          <div class="ba-status-grid">
            <!-- Agent 1 -->
            <div class="ba-status ba-status-1">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-1">1</span>
                  <div>
                    <div class="ba-agent-label">Agent 1</div>
                    <div class="ba-agent-name">{formData.agent1Name}</div>
                  </div>
                </div>
                <button class="ba-edit-btn" data-slot="agent1" onclick={handleEditAgent} title="Reassign Agent 1">
                  <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                </button>
                <template if:true={formData.agent1DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent1DesktopVal}>
                  <template if:true={ba1Booked}>
                    <span class="ba-booked-badge ba-badge-1">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent1DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent1DesktopVal}>
              <div class="ba-appt-box ba-appt-1">
                <template if:true={ba1Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba1DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba1TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba1Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba1Booked}>
                <div class="ba-action-btns">
                  <button class="ba-amend-btn" data-agent="1" onclick={handleBaAmend}>✏️ Amend Booking</button>
                  <button class="ba-cancel-btn" data-agent="1" onclick={handleBaCancel}>🗑 Cancel Booking</button>
                </div>
                <button class="ba-email-btn ba-email-1" data-agent="1" onclick={handleEmailAgent}>✉️ Email Agent 1</button>
                <template if:true={showBaCancel1}>
                  <div class="ba-cancel-confirm">
                    <template if:true={isBaCancelStep1}>
                      <div class="ba-cc-title">⚠️ Cancel appointment for Agent 1?</div>
                      <div class="ba-cc-text">This will remove the booking for <strong>{baCancelAgentName}</strong>. This cannot be undone.</div>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Keep Booking</button>
                        <button class="ba-cc-yes" onclick={handleBaCancelProceed}>Yes, Cancel</button>
                      </div>
                    </template>
                    <template if:true={isBaCancelStep2}>
                      <div class="ba-cc-title">📝 Cancellation Reason</div>
                      <textarea class="ba-cc-reason" placeholder="Please provide a reason for cancelling..." onchange={handleBaCancelReasonChange}></textarea>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Go Back</button>
                        <button class="ba-cc-confirm" onclick={handleBaCancelConfirm}>✕ Confirm Cancel</button>
                      </div>
                    </template>
                  </div>
                </template>
              </template>
              </template><!-- /notDesktopVal agent1 -->
            </div>

            <!-- Agent 2 -->
            <div class="ba-status ba-status-2">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-2">2</span>
                  <div>
                    <div class="ba-agent-label">Agent 2</div>
                    <div class="ba-agent-name">{formData.agent2Name}</div>
                  </div>
                </div>
                <button class="ba-edit-btn" data-slot="agent2" onclick={handleEditAgent} title="Reassign Agent 2">
                  <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                </button>
                <template if:true={formData.agent2DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent2DesktopVal}>
                  <template if:true={ba2Booked}>
                    <span class="ba-booked-badge ba-badge-2">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent2DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent2DesktopVal}>
              <div class="ba-appt-box ba-appt-2">
                <template if:true={ba2Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba2DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba2TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba2Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba2Booked}>
                <div class="ba-action-btns">
                  <button class="ba-amend-btn" data-agent="2" onclick={handleBaAmend}>✏️ Amend Booking</button>
                  <button class="ba-cancel-btn" data-agent="2" onclick={handleBaCancel}>🗑 Cancel Booking</button>
                </div>
                <button class="ba-email-btn ba-email-2" data-agent="2" onclick={handleEmailAgent}>✉️ Email Agent 2</button>
                <template if:true={showBaCancel2}>
                  <div class="ba-cancel-confirm">
                    <template if:true={isBaCancelStep1}>
                      <div class="ba-cc-title">⚠️ Cancel appointment for Agent 2?</div>
                      <div class="ba-cc-text">This will remove the booking for <strong>{baCancelAgentName}</strong>. This cannot be undone.</div>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Keep Booking</button>
                        <button class="ba-cc-yes" onclick={handleBaCancelProceed}>Yes, Cancel</button>
                      </div>
                    </template>
                    <template if:true={isBaCancelStep2}>
                      <div class="ba-cc-title">📝 Cancellation Reason</div>
                      <textarea class="ba-cc-reason" placeholder="Please provide a reason for cancelling..." onchange={handleBaCancelReasonChange}></textarea>
                      <div class="ba-cc-btns">
                        <button class="ba-cc-keep" onclick={handleBaCancelKeep}>Go Back</button>
                        <button class="ba-cc-confirm" onclick={handleBaCancelConfirm}>✕ Confirm Cancel</button>
                      </div>
                    </template>
                  </div>
                </template>
              </template>
              </template><!-- /notDesktopVal agent2 -->
            </div>

            <!-- Agent 3 -->
            <div class="ba-status ba-status-3">
              <div class="ba-status-top">
                <div class="ba-agent-id">
                  <span class="ba-num ba-num-3">3</span>
                  <div>
                    <div class="ba-agent-label">Agent 3</div>
                    <div class="ba-agent-name">{formData.agent3Name}</div>
                  </div>
                </div>
                <button class="ba-edit-btn" data-slot="agent3" onclick={handleEditAgent} title="Reassign Agent 3">
                  <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                </button>
                <template if:true={formData.agent3DesktopVal}>
                  <span class="ba-dv-badge">Desktop</span>
                </template>
                <template if:false={formData.agent3DesktopVal}>
                  <template if:true={ba3Booked}>
                    <span class="ba-booked-badge ba-badge-3">✓ Booked</span>
                  </template>
                </template>
              </div>
              <template if:true={formData.agent3DesktopVal}>
                <div class="ba-dv-box">Desktop Valuation — No visit required</div>
              </template>
              <template if:false={formData.agent3DesktopVal}>
              <div class="ba-appt-box ba-appt-3">
                <template if:true={ba3Booked}>
                  <div class="ba-appt-row"><span class="ba-appt-icon">📅</span><div><div class="ba-appt-label">Date</div><div class="ba-appt-val">{ba3DateDisplay}</div></div></div>
                  <div class="ba-appt-row"><span class="ba-appt-icon">🕐</span><div><div class="ba-appt-label">Time</div><div class="ba-appt-val">{ba3TimeDisplay}</div></div></div>
                </template>
                <template if:false={ba3Booked}>
                  <div class="ba-appt-empty">No appointment booked yet.</div>
                </template>
              </div>
              <template if:true={ba3Booked}>

                      <div class="vr-file">
                        <lightning-icon icon-name="utility:file" size="xx-small"></lightning-icon>
                        <span class="vr-file-name">{formData.agent3ValReportName}</span>
                        <button class="vr-remove-btn" data-agent="3" onclick={handleValReportRemove} title="Remove">&times;</button>
                      </div>
                    </template>
                    <template if:false={showValReport3}>
                      <template if:false={valReport3Uploading}>
                        <button class="vr-upload-btn" data-agent="3" onclick={handleValReportClick}>
                          <lightning-icon icon-name="utility:upload" size="xx-small"></lightning-icon>
                          Upload Valuation Report
                        </button>
                      </template>
                      <template if:true={valReport3Uploading}>
                        <div class="vr-uploading">
                          <lightning-spinner alternative-text="Uploading" size="x-small"></lightning-spinner>
                          <span>Uploading...</span>

                  <template if:true={wrUploading}>
                    <div class="wr-upload-progress">
                      <span class="save-spinner"></span> Uploading to Box...
                    </div>
                  </template>
                  <template if:true={wrUploadSuccess}>
                    <div class="wr-upload-success">✓ Report uploaded successfully</div>
                  </template>
                  <template if:false={wrUploading}>
                    <template if:false={wrUploadSuccess}>
                      <lightning-file-upload

          </div>

      <!-- ---- D. Box File Storage — visible on every non-Final-Checks stage ---- -->
      <template if:true={notFinalChecks}>

      <!-- ---- E. Vendor Notes Card ---- -->

                </button>
                <span class="vn-paging-label">{notesCountLabel}</span>
                <button class="vn-nav-btn" onclick={handleNotesNext} disabled={isNotesNextDisabled}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>

          <template if:false={hasVendorNotes}>

    </div>

    <!-- ===== SIDE COLUMN ===== -->

          </div>

              </button>
            </template>
          </div>
        </div>
      </template>

      <!-- Quick Summary Card -->
      <div class="card card-summary">

        </div>
        <div class="card-body" style="padding: 14px 18px;">
          <div class="info-row">
            <span class="info-key">Status</span>
            <span class="info-val"><span class="status-badge">{formData.nhsProcess}</span></span>
          </div>
          <div class="info-row">
            <span class="info-key">Application Type</span>
            <span class="info-val">Application</span>
          </div>
          <div class="info-row">
            <span class="info-key">Scheme</span>
            <span class="info-val">{formData.scheme}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Vendor Expectations</span>
            <span class="info-val sage">{vendorExpectationsDisplay}</span>
          </div>
          <div class="info-row">
            <span class="info-key">ALCD</span>
            <span class="info-val">{etaCompEndDisplay}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Received</span>
            <span class="info-val">{receivedDateDisplay}</span>
          </div>
          <div class="info-row">
            <span class="info-key">House Builder</span>
            <span class="info-val">{formData.houseBuilderName}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Development</span>
            <span class="info-val">{formData.development}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Plot</span>
            <span class="info-val">{formData.plot}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Property Description</span>
            <span class="info-val">{formData.propertyDescription}</span>
          </div>
          <div class="info-divider"></div>
          <div class="info-row">
            <span class="info-key">Property Address</span>
            <span class="info-val">{formData.propertyAddress}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Vendor Name</span>
            <span class="info-val">{formData.vendor1Name}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Vendor Mobile</span>
            <span class="info-val">{formData.vendorMobile}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Vendor Phone</span>
            <span class="info-val">{formData.vendorPhone}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Vendor Email</span>
            <span class="info-val">{formData.vendorEmail}</span>
          </div>
          <template if:true={formData.notes}>
            <div class="info-divider"></div>
            <div class="info-row info-row-notes">
              <span class="info-key">Application Notes</span>
              <span class="info-val info-val-notes">{formData.notes}</span>
            </div>
          </template>
        </div>
      </div>

      <!-- Quick Notes Card -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-title-dot"></span>Quick Notes</h2>
        </div>
        <div class="card-body" style="padding: 0;">
          <!-- Add note input -->
          <div class="qn-inline">
            <textarea class="qn-inline-textarea" placeholder="Add a quick note..." onchange={handleQuickNoteChange}>{quickNoteText}</textarea>
            <div class="qn-inline-footer">
              <button class="btn-primary btn-sm" onclick={handleSaveQuickNote} disabled={isQuickNoteSaving}>
                <template if:true={isQuickNoteSaving}>Saving...</template>
                <template if:false={isQuickNoteSaving}>Add Note</template>
              </button>
            </div>
          </div>
          <!-- Latest note display -->
          <template if:true={hasLatestNote}>
            <div class="qn-latest">
              <div class="qn-latest-header">
                <span class="qn-latest-label">Latest Note</span>

              </div>
              <div class="qn-latest-body">{latestNote.body}</div>

    </div>

  </div>

  <!-- ========== 4. BOTTOM BAR (fixed) ========== -->

    </div>

        <template if:false={saveSuccess}>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>

        </template>
        <template if:true={saveSuccess}>
          <button class="btn-bottom btn-saved" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Saved

        </template>
      </template>
      <template if:true={isSaving}>
        <button class="btn-bottom btn-saving" disabled>

    </div>

  <template if:true={showCommsHub}>

      </c-nhs-communications-hub>

  <!-- ========== VENDOR AVAILABILITY LIGHTBOX ========== -->
  <template if:true={showVaLightbox}>
    <div class="va-lb-backdrop"></div>
    <div class="va-lb-modal">
      <div class="va-lb-header">
        <h3>Vendor Availability</h3>
        <div class="va-toolbar">
          <span class="va-bulk-label">Mark:</span>
          <button class="va-bulk-btn va-bulk-all" onclick={handleVaBulkAll}>All Day</button>
          <button class="va-bulk-btn va-bulk-am" onclick={handleVaBulkAm}>AM (9–12)</button>
          <button class="va-bulk-btn va-bulk-pm" onclick={handleVaBulkPm}>PM (12–5)</button>
          <button class="va-bulk-btn va-bulk-clear" onclick={handleVaBulkClear}>✕ Clear</button>
        </div>
        <button class="va-lb-close" onclick={handleCloseVaLightbox}>&times;</button>
      </div>

      <!-- Vendor info strip -->
      <div class="va-vendor-strip">
        <div class="va-vendor-name">{formData.vendor1Name}</div>
        <div class="va-vendor-contact">{formData.vendorMobile}</div>
        <div class="va-vendor-contact">{formData.vendorEmail}</div>
      </div>

      <!-- Navigation -->
      <div class="va-nav">
        <button class="va-nav-btn" onclick={handleVaPrev}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Prev
        </button>
        <span class="va-range">{vaRangeLabel}</span>
        <button class="va-nav-btn" onclick={handleVaNext}>
          Next
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="va-nav-btn va-nav-today" onclick={handleVaToday}>Today</button>
      </div>

      <!-- Calendar -->
      <div class="va-calendar">
        <table class="va-table">
          <thead>
            <tr>
              <th class="va-th-time">Period</th>
              <template for:each={vaDays} for:item="day">
                <th key={day.key} class={day.thClass}>
                  <template if:true={day.showWeekendToggle}>
                    <label class="va-weekend-toggle" data-di={day.idx} onclick={handleWeekendToggle}>
                      <input type="checkbox" checked={day.weekendEnabled}/>
                    </label>
                  </template>
                  <div class="va-day-name">{day.dayName}</div>
                  <div class="va-day-num">{day.dayNum}</div>
                  <template if:false={day.isDisabled}>
                    <button class={day.allBtnClass} data-di={day.idx} onclick={handleVaDayAll}>All</button>
                  </template>
                  <template if:true={day.isPast}>
                    <div class="va-past-label">Past</div>
                  </template>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="va-td-label va-td-am">
                <div class="va-period-name">AM</div>
                <div class="va-period-desc">Before 9 am – 12 pm</div>
              </td>
              <template for:each={vaDays} for:item="day">
                <td key={day.key} class={day.amCellClass} data-di={day.idx} data-period="am" onclick={handleVaCellClick}>
                  <template if:true={day.amActive}>
                    <span class="va-check">✓</span>
                  </template>
                </td>
              </template>
            </tr>
            <tr>
              <td class="va-td-label va-td-pm">
                <div class="va-period-name">PM</div>
                <div class="va-period-desc">12 pm – 5 pm</div>
              </td>
              <template for:each={vaDays} for:item="day">
                <td key={day.key} class={day.pmCellClass} data-di={day.idx} data-period="pm" onclick={handleVaCellClick}>
                  <template if:true={day.pmActive}>
                    <span class="va-check">✓</span>
                  </template>
                </td>
              </template>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Footer -->
      <div class="va-lb-footer">
        <button class="va-lb-btn-close" onclick={handleCloseVaLightbox}>Close</button>
        <template if:false={isVaSaving}>
          <template if:false={vaSaveSuccess}>
            <button class="va-lb-btn-save" onclick={handleVaSave}>Save Availability</button>
          </template>
          <template if:true={vaSaveSuccess}>
            <button class="va-lb-btn-save va-lb-btn-saved" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              Saved
            </button>
          </template>
        </template>
        <template if:true={isVaSaving}>
          <button class="va-lb-btn-save" disabled>
            <span class="save-spinner"></span>
            Saving...
          </button>
        </template>
      </div>
    </div>
  </template>

          </div>
          <div class="edit-app-field edit-app-full">

          </div>

      </div>
      <div class="edit-app-footer">
        <span class="edit-app-admin-badge">
          <lightning-icon icon-name="utility:lock" size="xx-small"></lightning-icon>

        </span>

          <button class="btn-cancel" onclick={handleCloseEditApp}>Cancel</button>

            </div>
            <div class="af-ctx-divider"></div>

              <span class="af-ctx-value">{formData.houseBuilderName}</span>
            </div>
            <div class="af-ctx-divider"></div>
            <div class="af-ctx-item">
              <span class="af-ctx-label">Vendor</span>
              <span class="af-ctx-value">{formData.vendor1Name}</span>
            </div>
          </div>
        </div>
        <!-- Step indicators -->
        <div class="af-header-steps">
          <div class="af-steps">
            <div class={step1Class}><span class="af-step-num">1</span><span class="af-step-text">Radius</span></div>
            <span class="af-step-line"></span>
            <div class={step2Class}><span class="af-step-num">2</span><span class="af-step-text">Agents</span></div>
            <span class="af-step-line"></span>
            <div class={step3Class}><span class="af-step-num">3</span><span class="af-step-text">Availability</span></div>
            <span class="af-step-line"></span>
            <div class={step4Class}><span class="af-step-num">4</span><span class="af-step-text">Email</span></div>
            <span class="af-step-line"></span>
            <div class={step5Class}><span class="af-step-num">5</span><span class="af-step-text">Submit</span></div>
          </div>
        </div>

        <!-- Step 1: Search -->
        <template if:true={isStep1}>
          <div class="af-body">
            <div class="af-prop-card">
              <div class="af-prop-label">Property Address</div>
              <div class="af-prop-addr">{formData.propertyAddress}</div>
            </div>
            <div class="af-field">
              <label class="af-field-label">Search Radius</label>
              <lightning-combobox name="radius" value={assignRadius} options={radiusOptions} onchange={handleRadiusChange} variant="label-hidden"></lightning-combobox>
            </div>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleCloseAssignAgent}>Cancel</button>
              <button class="af-btn-next" onclick={handleSearchAgents}>Search Agents</button>
            </div>
          </div>
        </template>

        <!-- Step 2: Agent List -->
        <template if:true={isStep2}>
          <template if:true={assignAgentInfo}>
            <div class="af-info-bar">
              <span class="af-info">{assignAgentInfo}</span>
              <template if:true={hasNearbyAgents}>
                <div class="af-view-toggle">
                  <button class={listViewBtnClass} onclick={handleViewList}>
                    <lightning-icon icon-name="utility:rows" size="xx-small"></lightning-icon>
                    List
                  </button>
                  <button class={mapViewBtnClass} onclick={handleViewMap}>
                    <lightning-icon icon-name="utility:location" size="xx-small"></lightning-icon>
                    Map
                  </button>
                </div>
              </template>
            </div>
          </template>
          <template if:true={isLoadingAgents}>
            <div class="af-loading"><lightning-spinner alternative-text="Searching" size="medium"></lightning-spinner></div>
          </template>
          <template if:false={isLoadingAgents}>
            <!-- Map View -->
            <template if:true={isMapView}>
              <template if:true={hasMapData}>
                <div class="af-map-wrap">
                  <c-nhs-map
                    markers={nhsMapMarkers}
                    center={nhsMapCenter}
                    zoom={mapZoomLevel}
                    draw-radius={assignRadius}
                    draw-routes>
                  </c-nhs-map>
                  <div class="af-map-legend">
                    <span class="af-legend-item"><span class="af-legend-dot af-legend-prop"></span>Property</span>
                    <span class="af-legend-item"><span class="af-legend-dot af-legend-agent"></span>Available Agent</span>
                    <span class="af-legend-item"><span class="af-legend-dot af-legend-assigned"></span>Assigned</span>
                  </div>
                </div>
              </template>
              <template if:false={hasMapData}>
                <div class="af-empty">Map data unavailable. Switch to List view.</div>
              </template>
            </template>

            <!-- List View -->
            <template if:true={isListView}>
            <template if:true={hasNearbyAgents}>
              <div class="af-list">
                <template for:each={nearbyAgents} for:item="agent">
                  <div class={agent.rowClass} key={agent.id}>
                    <div class="af-agent-info">
                      <div class="af-agent-name">{agent.name}</div>
                      <template if:true={agent.fullAddress}>
                        <div class="af-agent-address">
                          <a href={agent.googleMapsLink} target="_blank" class="af-link" title="Open in Google Maps">📍 {agent.fullAddress}</a>
                        </div>
                      </template>
                      <div class="af-agent-meta">
                        <span class="af-distance">{agent.distanceLabel}</span>
                      </div>
                      <div class="af-agent-contact">
                        <template if:true={agent.phone}><span>T: <a href={agent.phoneLink} class="af-link">{agent.phone}</a></span></template>
                        <template if:true={agent.mobile}><span>M: <a href={agent.mobileLink} class="af-link">{agent.mobile}</a></span></template>
                        <template if:true={agent.email}><span><a href={agent.mailtoLink} class="af-link">{agent.email}</a></span></template>
                      </div>
                      <div class="af-agent-links">
                        <a href={agent.rightmoveSearchUrl} target="_blank" class="af-rightmove-btn" title="Search on Rightmove">Rightmove</a>
                        <a href={agent.zooplaSearchUrl} target="_blank" class="af-zoopla-btn" title="Search on Zoopla">Zoopla</a>
                      </div>
                    </div>
                    <div class="af-agent-actions">
                      <template if:true={agent.isAssigned}>
                        <span class="af-assigned-badge">{agent.assignedLabel}</span>
                        <button class="af-unassign-btn" data-id={agent.id} onclick={handleUnassignAgent}>✕</button>
                      </template>
                      <template if:false={agent.isAssigned}>
                        <template if:true={isReassignMode}>
                          <button class="af-assign-btn af-btn-reassign" data-id={agent.id} data-name={agent.name} data-slot={reassignSlot} onclick={handleReassignToSlot} disabled={isAssigning}>Assign as {reassignLabel}</button>
                        </template>
                        <template if:false={isReassignMode}>
                          <button class="af-assign-btn af-btn-a2" data-id={agent.id} data-name={agent.name} data-slot="agent2" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 2</button>
                          <button class="af-assign-btn af-btn-a3" data-id={agent.id} data-name={agent.name} data-slot="agent3" onclick={handleAssignToSlot} disabled={isAssigning}>Agent 3</button>
                        </template>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template if:false={hasNearbyAgents}>
              <div class="af-empty">No agents found within {assignRadius} miles.</div>
            </template>
            </template><!-- /isListView -->
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleBackToStep1}>Back</button>
              <template if:true={assignedAgent2Name}><span class="af-sel-badge af-sel-2">Agent 2: {assignedAgent2Name}</span></template>
              <template if:true={assignedAgent3Name}><span class="af-sel-badge af-sel-3">Agent 3: {assignedAgent3Name}</span></template>
            </div>
          </template>
        </template>

        <!-- Step 3: Confirm -->
        <!-- Step 3: Booking Calendar -->
        <template if:true={isStep3}>
          <div class="af-body">
            <div class="af-cal-header">
              <span class="af-cal-range">{afCalRangeLabel}</span>
              <div class="af-cal-nav">
                <button class="va-nav-btn" onclick={handleAfCalPrev}>‹ Prev</button>
                <button class="va-nav-btn" onclick={handleAfCalToday}>Today</button>
                <button class="va-nav-btn" onclick={handleAfCalNext}>Next ›</button>
              </div>
            </div>
            <template if:true={afSelectedSlot}>
              <div class="af-selected-banner">
                Selected: <strong>{afSelectedSlot.dayLabel}</strong> at <strong>{afSelectedSlot.time}</strong>
              </div>
            </template>
            <div class="af-cal-wrap">
              <table class="ba-cal-table">
                <thead>
                  <tr>
                    <th class="ba-cal-th-time">Time Slot</th>
                    <template for:each={afCalDays} for:item="day">
                      <th key={day.key} class={day.thClass}>
                        <div class="va-day-name">{day.dayName}</div>
                        <div class="va-day-num">{day.dayNum}</div>
                      </th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template for:each={afCalRows} for:item="row">
                    <tr key={row.key}>
                      <td class={row.tdLabelClass}>{row.label}</td>
                      <template for:each={row.cells} for:item="cell">
                        <td key={cell.key} class={cell.tdClass}>
                          <template if:true={cell.available}>
                            <div class="ba-slot-grid">
                              <template for:each={cell.subSlots} for:item="sub">
                                <div key={sub.key} class={sub.chipClass}
                                     data-sub-key={sub.subKey} data-day-label={sub.dayLabel}
                                     data-slot-label={row.label} data-time={sub.time}
                                     data-avail-id={sub.availId}
                                     onclick={handleAfSlotClick}>
                                  {sub.time}
                                </div>
                              </template>
                            </div>
                          </template>
                          <template if:false={cell.available}>
                            <div class="ba-slot-empty">—</div>
                          </template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleAfBackToStep2}>Back</button>
              <template if:false={afIsBooking}>
                <button class="af-btn-next" onclick={handleAfStep3Next}>Book &amp; Next</button>
              </template>
              <template if:true={afIsBooking}>
                <button class="af-btn-next" disabled><span class="save-spinner"></span> Booking...</button>
              </template>
            </div>
          </div>
        </template>

        <!-- Step 4: Email Preview -->
        <template if:true={isStep4}>
          <div class="af-body">
            <div class="af-email-banner">{afEmailTemplateLabel} — {afEmailAgentName}</div>
            <template if:true={afIsLoadingEmail}>
              <div class="af-loading"><lightning-spinner alternative-text="Loading template" size="medium"></lightning-spinner></div>
            </template>
            <template if:false={afIsLoadingEmail}>
              <div class="af-email-form">
                <div class="af-email-row">
                  <label class="af-email-label">TO</label>
                  <div class="af-email-input-group">
                    <input type="text" class="af-email-input af-email-input-with-btn" value={afEmailTo} onchange={handleAfEmailToChange}>
                    <button class="af-ab-btn" onclick={handleOpenAfAddressBook} title="Address Book">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    </button>
                  </div>
                </div>
                <div class="af-email-row-split">
                  <div class="af-email-row af-email-half">
                    <label class="af-email-label">CC</label>
                    <input type="text" class="af-email-input" value={afEmailCc} onchange={handleAfEmailCcChange} placeholder="cc@email.com (optional)">
                  </div>
                  <div class="af-email-row af-email-half">
                    <label class="af-email-label">BCC</label>
                    <input type="text" class="af-email-input" value={afEmailBcc} onchange={handleAfEmailBccChange} placeholder="bcc@email.com (optional)">
                  </div>
                </div>
                <div class="af-email-row">
                  <label class="af-email-label">SUBJECT</label>
                  <input type="text" class="af-email-input" value={afEmailSubject} onchange={handleAfEmailSubjectChange}>
                </div>
                <div class="af-email-row">
                  <label class="af-email-label">EMAIL PREVIEW</label>
                  <div class="af-email-preview">
                    <lightning-formatted-rich-text value={afEmailBody}></lightning-formatted-rich-text>
                  </div>
                </div>
              </div>
            </template>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleAfBackToStep3}>Back</button>
              <button class="af-btn-next" onclick={handleAfStep4Next}>Select and Go Next</button>
            </div>

            <!-- Address Book for Agent Email -->
            <template if:true={showAfAddressBook}>
              <div class="af-ab-overlay">
                <div class="af-ab-panel">
                  <div class="af-ab-header">
                    <h4>Address Book</h4>
                    <button class="af-ab-close" onclick={handleCloseAfAddressBook}>&times;</button>
                  </div>
                  <div class="af-ab-search">
                    <input type="text" class="af-email-input" placeholder="Search contacts..." value={afAddressBookSearch} oninput={handleAfAddressBookSearch}>
                  </div>
                  <div class="af-ab-list">
                    <template if:true={hasAfAddressBookContacts}>
                      <template for:each={filteredAfAddressBook} for:item="contact">
                        <div key={contact.key} class="af-ab-entry">
                          <div class="af-ab-info">
                            <span class="af-ab-name">{contact.name}</span>
                            <span class="af-ab-role">{contact.role}</span>
                            <span class="af-ab-email">{contact.email}</span>
                          </div>
                          <div class="af-ab-btns">
                            <button class="af-ab-add-btn af-ab-add-to" data-email={contact.email} onclick={handleAfSelectContactTo}>To</button>
                            <button class="af-ab-add-btn af-ab-add-cc" data-email={contact.email} onclick={handleAfSelectContactCc}>CC</button>
                          </div>
                        </div>
                      </template>
                    </template>
                    <template if:false={hasAfAddressBookContacts}>
                      <div class="af-ab-empty">No contacts found.</div>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Step 5: Summary & Submit -->
        <template if:true={isStep5}>
          <div class="af-body">
            <div class="af-info">Review and submit</div>
            <div class="af-summary">
              <template for:each={afSummaryItems} for:item="item">
                <div class="af-summary-row" key={item.label}>
                  <span class="af-summary-label">{item.label}</span>
                  <span class="af-summary-value">{item.value}</span>
                </div>
              </template>
            </div>
            <div class="af-actions">
              <button class="af-btn-cancel" onclick={handleAfBackToStep4}>Back</button>
              <template if:false={afIsSubmitting}>
                <button class="af-btn-submit" onclick={handleAfSubmit}>Submit</button>
              </template>
              <template if:true={afIsSubmitting}>
                <button class="af-btn-submit" disabled>
                  <span class="save-spinner"></span> Submitting...
                </button>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

</template>
