<template>
    <div class="setup-card">
        <div class="setup-header">
            <div class="setup-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M8.4 3.5L14 7.7l5.6-4.2L14 0 8.4 3.5zm0 8.4L14 16.1l5.6-4.2L14 7.7 8.4 11.9zm11.2 0l-5.6 4.2 5.6 4.2 5.6-4.2-5.6-4.2zM3.5 11.9L8.4 16.1 14 11.9 8.4 7.7 3.5 11.9zM14 17.5l-5.6 4.2L14 25.9l5.6-4.2L14 17.5z" fill="#0061FF"/></svg>
            </div>
            <div>
                <h1>Dropbox Integration Setup</h1>
                <p>Connect your Dropbox account to enable file storage for applications.</p>
            </div>
        </div>

        <!-- Connection Status -->
        <div class="setup-body">
            <div class="status-section">
                <h3>Connection Status</h3>
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Checking" size="small"></lightning-spinner>
                </template>
                <template if:false={isLoading}>
                    <div class={statusBadgeClass}>
                        <span class="status-dot"></span>
                        {statusMessage}
                    </div>

                    <div class="checklist">
                        <div class={checkClientIdClass}>Client ID {checkClientId}</div>
                        <div class={checkClientSecretClass}>Client Secret {checkClientSecret}</div>
                        <div class={checkRefreshTokenClass}>Refresh Token {checkRefreshToken}</div>
                    </div>
                </template>
            </div>

            <!-- Step 1: Prerequisites -->
            <div class="step-section">
                <h3>Step 1: Dropbox App Credentials</h3>
                <p>Create an app at <strong>dropbox.com/developers/apps</strong> and set the redirect URI to:</p>
                <div class="code-block">{redirectUri}</div>
                <p>Then add Client ID and Client Secret in <strong>Setup → Custom Metadata Types → DropBox → Manage Records → Drop_Box</strong></p>
            </div>

            <!-- Step 2: Connect -->
            <div class="step-section">
                <h3>Step 2: Connect to Dropbox</h3>
                <template if:false={isConnected}>
                    <button class="btn-connect" onclick={handleConnect}>
                        <svg width="16" height="16" viewBox="0 0 28 28" fill="none"><path d="M8.4 3.5L14 7.7l5.6-4.2L14 0 8.4 3.5zm0 8.4L14 16.1l5.6-4.2L14 7.7 8.4 11.9zm11.2 0l-5.6 4.2 5.6 4.2 5.6-4.2-5.6-4.2zM3.5 11.9L8.4 16.1 14 11.9 8.4 7.7 3.5 11.9zM14 17.5l-5.6 4.2L14 25.9l5.6-4.2L14 17.5z" fill="#fff"/></svg>
                        Connect to Dropbox
                    </button>
                </template>
                <template if:true={isConnected}>
                    <div class="connected-msg">&#10003; Dropbox is connected and working.</div>
                    <button class="btn-reconnect" onclick={handleConnect}>Reconnect with different account</button>
                </template>
            </div>

            <!-- Step 3: Paste auth code -->
            <template if:true={showCodeInput}>
                <div class="step-section highlight">
                    <h3>Step 3: Paste Authorization Code</h3>
                    <p>A Dropbox window has opened. Authorize the app, then paste the code below:</p>
                    <div class="code-input-row">
                        <input type="text" class="code-input" placeholder="Paste authorization code here…" value={authCode} onchange={handleCodeInput}>
                        <button class="btn-exchange" onclick={handleExchangeCode} disabled={isExchangeDisabled}>
                            Exchange Token
                        </button>
                    </div>
                    <template if:true={exchangeResult}>
                        <div class={exchangeResultClass}>{exchangeResult}</div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</template>
