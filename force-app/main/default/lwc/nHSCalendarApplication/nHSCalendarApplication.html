<template>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">{label}</div>
            <div class="header-right">
                <!-- <button class="tab-button" onclick={handleTabClick} data-tab="calendar">Calendar</button> -->
                <button class="tab-button" onclick= {handleApplicationKanban} data-tab="application">Application</button>
                <button class="tab-button" onclick= {handleAvailableClick} >Vendor Availability</button>
                <button class="tab-button" onclick= {handleBookedClick} >Agents Booked</button>
                <button class="tab-button" onclick={handleTabClick} data-tab="chasing">Figures to Chase</button>
                <button class="tab-button" onclick={handleFigClick} >Figures Returned</button>
                <!-- <button class="tab-button" onclick={handleOfferClick} >Offer</button> -->
                <button class="tab-button" onclick={handleArchivedClick} >Archived</button>
            </div>
            <div class="navigation-buttons">
                <template if:false={opportunity}>
                    <button class="nav-button" onclick={handlePrevClick}>&lt;</button>
                    <button class="nav-button" onclick={handleNextClick}>&gt;</button>
                    <!-- <div class="calendar-buttons" if:true = {isCalendarVisible}>
        <button class="nav-button" onclick= {handleAvailableClick} >Available</button>
        <button class="nav-button" onclick= {handleBookedClick} >Booked</button>
    </div> -->
                </template>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; font-family: Arial, sans-serif; font-size: 14px;">
  <div style="display: flex; align-items: center; gap: 8px;">
    <div style="width: 15px; height: 15px; background-color: yellow; border: 1px solid #ccc;"></div>
    <span>Agents Booked</span>
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <div style="width: 15px; height: 15px; background-color: green; border: 1px solid #ccc;"></div>
    <span>Figures to Return</span>
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <div style="width: 15px; height: 15px; background-color: red; border: 1px solid #ccc;"></div>
    <span>Figures to Chase</span>
  </div>
</div>

        </header>

        <div class="main-content">

            <div if:false={opportunity} class="toggle-container">
                <button class="toggle-button" onclick={toggleCollapsibleSection}></button>
                <div class="opportunity-container" style={opportunityContainerStyles}>
                    <c-opportunity-list onopportunityselect={handleOpportunitySelect} nhs-process = {nhsProcess} tab = {tabName}></c-opportunity-list>
                </div>
            </div>

            <div class="tab-content" style={tabContentStyles}>
                 <!-------------------------------------------------------------------Applications ------------------------------------------------->
                <div if:true={kanban}>
                    <c-kanban-all-application is-archived = {isArchived}></c-kanban-all-application>
                </div>
                <!-------------------------------------------------------------------Agent Booked ------------------------------------------------->
                <div if:true={isBooked}>
                    <c-booking-kanban-view start-date={startDate} application-id={selectedOpportunityId} stage = 'Agents Booked'>
                    </c-booking-kanban-view>
                </div>
                 <!-------------------------------------------------------------------Vendor Availability ------------------------------------------------->
                <div if:true={isAvailable}>
                    <c-vendor-availability-kanban-view start-date={startDate} slot-filter="available"
                        application-id={selectedOpportunityId}>
                    </c-vendor-availability-kanban-view>
                </div>
                <!-------------------------------------------------------------------Figures to Chasing ------------------------------------------------->

                <div if:true={isChasingVisible}>
                    <c-chasing-for-booking-slot application-id={selectedOpportunityId} start-date={startDate}
                        end-date={parentEndDate} slot-filter="booked">
                    </c-chasing-for-booking-slot>
                </div>

                <!-------------------------------------------------------------------Figures Returned ------------------------------------------------->
                <div if:true={figureToChase}>
                    <c-booking-kanban-view start-date={startDate} application-id={selectedOpportunityId} stage = 'Figure Return'>
                    </c-booking-kanban-view>
                </div>

                <!-------------------------------------------------------------------Offer ------------------------------------------------->
                <!-- <div if:true={offer}>
                    <c-offer-kanban-view  application-id={selectedOpportunityId} >
                    </c-offer-kanban-view>
                </div> -->

                  <!-------------------------------------------------------------------Offer ------------------------------------------------->
                <div if:true={isArchived}>
                     <c-archived-application-kanban ></c-archived-application-kanban>
                     
                </div>

            </div>
        </div>
    </div>
</template>
