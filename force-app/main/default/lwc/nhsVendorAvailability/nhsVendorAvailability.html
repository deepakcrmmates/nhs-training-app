<template>
    <div class="form-card">
        <div class="section-banner">
            <div class="dot"></div>
            <h2>Vendor Availability</h2>
        </div>

        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="calendar-body">
                <!-- Week navigation with vendor info -->
                <div class="week-nav">
                    <div class="vendor-info">
                        <div class="vendor-name">{vendorName}</div>
                        <div class="vendor-detail">{vendorPhone}</div>
                        <div class="vendor-detail">{vendorEmail}</div>
                    </div>
                    <div class="nav-center">
                        <button class="nav-btn" onclick={handlePrevWeek}>&#8249; Prev</button>
                        <span class="week-label">{currentWeekLabel}</span>
                        <button class="nav-btn" onclick={handleNextWeek}>Next &#8250;</button>
                    </div>
                    <button class="nav-btn today-btn" onclick={handleGoToday}>Today</button>
                </div>

                <!-- Single week grid -->
                <div class="cal-grid">
                    <!-- Corner -->
                    <div class="cal-corner">TIME</div>
                    <!-- Day headers -->
                    <template for:each={currentWeek.days} for:item="day">
                        <div key={day.dateStr} class={day.headerClass}>
                            <span class="dname">{day.dayName}</span>
                            <span class="dnum">{day.dayNumber}</span>
                        </div>
                    </template>

                    <!-- Quick row -->
                    <div class="cal-qlabel">QUICK</div>
                    <template for:each={currentWeek.days} for:item="day">
                        <div key={day.dateStr} class={day.quickCellClass}>
                            <template if:true={day.showQuick}>
                                <button class={day.allBtnClass} data-date={day.dateStr} data-action="all" onclick={handleQuickToggle}>All</button>
                                <button class={day.amBtnClass} data-date={day.dateStr} data-action="am" onclick={handleQuickToggle}>AM</button>
                                <button class={day.pmBtnClass} data-date={day.dateStr} data-action="pm" onclick={handleQuickToggle}>PM</button>
                            </template>
                        </div>
                    </template>

                    <!-- Hour rows -->
                    <template for:each={currentWeek.hourRows} for:item="row">
                        <div key={row.key} class="cal-timelabel">{row.label}</div>
                        <template for:each={row.cells} for:item="cell">
                            <div key={cell.key} class={cell.slotClass}
                                 data-date={cell.dateStr} data-hour={cell.hour}
                                 onclick={handleSlotClick}>
                                <template if:true={cell.isOn}>
                                    <span class={cell.tickClass}>&#10003;</span>
                                </template>
                            </div>
                        </template>
                    </template>
                </div>

                <div class="calendar-actions">
                    <div class="action-spacer"></div>
                    <button class="btn btn-primary" onclick={handleSave}>Save Availability</button>
                </div>
            </div>
        </template>
    </div>
</template>
