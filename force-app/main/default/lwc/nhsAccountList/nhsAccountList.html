<template>
    <div class="al-page">
        <!-- Header -->
        <div class="al-header">
            <div class="al-header-icon">
                <template if:true={isAgents}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                </template>
                <template if:false={isAgents}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
                </template>
            </div>
            <div>
                <h1>{title}</h1>
                <p>{subtitle}</p>
            </div>
            <div class="al-header-stats" if:true={hasAccounts}>
                <span class="al-stat-badge">{totalCount} total</span>
            </div>
        </div>

        <!-- Search & Actions Bar -->
        <div class="al-toolbar">
            <div class="al-search-wrap">
                <svg class="al-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" class="al-search-input" placeholder={searchPlaceholder} value={searchTerm} onkeyup={handleSearchChange}/>
            </div>
            <button class="al-new-btn" onclick={handleNewAccount}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                New {recordTypeLabel}
            </button>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="al-loading">
                <span class="al-spinner"></span> Loading...
            </div>
        </template>

        <!-- Error -->
        <template if:true={errorMessage}>
            <div class="al-error">{errorMessage}</div>
        </template>

        <!-- Table -->
        <template if:true={hasAccounts}>
            <div class="al-table-wrap">
                <table class="al-table">
                    <thead>
                        <tr>
                            <th class="al-th" data-field="Name" onclick={handleSort}>
                                Name {nameSortIcon}
                            </th>
                            <th class="al-th" data-field={citySortField} onclick={handleSort}>
                                City {citySortIcon}
                            </th>
                            <th class="al-th">Postcode</th>
                            <th class="al-th">Phone</th>
                            <th class="al-th">Mobile</th>
                            <th class="al-th">Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={accounts} for:item="acc">
                            <tr key={acc.id} class="al-row" onclick={handleRowClick} data-id={acc.id}>
                                <td class="al-td al-td-name">
                                    <a href={acc.url} onclick={handleLinkClick}>{acc.name}</a>
                                </td>
                                <td class="al-td">{acc.city}</td>
                                <td class="al-td">{acc.postcode}</td>
                                <td class="al-td">{acc.phone}</td>
                                <td class="al-td">{acc.contactMobile}</td>
                                <td class="al-td">{acc.contactEmail}</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="al-pagination">
                <span class="al-page-info">Page {pageNumber} of {totalPages} ({totalCount} records)</span>
                <div class="al-page-btns">
                    <button class="al-page-btn" onclick={handlePrevPage} disabled={isPrevDisabled}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <button class="al-page-btn" onclick={handleNextPage} disabled={isNextDisabled}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
            </div>
        </template>

        <!-- Empty -->
        <template if:false={hasAccounts}>
            <template if:false={isLoading}>
                <template if:false={errorMessage}>
                    <div class="al-empty">
                        <h2>No {recordTypeLabel}s found</h2>
                        <p>Try adjusting your search or create a new record</p>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
