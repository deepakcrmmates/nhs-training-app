<template>
    <div class="al-page">
        <!-- Header -->
        <div class="al-header">
            <div class="al-header-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
            </div>
            <div>
                <h1>Existing Properties</h1>
                <p>All properties in the system</p>
            </div>
            <div class="al-header-stats" if:true={hasRecords}>
                <span class="al-stat-badge">{totalCount} total</span>
            </div>
        </div>

        <!-- Search -->
        <div class="al-toolbar">
            <div class="al-search-wrap">
                <svg class="al-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" class="al-search-input" placeholder="Search properties by name, address, city or postcode..." value={searchTerm} onkeyup={handleSearchChange}/>
            </div>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="al-loading"><span class="al-spinner"></span> Loading...</div>
        </template>

        <!-- Error -->
        <template if:true={errorMessage}>
            <div class="al-error">{errorMessage}</div>
        </template>

        <!-- Table -->
        <template if:true={hasRecords}>
            <div class="al-table-wrap">
                <table class="al-table">
                    <thead>
                        <tr>
                            <th class="al-th" data-field="Name" onclick={handleSort}>Property {nameSortIcon}</th>
                            <th class="al-th" data-field="Address__City__s" onclick={handleSort}>Address {citySortIcon}</th>
                            <th class="al-th" data-field="Number_Of_Bedrooms__c" onclick={handleSort}>Beds / Type {bedsSortIcon}</th>
                            <th class="al-th">Tenure / Age</th>
                            <th class="al-th">EPC / Tax</th>
                            <th class="al-th">Area / Flood</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={records} for:item="prop">
                            <tr key={prop.id} class="al-row" onclick={handleRowClick} data-id={prop.id}>
                                <td class="al-td al-td-name">
                                    <a href={prop.url} onclick={handleLinkClick}>{prop.name}</a>
                                    <div class="al-td-sub">{prop.postcode}</div>
                                </td>
                                <td class="al-td">
                                    {prop.street}
                                    <div class="al-td-sub">{prop.city}</div>
                                </td>
                                <td class="al-td al-td-center">
                                    {prop.bedroomsDisplay}
                                    <div class="al-td-sub">{prop.propertyType}</div>
                                </td>
                                <td class="al-td">
                                    {prop.tenure}
                                    <div class="al-td-sub">{prop.constructionAge}</div>
                                </td>
                                <td class="al-td al-td-center">
                                    <span class={prop.epcClass}>{prop.epcRating}</span>
                                    <div class="al-td-sub">{prop.councilTaxDisplay}</div>
                                </td>
                                <td class="al-td al-td-center">
                                    {prop.floorAreaDisplay}
                                    <div class="al-td-sub">{prop.floodRisk}</div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="al-pagination">
                <span class="al-page-info">Page {pageNumber} of {totalPages} ({totalCount} records)</span>
                <div class="al-page-btns">
                    <button class="al-page-btn" onclick={handlePrevPage} disabled={isPrevDisabled}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <button class="al-page-btn" onclick={handleNextPage} disabled={isNextDisabled}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
            </div>
        </template>

        <!-- Empty -->
        <template if:false={hasRecords}>
            <template if:false={isLoading}>
                <template if:false={errorMessage}>
                    <div class="al-empty">
                        <h2>No properties found</h2>
                        <p>Try adjusting your search</p>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
