<template>
    <lightning-card title="Weekly Updates">
        <template for:each={weeks} for:item="week">
            <div key={week.id} class="slds-p-around_medium slds-box slds-m-bottom_small">
                <div class="slds-grid slds-wrap slds-grid_align-spread">
                    <h2 class="slds-text-heading_medium">Week {week.weekNumber} - Created date: {week.createdDate} | Last modified date: {week.modifiedDate}</h2>
                    <lightning-button-icon icon-name="utility:close" alternative-text="Remove" onclick={removeWeek} class="slds-align-top" data-id={week.id}></lightning-button-icon>
                </div>
                <table class="slds-table slds-table_bordered">
                    <thead>
                        <tr>
                            <th>Agent Title</th>
                            <th>Lookup</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Agent 1</td>
                            <td>
                                <c-custom-lookup-lwc name ="agent1" data-id={week.Id} class="input" label="" selected-icon-name="standard:account" object-label="Account"
										object-api-name="Account" field-api-name="Name" other-field-api-name="Industry"
									onvalueselected={handleInputChange} selected-record-id ={week.agent1} data-agent="agent1" data-key={week.key} data-field="lookup" >
									</c-custom-lookup-lwc>

                                <!-- <lightning-input type="text" value={week.agent1.lookup} data-week-id={week.id} data-agent="agent1" data-field="lookup" onchange={handleInputChange} placeholder="Lookup to Agent"></lightning-input> -->
                                </td>
                            <td><lightning-textarea value={week.notes1} name ='notes1' data-week-id={week.id} data-agent="agent1" data-field="notes" onchange={handleInputChange} placeholder="Notes"></lightning-textarea></td>
                        </tr>
                        <tr>
                            <td>Agent 2</td>
                            <td>
                                 <c-custom-lookup-lwc name ="agent2" data-id={week.Id} class="input" label="" selected-icon-name="standard:account" object-label="Account"
										object-api-name="Account" field-api-name="Name" other-field-api-name="Industry"
									onvalueselected={handleInputChange} selected-record-id ={week.agent2} data-agent="agent2" data-key={week.key} data-field="lookup" >
									</c-custom-lookup-lwc>
                                <!-- <lightning-input type="text" value={week.agent2.lookup} data-week-id={week.id} data-agent="agent2" data-field="lookup" onchange={handleInputChange} placeholder="Lookup to Agent">
                                    </lightning-input> -->
                                    </td>
                            <td><lightning-textarea value={week.notes2} name ='notes2' data-week-id={week.id} data-agent="agent2" data-field="notes" onchange={handleInputChange}  placeholder="Notes"></lightning-textarea></td>
                        </tr>
                        <tr>
                            <td>Agent 3</td>
                            <td>
                                 <c-custom-lookup-lwc name ="agent3" data-id={week.Id} class="input" label="" selected-icon-name="standard:account" object-label="Account"
										object-api-name="Account" field-api-name="Name" other-field-api-name="Industry"
									onvalueselected={handleInputChange} selected-record-id ={week.agent3} data-agent="agent3" data-key={week.key} data-field="lookup" >
									</c-custom-lookup-lwc>
                                <!-- <lightning-input type="text" value={week.agent3.lookup} data-week-id={week.id} data-agent="agent3" data-field="lookup" onchange={handleInputChange} placeholder="Lookup to Agent"></lightning-input>
                                 -->
                                </td>
                            <td><lightning-textarea value={week.notes3} name ='notes3' data-week-id={week.id} data-agent="agent3" data-field="notes" onchange={handleInputChange} placeholder="Notes"></lightning-textarea></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td>Created by:</td>
                            <td colspan="2">{week.createdBy}</td>
                        </tr>
                        <tr>
                            <td>Modified by:</td>
                            <td colspan="2">{week.modifiedBy}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </template>
        <div class="slds-m-around_medium">
            <lightning-button label="Add Week" onclick={addWeek}></lightning-button>
            <lightning-button label="Save" variant="brand" onclick={save}></lightning-button>
        </div>
    </lightning-card>
</template>
