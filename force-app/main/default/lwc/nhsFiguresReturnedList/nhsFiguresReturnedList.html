<template>
    <div class="fr-toolbar">
        <div class="fr-search">
            <svg width="13" height="13" fill="none" stroke="#9AB09A" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Search address, vendor…" onchange={handleSearch}>
        </div>
        <button class="refresh-btn" onclick={handleRefresh} title="Refresh">&#8635;</button>
        <div class="fr-info">{totalCount} applications with all figures returned</div>
    </div>

    <template if:true={isLoading}>
        <div class="fr-loading"><lightning-spinner alternative-text="Loading" size="small"></lightning-spinner></div>
    </template>

    <template if:false={isLoading}>
        <div class="fr-table-wrap">
            <table class="fr-table">
                <thead>
                    <tr>
                        <th class="fr-th fr-th-app">Application</th>
                        <th class="fr-th">Vendor</th>
                        <th class="fr-th fr-th-agent">
                            <div class="th-name">Agent 1 (NHS)</div>
                        </th>
                        <th class="fr-th fr-th-agent">
                            <div class="th-name">Agent 2</div>
                        </th>
                        <th class="fr-th fr-th-agent">
                            <div class="th-name">Agent 3</div>
                        </th>
                        <th class="fr-th fr-th-nhs">
                            <div class="th-name">NHS Recommended</div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={displayedApps} for:item="app">
                        <tr key={app.id} class="fr-row" data-id={app.id} onclick={handleRowClick}>
                            <td class="fr-td">
                                <div class="app-name-row">
                                    <span class="app-addr">{app.name}</span>
                                    <template if:true={app.useTimeline}>
                                        <span class="fr-timeline-pill" title="Timeline valuation model">Timeline</span>
                                    </template>
                                </div>
                                <div class="app-dev">{app.development} &bull; Plot {app.plot}</div>
                            </td>
                            <td class="fr-td">
                                <span class="vendor-name">{app.vendorName}</span>
                            </td>

                            <!-- Agent 1 -->
                            <td class="fr-td fr-td-agent">
                                <template if:true={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-timeline
                                        agent-name={app.agent1Name}
                                        open-market={app.a1OpenMarket}
                                        week68={app.a1_6_8_Week}
                                        week46={app.a1_4_6_Week}
                                        week24={app.a1_2_4_Week}>
                                    </c-nhs-figures-returned-agent-timeline>
                                </template>
                                <template if:false={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-standard
                                        agent-name={app.agent1Name}
                                        initial={app.agent1Initial}
                                        target={app.agent1Target}
                                        bottom={app.agent1Bottom}>
                                    </c-nhs-figures-returned-agent-standard>
                                </template>
                            </td>

                            <!-- Agent 2 -->
                            <td class="fr-td fr-td-agent">
                                <template if:true={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-timeline
                                        agent-name={app.agent2Name}
                                        open-market={app.a2OpenMarket}
                                        week68={app.a2_6_8_Week}
                                        week46={app.a2_4_6_Week}
                                        week24={app.a2_2_4_Week}>
                                    </c-nhs-figures-returned-agent-timeline>
                                </template>
                                <template if:false={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-standard
                                        agent-name={app.agent2Name}
                                        initial={app.agent2Initial}
                                        target={app.agent2Target}
                                        bottom={app.agent2Bottom}>
                                    </c-nhs-figures-returned-agent-standard>
                                </template>
                            </td>

                            <!-- Agent 3 -->
                            <td class="fr-td fr-td-agent">
                                <template if:true={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-timeline
                                        agent-name={app.agent3Name}
                                        open-market={app.a3OpenMarket}
                                        week68={app.a3_6_8_Week}
                                        week46={app.a3_4_6_Week}
                                        week24={app.a3_2_4_Week}>
                                    </c-nhs-figures-returned-agent-timeline>
                                </template>
                                <template if:false={app.useTimeline}>
                                    <c-nhs-figures-returned-agent-standard
                                        agent-name={app.agent3Name}
                                        initial={app.agent3Initial}
                                        target={app.agent3Target}
                                        bottom={app.agent3Bottom}>
                                    </c-nhs-figures-returned-agent-standard>
                                </template>
                            </td>

                            <!-- NHS Recommended -->
                            <td class="fr-td fr-td-nhs">
                                <template if:true={app.useTimeline}>
                                    <c-nhs-figures-returned-nhs-timeline
                                        open-market={app.nhsRecOpenMarket}
                                        week68={app.nhsRec_6_8_Week}
                                        week46={app.nhsRec_4_6_Week}
                                        week24={app.nhsRec_2_4_Week}>
                                    </c-nhs-figures-returned-nhs-timeline>
                                </template>
                                <template if:false={app.useTimeline}>
                                    <c-nhs-figures-returned-nhs-standard
                                        market={app.nhsMarket}
                                        target={app.nhsTarget}
                                        forced={app.nhsForced}>
                                    </c-nhs-figures-returned-nhs-standard>
                                </template>
                            </td>
                        </tr>
                    </template>
                    <template if:false={hasApps}>
                        <tr><td colspan="6" class="fr-empty">No applications with all figures returned</td></tr>
                    </template>
                </tbody>
            </table>
        </div>
        <template if:true={showPaging}>
            <div class="fr-paging">
                <div class="arc-page-size">
                    <span class="arc-pg-label">Show</span>
                    <select class="arc-pg-select" onchange={handlePageSize}>
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="arc-pg-label">per page</span>
                </div>
                <span class="pg-info">Showing {pageStart}–{pageEnd} of {totalCount}</span>
                <div class="pg-btns">
                    <button class="pg-btn" onclick={handlePrevPage} disabled={isPrevDisabled}>&#8249;</button>
                    <span class="arc-pg-current">{currentPage} / {totalPages}</span>
                    <button class="pg-btn" onclick={handleNextPage} disabled={isNextDisabled}>&#8250;</button>
                </div>
            </div>
        </template>
    </template>
</template>
