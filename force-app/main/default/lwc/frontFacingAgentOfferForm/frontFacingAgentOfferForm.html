<template>
    <div>
        <div class="form-header">
            <h2> Agent Offer Submission Form </h2>
        </div>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>
        <template if:false={isLoading}>
            <lightning-quick-action-panel header="">
                <div class="slds-is-relative agent-offer-form">

                    <!-- SECTION 1: PROPERTY DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">PROPERTY DETAILS</h2>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Property -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="property">Property</label>
                                <lightning-input type="text" variant="standard" id="property"
                                    placeholder="Enter property name" value={propertyName} disabled class="input-width"
                                    style="width:96%; font-size:16px;"></lightning-input>
                            </div>
                            <!-- Vendor Name -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="vendor-name">Vendor Name</label>
                                <lightning-input type="text" variant="standard" id="vendor-name"
                                    placeholder={Vendor.Name} disabled class="input-width"
                                    style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Vendor Email -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="vendor-email">Vendor Email</label>
                                <lightning-input type="email" variant="standard" id="vendor-email"
                                    placeholder={Vendor.Email} disabled class="input-width"
                                    style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                            <!-- Vendor Phone -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="vendor-phone">Vendor Mobile</label>
                                <lightning-input type="tel" variant="standard" id="vendor-phone"
                                    placeholder={Vendor.Phone} disabled class="input-width"
                                    style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 2: AGENT DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">AGENT DETAILS</h2>
                        <div class="slds-grid slds-gutters custom-gap">
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered"
                                style="width: 100%; border-collapse: collapse;">
                                <tr>
                                    <td style="padding: 10px;"><strong>Agent Name</strong></td>
                                    <td style="padding: 10px;">
                                        <lightning-input type="text" value={AgentName} disabled class="input-width">
                                        </lightning-input>
                                    </td>
                                    <td rowspan="3" style=" text-align: right; width: 45%; vertical-align: middle;">
                                            <img src={LogoUrl} alt="Agent Logo" style="width: auto;  box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);" />
                                        <template if:true={LogoUrl}>
                                        </template>
                                        <!-- <template if:false={LogoUrl}>
                                            <p>No logo available</p>
                                        </template> -->
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 10px;"><strong>Agent Phone</strong></td>
                                    <td style="padding: 10px;">
                                        <lightning-input type="tel" value={agentPhone} disabled class="input-width">
                                        </lightning-input>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 10px;"><strong>Agent Email</strong></td>
                                    <td style="padding: 10px;">
                                        <lightning-input type="email" value={agentEmail} disabled class="input-width">
                                        </lightning-input>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 10px;"><strong>Agent Address</strong></td>
                                    <td style="padding: 10px;">
                                        <lightning-textarea value={agentAddress} disabled class="input-width">
                                        </lightning-textarea>
                                    </td>
                                </tr>
                            </table>

                        </div>

                    </div>

                    <!-- SECTION 3: OFFER DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">OFFER DETAILS</h2>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Offer Amount -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="offer-amount">Offer Amount</label>
                                <lightning-input type="number" variant="standard" id="offer-amount" name="OfferAmount"
                                    formatter="currency" step=".01" placeholder="0.00" onchange={handleChange}
                                    value={offer.OfferAmount} disabled={isReadOnly} class="input-width">
                                </lightning-input>
                            </div>
                            <!-- Date Offer Received (Default: Current Date and Time) -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="offer-date">Date Offer Received</label>
                                <lightning-input type="datetime" variant="standard" id="offer-date"
                                    name="Date offer received" value={currentDateTime} onchange={handleChange}
                                    disabled={isReadOnly} class="input-width" style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Offer Active (Default: Ticked) -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="offer-active">Offer Active</label>
                                <lightning-input type="checkbox" variant="standard" id="offer-active" name="yes"
                                    onchange={handleChange} checked={offer.yes} disabled={isReadOnly}
                                    class="input-width" style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 4: PURCHASER DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">PURCHASER DETAILS</h2>
                        <div class="slds-p-around_medium">
                            <h2 style="font-size: 18px; margin-bottom: 10px;">Create New Purchaser</h2>
                            <table class="slds-table">
                                <tbody>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="First Name" value={contact.FirstName}
                                                onchange={handleInputChange} disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Last Name" value={contact.LastName}
                                                onchange={handleInputChange} disabled={isReadOnly} required>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="email" label="Email" value={contact.Email}
                                                onchange={handleInputChange} disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="tel" label="Phone" value={contact.Phone}
                                                onchange={handleInputChange} disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input-address address-label="Address" street-label="Street"
                                                city-label="City" country-label="Country" province-label="Province"
                                                postal-code-label="Post Code" field-level-help="Purchaser Address"
                                                street={contact.MailingStreet} city={contact.MailingCity}
                                                country={contact.MailingCountry} province={contact.MailingState}
                                                postal-code={contact.MailingPostalCode} onchange={handleAddressChange}
                                                disabled={isReadOnly}>
                                            </lightning-input-address>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Purchaser Buying Position (Picklist) -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="buying-position">Purchaser Buying Position</label>
                                <lightning-combobox id="buying-position" name="PurchasersBuyingPosition"
                                    value={offer.PurchasersBuyingPosition} options={buyingPositionOptions}
                                    onchange={handleChange} disabled={isReadOnly} class="input-width">
                                </lightning-combobox>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 5: PURCHASER'S SOLICITOR DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">PURCHASER'S SOLICITOR DETAILS</h2>
                        <div class="slds-p-around_medium">
                            <h2 style="font-size: 18px; margin-bottom: 10px;">Create New Purchaser's Solicitor Company
                            </h2>
                            <table class="slds-table">
                                <tbody>
                                    <!-- Account Name -->
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Company Name"
                                                value={SolicitorCompany.Name}
                                                onchange={handleSolicitorCompanyInputChange} data-field="Name" required
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <!-- Phone -->
                                    <tr>
                                        <td>
                                            <lightning-input type="tel" label="Phone" value={SolicitorCompany.Phone}
                                                onchange={handleSolicitorCompanyInputChange} data-field="Phone"
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <!-- Email -->
                                    <tr>
                                        <td>
                                            <lightning-input type="email" label="Email" value={SolicitorCompany.Email}
                                                onchange={handleSolicitorCompanyInputChange} data-field="Email"
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <!-- Billing Address -->
                                    <tr>
                                        <td>
                                            <lightning-input-address address-label="Billing Address"
                                                street-label="Street" city-label="City" country-label="Country"
                                                province-label="State" postal-code-label="Post Code"
                                                field-level-help="Billing Address"
                                                street={SolicitorCompany.BillingStreet}
                                                city={SolicitorCompany.BillingCity}
                                                country={SolicitorCompany.BillingCountry}
                                                province={SolicitorCompany.BillingState}
                                                postal-code={SolicitorCompany.BillingPostalCode}
                                                onchange={handleSolicitorCompanyAddressChange} disabled={isReadOnly}>
                                            </lightning-input-address>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <!-- Solicitor Person -->
                            <h2 style="font-size: 18px; margin-bottom: 10px;">Create New Purchaser's Solicitor Person
                            </h2>
                            <table class="slds-table">
                                <tbody>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="First Name"
                                                value={SolicitorPerson.FirstName}
                                                onchange={handleSolicitorPersonInputChange} data-field="FirstName"
                                                required disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Last Name"
                                                value={SolicitorPerson.LastName}
                                                onchange={handleSolicitorPersonInputChange} data-field="LastName"
                                                required disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <!-- Phone -->
                                    <tr>
                                        <td>
                                            <lightning-input type="tel" label="Phone" value={SolicitorPerson.Phone}
                                                onchange={handleSolicitorPersonInputChange} data-field="Phone"
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <!-- Email -->
                                    <tr>
                                        <td>
                                            <lightning-input type="email" label="Email" value={SolicitorPerson.Email}
                                                onchange={handleSolicitorPersonInputChange} data-field="Email"
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- SECTION 6: MORTGAGE DETAILS -->
                    <div class="section-container">
                        <h2 class="section-header">MORTGAGE DETAILS</h2>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Mortgage Required -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="mortgage-required">Mortgage Required</label>
                                <lightning-input type="checkbox" variant="standard" id="mortgage-required"
                                    name="MortgageRequired" checked={offer.MortgageRequired} onchange={handleChange}
                                    disabled={isReadOnly} class="input-width">
                                </lightning-input>
                            </div>
                        </div>
                        <!-- Create New Lender Form -->
                        <div if:true={MortgageRequired} class="slds-p-around_medium">
                            <h2 style="font-size: 18px; margin-bottom: 10px;">Create New Lender</h2>
                            <table class="slds-table">
                                <tbody>
                                    <!-- New Lender Details -->
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Company Name" data-field="accountName"
                                                value={Lender.accountName} onchange={handleLenderInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Email" data-field="Email"
                                                value={Lender.Email} onchange={handleLenderInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Phone" data-field="Phone"
                                                value={Lender.Phone} onchange={handleLenderInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input-address address-label="Address" street-label="Street"
                                                city-label="City" country-label="Country" province-label="Province"
                                                postal-code-label="Post Code" field-level-help="Lender Address"
                                                street={Lender.Street} city={Lender.City} country={Lender.Country}
                                                province={Lender.State} postal-code={Lender.PostalCode}
                                                onchange={handleLenderAddressChange} disabled={isReadOnly}>
                                            </lightning-input-address>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <!-- Create Financial Advisor -->
                            <h2 style="font-size: 18px; margin-bottom: 10px;">Create Financial Advisor</h2>
                            <table class="slds-table">
                                <tbody>
                                    <!-- New Advisor Details -->
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="First Name" data-field="FirstName"
                                                value={FinancialAdvisor.FirstName} onchange={handleAdvisorInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="text" label="Last Name" data-field="LastName"
                                                value={FinancialAdvisor.LastName} onchange={handleAdvisorInputChange}
                                                required disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="email" label="Email" data-field="Email"
                                                value={FinancialAdvisor.Email} onchange={handleAdvisorInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <lightning-input type="tel" label="Phone" data-field="Phone"
                                                value={FinancialAdvisor.Phone} onchange={handleAdvisorInputChange}
                                                disabled={isReadOnly}>
                                            </lightning-input>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Deposit -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="deposit">Deposit</label>
                                <lightning-input type="number" variant="standard" id="deposit" name="Deposit"
                                    value={offer.Deposit} formatter="currency" step=".01" placeholder="0.00"
                                    onchange={handleChange} disabled={isReadOnly} class="input-width">
                                </lightning-input>
                            </div>
                            <!-- Decision in Principle -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="decision-in-principle">Decision in Principle</label>
                                <lightning-input type="checkbox" variant="standard" id="decision-in-principle"
                                    name="DecisioninPrinciple" checked={offer.DecisioninPrinciple}
                                    onchange={handleChange} disabled={isReadOnly} class="input-width">
                                </lightning-input>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 7: ID VERIFICATION -->
                    <div class="section-container">
                        <h2 class="section-header">Additional Details</h2>
                        <div class="slds-grid slds-gutters custom-gap">

                            <!-- Id Verified -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="id-verified">Id Verified</label>
                                <lightning-input type="checkbox" variant="standard" id="id-verified" name="IdVerified"
                                    checked={offer.IdVerified} disabled={isReadOnly} onchange={handleChange}
                                    class="input-width">
                                </lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Proof of Funding -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="proof-of-funding">Proof of Funding</label>
                                <lightning-input style="padding-top: 6px;" type="checkbox" variant="standard"
                                    id="proof-of-funding" disabled={isReadOnly} name="ProofofFunding"
                                    checked={offer.ProofofFunding} onchange={handleChange} class="input-width">
                                </lightning-input>
                            </div>


                            <!-- 2nd row: Exchange Deadline -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="exchange-deadline">Exchange Deadline</label>
                                <lightning-input type="date" variant="standard" id="exchange-deadline"
                                    disabled={isReadOnly} name="ExchangeDeadline" onchange={handleChange}
                                    class="input-width" value={offer.ExchangeDeadline}
                                    style="width:96%; font-size:16px;">
                                </lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- AML Check -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="aml-check">AML Check</label>
                                <lightning-input style="padding-top: 6px;" type="checkbox" variant="standard"
                                    id="aml-check" name="AMLCheck" checked={offer.AMLCheck} disabled={isReadOnly}
                                    onchange={handleChange} class="input-width">
                                </lightning-input>
                            </div>
                            <!-- 3rd row: Buyer Aware of Estimated Completion Date -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="completion-date">Buyer Aware of Estimated Completion Date</label>
                                <lightning-input type="date" variant="standard" id="completion-date"
                                    name="BuyerawareofEstimatedCompletionDate" onchange={handleChange}
                                    value={offer.BuyerawareofEstimatedCompletionDate} disabled={isReadOnly}
                                    class="input-width" style="width:96%; font-size:16px;"></lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Any Special Conditions (Long text on Offer) -->
                            <div class="slds-col slds-size_1-of-1">
                                <label class="label-class" for="special-conditions">Any Special Conditions</label>
                                <lightning-textarea id="special-conditions" name="AnySpecialConditions"
                                    value={offer.AnySpecialConditions} disabled={isReadOnly} onchange={handleChange}
                                    class="input-width" style="width:96%; font-size:16px;">
                                </lightning-textarea>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 8: FILE UPLOAD -->
                    <div class="section-container">
                        <h2 class="section-header">File Upload</h2>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Upload Id -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="upload-id">Upload Id</label>
                                <lightning-input type="file" variant="standard" id="upload-id" name="Upload Id"
                                    onchange={handleFileChange} class="input-width">
                                </lightning-input>
                            </div>
                            <!-- Upload Decision in Principle -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="upload-decision">Upload Decision in Principle</label>
                                <lightning-input type="file" variant="standard" id="upload-decision"
                                    name="Upload Decision in Principle" onchange={handleFileChange} class="input-width">
                                </lightning-input>
                            </div>
                        </div>
                        <div class="slds-grid slds-gutters custom-gap">
                            <!-- Upload AML Check -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="upload-aml-check">Upload AML Check</label>
                                <lightning-input type="file" variant="standard" id="upload-aml-check"
                                    name="Upload AML Check" onchange={handleFileChange} class="input-width">
                                </lightning-input>
                            </div>
                            <!-- Upload Proof of Income -->
                            <div class="slds-col slds-size_1-of-2">
                                <label class="label-class" for="upload-income">Upload Proof of Income</label>
                                <lightning-input type="file" variant="standard" id="upload-income"
                                    name="Upload Proof of Income" onchange={handleFileChange} class="input-width">
                                </lightning-input>
                            </div>
                        </div>
                    </div>

                    <!-- Display Uploaded File Names -->
                    <div class="uploaded-files">
                        <h2 class="section-header">Uploaded Files</h2>
                        <template for:each={uploadedFiles} for:item="file">
                            <div key={file.fieldName} class="file-item">
                                <span class="file-name">{file.name}</span> &nbsp;&nbsp;
                                <span class="file-field">({file.fieldName})</span>
                            </div>
                        </template>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <center>
                            <template if:false={isAllSuccess}>
                                <lightning-button variant="brand" label="Submit" title="Submit"
                                    onclick={handleSaveAndSubmit}></lightning-button>
                                <!-- <button class="button button-primary" onclick={handleSaveAndSubmit} disabled={isReadOnly}>Submit</button> -->
                            </template>
                        </center>
                    </div>

                </div>
            </lightning-quick-action-panel>
        </template>

        <template if:true={isModalOpen}>
            <div class="custom-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Offer submission status</h2>
                        <button class="close-button" onclick={closeModal}>X</button>
                    </div>
                    <div class="modal-body">
                        <template for:each={processResults} for:item="result">
                            <div key={result.id} class="result-row">
                                <div class={result.animationClass}></div>
                                <span>{result.message}</span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={customError}>
            <div class="custom-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Error</h2>
                        <button class="close-button" onclick={closeModal}>X</button>
                    </div>
                    <div class="modal-body">
                        <div style="color: red; font-size: 16px;">
                            <h2>{errorMessage}</h2>
                        </div>
                    </div>
                </div>
            </div>
        </template>


    </div>
</template>
