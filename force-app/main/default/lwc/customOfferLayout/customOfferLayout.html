<template>
    <div class="container" style="padding: 20px; font-family: Arial, sans-serif;">
        <!-- <lightning-button label="Print" variant="brand" onclick={generatePdf} class="print-button" style="margin-bottom: 20px;"></lightning-button> -->
    <!-- <div class="slds-p-around_medium">
           <lightning-button label="Download PDF" onclick={generatePDF}></lightning-button>
        </div> -->
         <div class="printableArea" lwc:ref="printableArea">
            <table class="bordered-table"
                style="width: 100%; border-collapse: collapse; border: 2px solid black; text-align: left; font-size: 14px;">
                <!-- Header Row -->
                <tr style="background-color: #f2f2f2;">
                    <th colspan="2" style="border: 1px solid #ccc; padding: 40px; font-size: 16px; width: 21.5%;">
                        Property Address</th>
                    <th colspan="3" style="border: 1px solid #ccc; font-size: 16px; padding: 8px;">
                        {offerDetails.applicationName}
                    </th>
                    <th colspan="2" style="border: 1px solid #ccc; font-size: 16px; padding: 8px; width: 27%">
                        Offer emailed to builder (HO/Site - in first instance)
                    </th>
                </tr>

                <!-- Offers Rows -->
                <template if:true={relatedOffers}>
                    <tr>
                        <!-- Single row label spanning 3 rows -->
                        <td style="border: 1px solid #ccc; padding: 30px; text-align: center;"></td>
                        <td style="border: 1px solid #ccc; padding: 8px;"></td>
                        <th style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Amount</th>
                        <th colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Date</th>
                        <th colspan="2"
                            style="border: 1px solid #ccc; padding: 8px; font-size: 16px; text-align: center;">
                            Offer Status
                        </th>
                    </tr>

                    <!-- Row for Agent 1 -->
                    <tr>
                        <td class="vertical-text" rowspan="3" style="border: 1px solid #ccc; padding: 30px; text-align: center; writing-mode: vertical-rl; 
        text-orientation: mixed; transform: rotate(180deg);">
                            <label>Offer on Availability Update</label>
                        </td>
                        <td style="border: 1px solid #ccc; padding: 8px;"></td>
                        <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">£ {agent1Offers.offerAmount}
                        </td>
                        <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                            <!-- Check if formattedDate is available -->
                            <template if:true={agent1Offers.formattedDate}>
                                {agent1Offers.formattedDate}
                            </template>
                            <template if:false={agent1Offers.formattedDate}>
                                N/A
                            </template>
                        </td>
                        <td colspan="2"
                            style="border: 1px solid #ccc; padding: 8px; font-size: 16px; text-align: center;">
                            {agent1Offers.isAccepted}
                        </td>
                    </tr>

                    <!-- Row for Agent 2 -->
                    <tr>
                        <td style="border: 1px solid #ccc; padding: 8px;"></td>
                        <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">£ {agent2Offers.offerAmount}
                        </td>
                        <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                            <!-- Check if formattedDate is available -->
                            <template if:true={agent2Offers.formattedDate}>
                                {agent2Offers.formattedDate}
                            </template>
                            <template if:false={agent2Offers.formattedDate}>
                                N/A
                            </template>
                        </td>
                        <td colspan="2"
                            style="border: 1px solid #ccc; padding: 8px; font-size: 16px; text-align: center;">
                            {agent2Offers.isAccepted}
                        </td>
                    </tr>

                    <!-- Row for Agent 3 -->
                    <tr>
                        <td style="border: 1px solid #ccc; padding: 8px;"></td>
                        <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">£ {agent3Offers.offerAmount}
                        </td>
                        <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                            <!-- Check if formattedDate is available -->
                            <template if:true={agent3Offers.formattedDate}>
                                {agent3Offers.formattedDate}
                            </template>
                            <template if:false={agent3Offers.formattedDate}>
                                N/A
                            </template>
                        </td>
                        <td colspan="2"
                            style="border: 1px solid #ccc; padding: 8px; font-size: 16px; text-align: center;">
                            {agent3Offers.isAccepted}
                        </td>
                    </tr>

                </template>

                <!-- Agent and Pricing -->
                <template if:true={acceptedOffer}>
                    <tr style="background-color: #f9f9f9;">
                        <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Agent Sold
                            Through:<br/>
                            <b>{acceptedOffer.agentName}</b>
                        </td>
                        <td colspan="3" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                            Telephone Number: &nbsp; <b>{acceptedOffer.agentPhone}</b>
                        </td>
                        <td colspan="2" style="border: 1px solid #ccc; padding: 16px; font-size: 18px;">
                            Agreed Price:<br/>
                            <label style="font-weight: bold;">£ {acceptedOffer.offerAmount}</label>
                        </td>
                    </tr>
                </template>
                <template if:false={acceptedOffer}>
                    <tr style="background-color: #f9f9f9;">
                        <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Agent Sold
                            Through:<br/>
                            <b>NA</b>
                        </td>
                        <td colspan="3" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                            Telephone Number: &nbsp; <b>NA</b>
                        </td>
                        <td colspan="2" style="border: 1px solid #ccc; padding: 16px; font-size: 18px;">
                            Agreed Price:<br/>
                            <label style="font-weight: bold;">£ NA</label>
                        </td>
                    </tr>
                </template>


                <!-- Financial Advisor -->
                <tr>
                    <td rowspan="2" colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Financial
                        Advisor:
                    </td>
                    <td rowspan="2" colspan="3" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        <b>{offerDetails.financialAdvisor}</b>
                    </td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">NHM Qual’d &nbsp;</td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">ID seen &nbsp;
                        <b>{offerDetails.idSeen}</b></td>
                </tr>
                <tr>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">DIP seen &nbsp;
                        <b>{offerDetails.dIPSeen}</b></td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">POF seen &nbsp;
                        <b>{offerDetails.pOFSeen}</b></td>
                </tr>

                <!-- Buyer Details -->
                <tr style="background-color: #f2f2f2;">
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">DIP/Lender:</td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">{offerDetails.lenderName}</td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Deposit Amount <br/> (£/%)</td>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px; font-weight: bold;">£
                        {offerDetails.depositAmount}</td>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Buyers Position<br/>
                        <b>{offerDetails.buyingPosition}</b>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Buyers Estate Agent
                        (if SSTC)
                    </td>
                    <td colspan="3" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;"></td>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">Buyers Agents Number
                    </td>
                </tr>
            </table>


            <table class="bordered-table"
                style="width: 100%; border-collapse: collapse; border: 2px solid black; text-align: left; font-size: 14px;">
                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;     width: 21.5%;">Builder:</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.houseBuilder}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Scheme</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">{offerDetails.scheme}
                    </td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Development</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.development}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Plot No.</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">{offerDetails.plot}
                    </td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Res Fee (If Applicable)</th>
                    <td style="border: 1px solid #ccc; padding: 8px;"></td>
                    <th style="border: 1px solid #ccc; padding: 8px;">EPC expiry date:</th>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">{offerDetails.expiryDate}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Completion Date:</th>
                    <td style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">{offerDetails.eTA_Date}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Vendors Name</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.applicantName}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors Name</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.vendorSolicitorName}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Vendors Address</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.applicantAddress}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors Address</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.vendorSolicitorAddress}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Vendor E-mail</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.applicantEmail}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors E-mail</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.vendorSolicitorEmail}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Purchasers Name</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.purchaserName}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors Name</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.solicitorName}</td>
                </tr>

                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Purchasers Address</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.purchaserAddress}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors Address</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.solicitorAddress}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Purchasers Telephone</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.purchaserPhone}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitors Telephone</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.solicitorPhone}</td>
                </tr>

                <!-- Builder Details -->
                <tr>
                    <th colspan="2" style="border: 1px solid #ccc; padding: 8px;">Purchasers E-mail</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.purchaserEmail}</td>
                    <th style="border: 1px solid #ccc; padding: 8px;">Solicitor E-mail</th>
                    <td colspan="2" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.solicitorEmail}</td>
                </tr>

                <tr>
                    <th colspan="3" style="border: 1px solid #ccc; padding: 8px;">Any Special Conditions (i.e Vendor
                        Private fee)</th>
                    <td colspan="4" style="border: 1px solid #ccc; padding: 8px; font-size: 16px;">
                        {offerDetails.otherCondition}</td>
                </tr>
            </table>



        </div>
    </div>
</template>
