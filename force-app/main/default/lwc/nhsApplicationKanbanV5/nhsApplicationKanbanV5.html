<template>
    <div class="nhs-board">
        <div class="stage-nav">
            <template for:each={stageNav} for:item="s">
                <button key={s.key} class={s.cls} data-key={s.key} onclick={handleNavClick}>
                    <span class="sn-num">{s.num}</span>
                    <span class="sn-dot" style={s.dotStyle}></span>
                    {s.label}
                </button>
            </template>
        </div>
        <div class="page-hdr">
            <div class="hdr-top">
                <div class="hdr-ctx">
                    <div class="org-pill">
                        <div class="org-icon">
                            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1L9 3.5V6.5L5 9L1 6.5V3.5L5 1Z" stroke="white" stroke-width="1" fill="none"/><circle cx="5" cy="5" r="1.5" fill="white"/></svg>
                        </div>
                        New Home Solutions - Training
                    </div>
                    <div class="bc">
                        <span class="bc-link">New Applications</span>
                        <span class="bc-sep">&#8250;</span>
                        <span class="bc-cur">Application</span>
                        <span class="bc-sep">&#8250;</span>
                        <span style="color:#94a3b8;">Kanban View</span>
                    </div>
                </div>
                <div class="hdr-acts">
                    <button class="hdr-btn hdr-btn-ghost" onclick={handleRefresh}>
                        <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                        Refresh
                    </button>
                    <button class="hdr-btn hdr-btn-ghost">
                        <lightning-icon icon-name="utility:download" size="xx-small"></lightning-icon>
                        Export
                    </button>
                </div>
            </div>
            <div class="hdr-body">
                <div class="hdr-title-block">
                    <div class="hdr-icon">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <rect x="2" y="4" width="4" height="14" rx="2" fill="white" opacity="0.9"/>
                            <rect x="8" y="2" width="4" height="18" rx="2" fill="white"/>
                            <rect x="14" y="6" width="4" height="10" rx="2" fill="white" opacity="0.7"/>
                            <rect x="20" y="8" width="2" height="6" rx="1" fill="white" opacity="0.4"/>
                        </svg>
                    </div>
                    <div class="hdr-text">
                        <h1 class="hdr-title">Application Pipeline</h1>
                        <p class="hdr-sub">Contact tracking for all active applications &nbsp;&#183;&nbsp; <code>NHS_Process__c = Application</code></p>
                        <div class="flow-pills">
                            <template for:each={flowPills} for:item="p">
                                <template if:true={p.isArrow}>
                                    <span key={p.key} class="flow-arrow">&#8250;</span>
                                </template>
                                <template if:false={p.isArrow}>
                                    <span key={p.key} class="flow-pill" style={p.style}>{p.label}</span>
                                </template>
                            </template>
                        </div>
                    </div>
                </div>
                <div class="hdr-stats">
                    <div class="stat-card">
                        <span class="stat-val">{totalCards}</span>
                        <span class="stat-lbl">Total</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val green">{activeCards}</span>
                        <span class="stat-lbl">Active</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val amber">{contactedCards}</span>
                        <span class="stat-lbl">Contacted</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val red">{cancelledCards}</span>
                        <span class="stat-lbl">Cancelled</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="toolbar">
            <div class="tl">
                <div class="sw">
                    <lightning-icon icon-name="utility:search" size="xx-small" class="si"></lightning-icon>
                    <input class="s-inp" type="text" placeholder="Search by name or ref..." value={searchTerm} oninput={handleSearch} />
                    <template if:true={searchTerm}>
                        <button class="clr" onclick={clearSearch}><lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon></button>
                    </template>
                </div>
                <select class="f-sel" onchange={handleAssignee}>
                    <option value="">All assignees</option>
                    <template for:each={assigneeList} for:item="a">
                        <option key={a} value={a}>{a}</option>
                    </template>
                </select>
                <label class="arc-lbl">
                    <input type="checkbox" checked={showArchived} onchange={handleArchived} />
                    Show archived
                </label>
            </div>
            <div class="tr">
                <button class="icon-btn" onclick={handleRefresh} title="Refresh">
                    <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                </button>
            </div>
        </div>
        <template if:true={isLoading}>
            <div class="load-wrap">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                <p>Loading applications...</p>
            </div>
        </template>
        <template if:true={hasError}>
            <div class="err-box">
                <lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon>
                <span>{errorMessage}</span>
                <button class="retry-btn" onclick={handleRefresh}>Retry</button>
            </div>
        </template>
        <template if:true={showBoard}>
            <div class="board">
                <template for:each={columns} for:item="col">
                    <div key={col.stageName} class={col.colClass} data-stage={col.stageName}
                         ondragover={handleDragOver} ondrop={handleDrop}
                         ondragleave={handleDragLeave} ondragenter={handleDragEnter}>
                        <div class="col-hdr" style={col.accentStyle}>
                            <div class="col-top">
                                <div class="col-nw">
                                    <span class="col-dot" style={col.dotStyle}></span>
                                    <span class="col-nm">{col.stageName}</span>
                                </div>
                                <span class="col-cnt">{col.cardCount}</span>
                            </div>
                            <template if:true={col.showTotal}>
                                <div class="col-tot">&#163;{col.totalFormatted}</div>
                            </template>
                        </div>
                        <template if:true={col.isDragOver}>
                            <div class="drop-h">
                                <lightning-icon icon-name="utility:add" size="xx-small"></lightning-icon>
                                Drop here
                            </div>
                        </template>
                        <div class="col-body">
                            <template for:each={col.cards} for:item="card">
                                <div key={card.id} class={card.cardClass} draggable="true" data-id={card.id}
                                     ondragstart={handleDragStart} ondragend={handleDragEnd}>
                                    <div class="c-bar" style={col.accentBarStyle}></div>
                                    <div class="c-in">
                                        <div class="c-top-row">
                                            <span class="c-ref">{card.appRefNumber}</span>
                                            <template if:true={card.archived}><span class="arc-chip">Archived</span></template>
                                        </div>
                                        <div class="c-name" data-id={card.id} onclick={handleCardClick}>{card.name}</div>
                                        <div class="c-chips">
                                            <template if:true={card.plot}><span class="chip cp">Plot {card.plot}</span></template>
                                            <template if:true={card.houseBuilder}><span class="chip cb">{card.houseBuilder}</span></template>
                                        </div>
                                        <div class="c-dets">
                                            <template if:true={card.city}>
                                                <div class="c-det"><lightning-icon icon-name="utility:location" size="xx-small"></lightning-icon><span>{card.city}</span></div>
                                            </template>
                                            <template if:true={card.closeDateFormatted}>
                                                <div class="c-det"><lightning-icon icon-name="utility:event" size="xx-small"></lightning-icon><span>{card.closeDateFormatted}</span></div>
                                            </template>
                                        </div>
                                        <div class="c-foot">
                                            <div class="c-own">
                                                <div class="ava" style={card.avStyle}>{card.avInitials}</div>
                                                <span class="ow-n">{card.ownerName}</span>
                                            </div>
                                            <div class="c-acts">
                                                <button class="act-btn" data-id={card.id} onclick={handleCardClick} title="Open record">
                                                    <lightning-icon icon-name="utility:new_window" size="xx-small"></lightning-icon>
                                                </button>
                                                <button class="act-btn" data-id={card.id} data-archived={card.archived} onclick={handleArchiveClick} title={card.arcLabel}>
                                                    <lightning-icon icon-name={card.arcIcon} size="xx-small"></lightning-icon>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template if:true={col.isEmpty}>
                                <div class="col-empty">
                                    <lightning-icon icon-name="utility:inbox" size="small"></lightning-icon>
                                    <p>No applications</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        <template if:true={showComingSoon}>
            <div class="coming-soon">
                <lightning-icon icon-name="utility:kanban" size="large"></lightning-icon>
                <h2>{activeStageLabel}</h2>
                <p>This stage view is coming soon.</p>
            </div>
        </template>
        <template if:true={toastVisible}>
            <div class={toastClass}>
                <lightning-icon icon-name={toastIcon} size="x-small" variant="inverse"></lightning-icon>
                <span>{toastMessage}</span>
            </div>
        </template>
    </div>
</template>
