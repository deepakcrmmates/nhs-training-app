<template>
    <div class="nhs-board">
        <!-- Sticky Header Removed -->

        <!-- Stage nav bar ── -->
        <div class="stage-nav">
            <template for:each={stageNav} for:item="s">
                <button key={s.key} class={s.cls} data-key={s.key} onclick={handleNavClick}>
                    <span class="sn-num">{s.num}</span>
                    <span class="sn-dot" style={s.dotStyle}></span>
                    {s.label}
                </button>
            </template>
        </div>

        <!-- ══════════════════════════════════════════
             APPLICATION KANBAN VIEW
        ══════════════════════════════════════════ -->
        <template if:true={isApplication}>
            <div class="page-hdr">
                <div class="hdr-body">
                    <div class="hdr-main">
                        <div class="hdr-title-block">
                            <div class="hdr-icon">
                                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="4" height="14" rx="2" fill="white" opacity="0.9"/><rect x="8" y="2" width="4" height="18" rx="2" fill="white"/><rect x="14" y="6" width="4" height="10" rx="2" fill="white" opacity="0.7"/><rect x="20" y="8" width="2" height="6" rx="1" fill="white" opacity="0.4"/></svg>
                            </div>
                            <h1 class="hdr-title">{activeStageLabel}</h1>
                        </div>
                        <div class="hdr-filters">
                            <div class="sw">
                                <lightning-icon icon-name="utility:search" size="xx-small" class="si"></lightning-icon>
                                <input class="s-inp" type="text" placeholder="Search.." value={searchTerm} oninput={handleSearch} />
                                <template if:true={searchTerm}><button class="clr" onclick={clearSearch}><lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon></button></template>
                            </div>

                            <div class="hb-lookup {hbLookupClass}">
                                <div class="sw">
                                    <lightning-icon icon-name="utility:company" size="xx-small" class="si"></lightning-icon>
                                    <input class="s-inp hb-inp" type="text" placeholder="Housebuilder.." value={hbSearchTerm} oninput={handleHbSearch} onfocus={handleHbFocus} onblur={handleHbBlur} />
                                    <template if:true={hbFilter}>
                                        <button class="clr" onclick={clearHbFilter}><lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon></button>
                                    </template>
                                </div>
                                <template if:true={showHbDropdown}>
                                    <div class="hb-results">
                                        <template for:each={filteredHbOptions} for:item="h">
                                            <div key={h.value} class="hb-item" onmousedown={handleHbSelect} data-id={h.value} data-label={h.label}>
                                                {h.label}
                                            </div>
                                        </template>
                                        <template if:false={hasHbResults}>
                                            <div class="hb-empty">No housebuilders found</div>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <div class="dt-f">
                                <label class="dt-lbl">Housebuilder Date</label>
                                <input type="date" class="d-inp" value={appDateFilter} onchange={handleAppDate} />
                            </div>

                            <button class="clr-f-btn" onclick={clearFilters}>Clear Filters</button>
                        </div>

                        <div class="hdr-acts-wrap">
                            <div class="hdr-stats">
                                <div class="stat-card"><strong>{totalContacts}</strong> <span>Total Contacts</span></div>
                                <div class="stat-sep">/</div>
                                <div class="stat-card"><strong class="red">{cancelledCards}</strong> <span>Cancelled</span></div>
                            </div>
                            <div class="v-sep"></div>
                            <div class="v-toggle">
                                <button class={kanbanBtnClass} data-mode="kanban" onclick={toggleViewMode} title="Kanban Board"><lightning-icon icon-name="utility:kanban" size="xx-small" variant={kanbanIconVariant}></lightning-icon></button>
                                <button class={listBtnClass} data-mode="list" onclick={toggleViewMode} title="List View"><lightning-icon icon-name="utility:list" size="xx-small" variant={listIconVariant}></lightning-icon></button>
                            </div>
                            <div class="v-sep"></div>
                            <button class="header-icon-btn" onclick={handleRefresh} title="Refresh"><lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon></button>
                            <button class="header-icon-btn" title="Export"><lightning-icon icon-name="utility:download" size="xx-small"></lightning-icon></button>
                        </div>
                    </div>
                </div>
            </div>

            <template if:true={isLoading}><div class="load-wrap"><lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner><p>Loading applications...</p></div></template>
            <template if:true={hasError}><div class="err-box"><lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon><span>{errorMessage}</span><button class="retry-btn" onclick={handleRefresh}>Retry</button></div></template>
            
            <template if:true={showBoard}>
                <!-- BOARD VIEW -->
                <template if:true={isKanbanView}>
                    <div class="board">
                        <template for:each={columns} for:item="col">
                            <div key={col.stageName} class={col.colClass} data-stage={col.internalStageName}
                                 ondragover={handleDragOver} ondrop={handleDrop}
                                 ondragleave={handleDragLeave} ondragenter={handleDragEnter}>
                                <div class="col-hdr" style={col.accentStyle}>
                                    <div class="col-top">
                                        <div class="col-nw"><span class="col-dot" style={col.dotStyle}></span><span class="col-nm">{col.stageName}</span></div>
                                        <span class="col-cnt">{col.cardCount}</span>
                                    </div>
                                    <template if:true={col.showTotal}><div class="col-tot">&#163;{col.totalFormatted}</div></template>
                                </div>
                                <template if:true={col.isDragOver}><div class="drop-h"><lightning-icon icon-name="utility:add" size="xx-small"></lightning-icon>Drop here</div></template>
                                <div class="col-body">
                                    <template for:each={col.cards} for:item="card">
                                        <div key={card.id} class={card.cardClass} draggable="true" data-id={card.id}
                                             ondragstart={handleDragStart} ondragend={handleDragEnd}>
                                            <div class="c-bar" style={col.accentBarStyle}></div>
                                            <div class="c-in">
                                                <div class="c-top-row">
                                                    <span class="c-ref">{card.houseBuilder}</span>
                                                    <div class="c-pin-box">
                                                        <button class={card.pinBtnClass} data-id={card.id} onclick={handlePinClick} title={card.pinTitle}>
                                                            <lightning-icon icon-name={card.pinIcon} size="xx-small"></lightning-icon>
                                                        </button>
                                                    </div>
                                                    <template if:true={card.archived}><span class="arc-chip">Archived</span></template>
                                                </div>
                                                <div class="c-name" data-id={card.id} onclick={handleCardClick}>{card.name}</div>
                                                <div class="c-chips">
                                                    <template if:true={card.plot}><span class="chip cp">Plot {card.plot}</span></template>
                                                    <template if:true={card.development}><span class="chip cb">{card.development}</span></template>
                                                </div>
                                                <div class="c-dets">
                                                    <template if:true={card.city}><div class="c-det"><lightning-icon icon-name="utility:location" size="xx-small"></lightning-icon><span>{card.city}</span></div></template>
                                                    <template if:true={card.closeDateFormatted}><div class="c-det"><lightning-icon icon-name="utility:event" size="xx-small"></lightning-icon><span>{card.closeDateFormatted}</span></div></template>
                                                </div>
                                                <div class="c-foot">
                                                    <div class="c-acts">
                                                        <button class="act-btn" data-id={card.id} onclick={handleCardClick} title="Open record"><lightning-icon icon-name="utility:new_window" size="xx-small"></lightning-icon></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={col.hasMore}>
                                        <div class="load-more-row">
                                            <template if:false={col.isLoadingMore}>
                                                <button class="load-more-btn" data-stage={col.internalStageName} onclick={handleLoadMore}>Load More ({col.moreCount})</button>
                                            </template>
                                            <template if:true={col.isLoadingMore}>
                                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:true={col.isEmpty}><div class="col-empty"><lightning-icon icon-name="utility:inbox" size="small"></lightning-icon><p>No applications</p></div></template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- LIST VIEW -->
                <template if:true={isListView}>
                    <div class="lv-wrap">
                        <!-- Stage tabs -->
                        <div class="lv-tabs">
                            <template for:each={listStages} for:item="tab">
                                <button key={tab.value} class={tab.cls} style={tab.tabStyle} data-stage={tab.value} onclick={handleListStageClick}>
                                    <template if:true={tab.dotStyle}><span class="lvt-dot" style={tab.dotStyle}></span></template>
                                    <span class="lvt-label">{tab.label}</span>
                                    <span class="lvt-count">{tab.count}</span>
                                </button>
                            </template>
                        </div>
                        <!-- Table -->
                        <div class="lv-table-wrap">
                            <table class="va-table">
                                <thead>
                                    <tr>
                                        <th class="va-th va-th-app">Address</th>
                                        <th class="va-th">Housebuilder</th>
                                        <th class="va-th">Development</th>
                                        <th class="va-th">Plot</th>
                                        <th class="va-th">Vendor</th>
                                        <th class="va-th">Received</th>
                                        <th class="va-th va-th-act">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={listCards} for:item="c">
                                        <template if:true={c.isNewStage}>
                                            <tr key={c.stageLabel} class="stage-divider-row" style={c.stageDividerStyle}>
                                                <td colspan="7" class="stage-divider-cell">{c.stageLabel}</td>
                                            </tr>
                                        </template>
                                        <tr key={c.id} class="va-row">
                                            <td class="va-td" data-id={c.id} onclick={handleCardClick}>
                                                <div class="app-addr">
                                                    <template if:true={c.pinned}><span class="lv-pin-icon">&#128204;</span></template>
                                                    {c.name}
                                                </div>
                                            </td>
                                            <td class="va-td"><span class="hb-name">{c.houseBuilder}</span></td>
                                            <td class="va-td">{c.development}</td>
                                            <td class="va-td">{c.plot}</td>
                                            <td class="va-td"><span class="vendor-name">{c.vendorName}</span></td>
                                            <td class="va-td"><span class="lv-date">{c.closeDateFormatted}</span></td>
                                            <td class="va-td va-td-act">
                                                <template if:false={c.isCancelled}>
                                                    <button class="btn-move-next" data-id={c.id} onclick={handleMoveToVendorAvail}>Move Next</button>
                                                </template>
                                                <template if:true={c.isCancelled}>
                                                    <button class="btn-move-next disabled" disabled>Cancelled</button>
                                                </template>
                                            </td>
                                        </tr>
                                    </template>
                                    <template if:false={listCards.length}>
                                        <tr><td colspan="7" class="va-empty">No applications in this stage</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div class="arc-paging">
                            <div class="arc-page-size">
                                <span class="arc-pg-label">Show</span>
                                <select class="arc-pg-select" onchange={handleListPageSize}>
                                    <option value="10" selected>10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                                <span class="arc-pg-label">per page</span>
                            </div>
                            <span class="arc-pg-info">Showing {listPageStart}–{listPageEnd} of {listTotalCount}</span>
                            <div class="arc-pg-btns">
                                <button class="pg-btn" onclick={handleListPrevPage} disabled={listIsPrevDisabled}>&#8249;</button>
                                <span class="arc-pg-current">{listPage} / {listTotalPages}</span>
                                <button class="pg-btn" onclick={handleListNextPage} disabled={listIsNextDisabled}>&#8250;</button>
                            </div>
                        </div>
                    </div>
                </template>
            </template>
        </template>

        <!-- ══════════════════════════════════════════
             ARCHIVED VIEW
        ══════════════════════════════════════════ -->
        <template if:true={isArchived}>
            <div class="arc-toolbar">
                <div class="arc-search">
                    <svg width="13" height="13" fill="none" stroke="#9AB09A" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" placeholder="Search archived…" value={searchTerm} oninput={handleSearch}>
                </div>
                <div class="arc-date-range">
                    <label class="arc-date-label">From</label>
                    <input type="date" class="arc-date-input" value={arcDateFrom} onchange={handleArcDateFrom}>
                    <label class="arc-date-label">To</label>
                    <input type="date" class="arc-date-input" value={arcDateTo} onchange={handleArcDateTo}>
                </div>
                <button class="refresh-btn" onclick={handleRefresh} title="Refresh">&#8635;</button>
                <div class="arc-info">{arcFilteredCount} of {arcTotalCount} archived</div>
            </div>

            <template if:true={isLoading}><div class="load-wrap"><lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner></div></template>
            <template if:true={showBoard}>
                <div class="lv-table-wrap" style="padding:12px 16px 0">
                    <table class="va-table">
                        <thead>
                            <tr>
                                <th class="va-th va-th-app">Address</th>
                                <th class="va-th">Housebuilder</th>
                                <th class="va-th">Development</th>
                                <th class="va-th">Plot</th>
                                <th class="va-th">Vendor</th>
                                <th class="va-th">Received</th>
                                <th class="va-th va-th-act">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={arcPagedCards} for:item="c">
                                <tr key={c.id} class="va-row">
                                    <td class="va-td" data-id={c.id} onclick={handleCardClick}>
                                        <div class="app-addr">{c.name}</div>
                                    </td>
                                    <td class="va-td"><span class="hb-name">{c.houseBuilder}</span></td>
                                    <td class="va-td">{c.development}</td>
                                    <td class="va-td">{c.plot}</td>
                                    <td class="va-td"><span class="vendor-name">{c.vendorName}</span></td>
                                    <td class="va-td"><span class="lv-date">{c.closeDateFormatted}</span></td>
                                    <td class="va-td va-td-act">
                                        <button class="btn-unarchive" data-id={c.id} data-archived="true" onclick={handleArchiveClick}>Unarchive</button>
                                    </td>
                                </tr>
                            </template>
                            <template if:false={arcFilteredCount}>
                                <tr><td colspan="7" class="va-empty">No archived applications found</td></tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <!-- Paging -->
                <div class="arc-paging">
                    <div class="arc-page-size">
                        <span class="arc-pg-label">Show</span>
                        <select class="arc-pg-select" onchange={handleArcPageSize}>
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="arc-pg-label">per page</span>
                    </div>
                    <span class="arc-pg-info">Showing {arcPageStart}–{arcPageEnd} of {arcFilteredCount}</span>
                    <div class="arc-pg-btns">
                        <button class="pg-btn" onclick={handleArcPrevPage} disabled={arcIsPrevDisabled}>&#8249;</button>
                        <span class="arc-pg-current">{arcCurrentPage} / {arcTotalPages}</span>
                        <button class="pg-btn" onclick={handleArcNextPage} disabled={arcIsNextDisabled}>&#8250;</button>
                    </div>
                </div>
            </template>
        </template>

        <!-- ══════════════════════════════════════════
             VENDOR AVAILABILITY VIEW
        ══════════════════════════════════════════ -->
        <!-- ══════════════════════════════════════════
             VENDOR AVAILABILITY VIEW (SPLIT-VIEW)
        ══════════════════════════════════════════ -->
        <template if:true={isVendorAvailability}>
            <c-nhs-vendor-availability-list></c-nhs-vendor-availability-list>
        </template>


        <!-- ══ Agents Booked View ══ -->
        <template if:true={isAgentsBooked}>
            <c-nhs-agent-booked-list></c-nhs-agent-booked-list>
        </template>

        <!-- ══ Figures to Chase View ══ -->
        <template if:true={isFiguresToChase}>
            <c-nhs-figures-to-chase-list></c-nhs-figures-to-chase-list>
        </template>

        <!-- ══ Figures Returned View ══ -->
        <template if:true={isFiguresReturned}>
            <c-nhs-figures-returned-list></c-nhs-figures-returned-list>
        </template>

        <!-- ══ Valuations Ready View ══ -->
        <template if:true={isValuationsReady}>
            <c-nhs-valuations-ready-list></c-nhs-valuations-ready-list>
        </template>

        <!-- ══ Other stage coming-soon views ══ -->
        <template if:true={showComingSoon}>
            <div class="page-hdr">
                <div class="hdr-top">
                    <div><!-- Left spacer --></div>
                </div>
            </div>
            <div class="coming-soon">
                <lightning-icon icon-name="utility:kanban" size="large"></lightning-icon>
                <h2>{activeStageLabel}</h2>
                <p>This stage view is coming soon.</p>
            </div>
        </template>

        <template if:true={toastVisible}>
            <div class={toastClass}><lightning-icon icon-name={toastIcon} size="x-small" variant="inverse"></lightning-icon><span>{toastMessage}</span></div>
        </template>
    </div>
</template>
