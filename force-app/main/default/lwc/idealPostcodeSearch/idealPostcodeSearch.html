<template>
    <lightning-card title="Ideal Postcode Search">
        <div class="slds-m-around_medium">
            <lightning-input type="text" label="Enter Postcode" value={postcode} onchange={handlePostcodeChange}></lightning-input>
            <lightning-button label="Search" onclick={searchAddresses} variant="brand"></lightning-button>
        </div>
        <template if:true={addresses}>
            <div class="slds-m-around_medium">
                <lightning-layout>
                    <template for:each={addresses} for:item="address">
                        <lightning-layout-item key={address.id} size="6">
                            <div class="slds-box slds-box_x-small">
                                <p>{address.line_1}</p>
                                <p>{address.line_2}</p>
                                <p>{address.line_3}</p>
                                <p>{address.post_town}</p>
                                <p>{address.postcode}</p>
                            </div>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>
            </div>
        </template>
    </lightning-card>
</template>
