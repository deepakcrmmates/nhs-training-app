<template>
    <template if:false={showNew}>
        <c-nhs-account-list
            record-type-developer-name="House_Builder"
            title="Housebuilders"
            subtitle="Housebuilder accounts"
            record-type-label="Housebuilder"
            onnewhousebuilder={handleShowNew}>
        </c-nhs-account-list>
    </template>

    <template if:true={showNew}>
        <div class="hbl-back-wrap">
            <button class="hbl-back" onclick={handleBackToList}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Housebuilders
            </button>
        </div>
        <c-nhs-housebuilder-new oncreated={handleCreated} oncancelled={handleBackToList}></c-nhs-housebuilder-new>
    </template>
</template>
